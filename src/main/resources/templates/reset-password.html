<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Reset Password | Black Space Store</title>
    <link rel="icon" type="image/png" th:href="@{'/uploads/favicon/' + ${siteSettings.siteFavicon}}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card p-4" style="width:100%; max-width:400px;">
        <a th:href="@{/login}" class="btn-close position-absolute top-0 end-0 m-3"></a>

        <h4 class="text-center mb-3">Reset Password</h4>

        <form th:action="@{/reset-password}" method="post">
            <!-- token -->
            <input type="hidden" name="token" th:value="${token}"/>

            <div class="mb-3">
                <label class="form-label">New Password</label>
                <input type="password"
                       name="password"
                       class="form-control"
                       required>
            </div>

            <button type="submit" class="btn btn-primary w-100">
                Reset Password
            </button>
        </form>

        <div class="mt-3 text-center">
            <small th:if="${success}" class="text-success" th:text="${success}"></small>
            <small th:if="${error}" class="text-danger" th:text="${error}"></small>
        </div>
    </div>
</div>

</body>
</html>
