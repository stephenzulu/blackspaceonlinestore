<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Reset Password | Black Space Store</title>
    <link rel="icon" type="image/png" th:href="@{'/uploads/favicon/' + ${siteSettings.siteFavicon}}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <style>
        body {
            min-height: 100vh; margin: 0; display: flex;
            align-items: center; justify-content: center;
            background: linear-gradient(135deg, rgba(246,246,244,.95), rgba(251,237,230,.6)),
                        url('/store/banner/store_banner.png') center/cover no-repeat;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        .reset-card {
            width: 100%; max-width: 440px; background: #fff;
            border-radius: 16px; padding: 36px; text-align: center;
            box-shadow: 0 4px 24px rgba(0,0,0,.08); position: relative;
        }
        .reset-icon {
            width: 64px; height: 64px; border-radius: 16px;
            background: rgba(15,122,78,.1); display: inline-flex;
            align-items: center; justify-content: center; margin-bottom: 16px;
        }
        .form-control {
            border-radius: 10px; padding: 12px 14px;
            border: 1px solid #E7E7EA;
            transition: border-color .2s, box-shadow .2s;
        }
        .form-control:focus {
            border-color: #E8611D;
            box-shadow: 0 0 0 3px rgba(232,97,29,.12);
        }
        .btn-reset {
            background: linear-gradient(135deg, #0F7A4E, #0a6340);
            color: #fff; border: none; border-radius: 10px;
            padding: 12px; font-weight: 600; letter-spacing: 0.5px;
            transition: opacity .2s, transform .2s;
        }
        .btn-reset:hover { opacity: .9; transform: translateY(-1px); color: #fff; }
        .btn-reset:disabled { opacity: .5; transform: none; }
        .progress-wrap {
            display: none; margin-top: 16px;
        }
        .progress-wrap .progress {
            height: 5px; border-radius: 3px; background: #E7E7EA;
        }
        .progress-wrap .progress-bar {
            background: linear-gradient(90deg, #0F7A4E, #1D9E63);
            border-radius: 3px; transition: width .3s;
        }
        .strength-bar {
            height: 4px; border-radius: 2px; background: #E7E7EA;
            margin-top: 6px; overflow: hidden;
        }
        .strength-bar .fill {
            height: 100%; border-radius: 2px; transition: width .3s, background .3s;
            width: 0%;
        }
        @media (max-width: 480px) {
            .reset-card { margin: 16px; padding: 24px 20px; }
        }
    </style>
</head>
<body>

<div class="reset-card">
    <a th:href="@{/login}" class="btn-close position-absolute top-0 end-0 m-3" aria-label="Close"></a>

    <div class="reset-icon">
        <i class="bi bi-shield-lock" style="font-size:1.8rem; color:#0F7A4E;"></i>
    </div>

    <h4 class="fw-bold mb-1">Reset Your Password</h4>
    <p class="text-muted mb-4" style="font-size:0.88rem;">
        Choose a strong new password for your account.
    </p>

    <!-- Alerts -->
    <div th:if="${success}" class="alert py-2 small text-start mb-3" style="background:rgba(15,122,78,.08); border:1px solid rgba(15,122,78,.2); border-radius:10px; color:#0F7A4E;">
        <i class="bi bi-check-circle-fill me-1"></i><span th:text="${success}"></span>
    </div>
    <div th:if="${error}" class="alert alert-danger py-2 small text-start mb-3" style="border-radius:10px;">
        <i class="bi bi-exclamation-triangle me-1"></i><span th:text="${error}"></span>
    </div>

    <form th:action="@{/reset-password}" method="post" id="resetForm">
        <input type="hidden" name="token" th:value="${token}">

        <div class="mb-3 text-start">
            <label class="form-label fw-medium" style="font-size:0.88rem;">
                <i class="bi bi-lock me-1" style="color:#0F7A4E;"></i> New Password
            </label>
            <div class="input-group">
                <input type="password" name="password" id="password" class="form-control" placeholder="Enter new password" required minlength="6"
                       style="border-radius:10px 0 0 10px;">
                <button class="btn btn-outline-secondary" type="button" onclick="togglePassword('password', this)"
                        style="border-radius:0 10px 10px 0; border-color:#E7E7EA;">
                    <i class="bi bi-eye"></i>
                </button>
            </div>
            <div class="strength-bar"><div class="fill" id="strengthFill"></div></div>
            <small class="text-muted d-block mt-1" id="strengthText" style="font-size:0.75rem; text-align:left;"></small>
        </div>

        <div class="mb-3 text-start">
            <label class="form-label fw-medium" style="font-size:0.88rem;">
                <i class="bi bi-lock-fill me-1" style="color:#0F7A4E;"></i> Confirm Password
            </label>
            <div class="input-group">
                <input type="password" id="confirmPassword" class="form-control" placeholder="Repeat new password" required
                       style="border-radius:10px 0 0 10px;">
                <button class="btn btn-outline-secondary" type="button" onclick="togglePassword('confirmPassword', this)"
                        style="border-radius:0 10px 10px 0; border-color:#E7E7EA;">
                    <i class="bi bi-eye"></i>
                </button>
            </div>
            <small class="d-block mt-1" id="matchText" style="font-size:0.75rem; text-align:left;"></small>
        </div>

        <button type="submit" class="btn btn-reset w-100" id="resetBtn">
            <i class="bi bi-check-circle me-1"></i> Reset Password
        </button>

        <!-- Progress bar -->
        <div class="progress-wrap" id="progressWrap">
            <div class="progress">
                <div class="progress-bar progress-bar-striped progress-bar-animated" id="progressBar" style="width:0%;"></div>
            </div>
            <small class="text-muted mt-1 d-block" style="font-size:0.78rem;">Updating your password...</small>
        </div>
    </form>

    <div class="mt-4 pt-3" style="border-top:1px solid #F0F0F0;">
        <a th:href="@{/login}" class="small text-decoration-none" style="color:#8A8A93;">
            <i class="bi bi-arrow-left me-1"></i>Back to Login
        </a>
    </div>
</div>

<script>
function togglePassword(fieldId, btn) {
    var field = document.getElementById(fieldId);
    var icon = btn.querySelector('i');
    if (field.type === 'password') {
        field.type = 'text';
        icon.classList.remove('bi-eye');
        icon.classList.add('bi-eye-slash');
    } else {
        field.type = 'password';
        icon.classList.remove('bi-eye-slash');
        icon.classList.add('bi-eye');
    }
}

document.addEventListener('DOMContentLoaded', function() {
    var passwordInput = document.getElementById('password');
    var confirmInput = document.getElementById('confirmPassword');
    var strengthFill = document.getElementById('strengthFill');
    var strengthText = document.getElementById('strengthText');
    var matchText = document.getElementById('matchText');
    var form = document.getElementById('resetForm');
    var btn = document.getElementById('resetBtn');
    var progressWrap = document.getElementById('progressWrap');
    var progressBar = document.getElementById('progressBar');

    // Password strength indicator
    passwordInput.addEventListener('input', function() {
        var val = this.value;
        var score = 0;
        if (val.length >= 6) score++;
        if (val.length >= 10) score++;
        if (/[A-Z]/.test(val)) score++;
        if (/[0-9]/.test(val)) score++;
        if (/[^A-Za-z0-9]/.test(val)) score++;

        var pct = Math.min(score * 20, 100);
        var color = score <= 1 ? '#C33636' : score <= 2 ? '#F2B705' : score <= 3 ? '#E8611D' : '#0F7A4E';
        var label = score <= 1 ? 'Weak' : score <= 2 ? 'Fair' : score <= 3 ? 'Good' : 'Strong';

        strengthFill.style.width = pct + '%';
        strengthFill.style.background = color;
        strengthText.textContent = val.length > 0 ? 'Password strength: ' + label : '';
        strengthText.style.color = color;

        checkMatch();
    });

    // Confirm match check
    confirmInput.addEventListener('input', checkMatch);

    function checkMatch() {
        if (confirmInput.value.length === 0) { matchText.textContent = ''; return; }
        if (passwordInput.value === confirmInput.value) {
            matchText.textContent = 'Passwords match';
            matchText.style.color = '#0F7A4E';
        } else {
            matchText.textContent = 'Passwords do not match';
            matchText.style.color = '#C33636';
        }
    }

    // Form submit with progress
    form.addEventListener('submit', function(e) {
        if (passwordInput.value !== confirmInput.value) {
            e.preventDefault();
            matchText.textContent = 'Passwords do not match';
            matchText.style.color = '#C33636';
            confirmInput.focus();
            return;
        }

        if (!form.checkValidity()) return;

        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span> Resetting...';
        progressWrap.style.display = 'block';

        var width = 0;
        var interval = setInterval(function() {
            width += Math.random() * 15;
            if (width > 90) { width = 90; clearInterval(interval); }
            progressBar.style.width = width + '%';
        }, 300);
    });
});
</script>

</body>
</html>
