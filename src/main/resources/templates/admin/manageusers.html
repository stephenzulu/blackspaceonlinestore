<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Store | BlackSpace</title>
    <link rel="icon" type="image/png" th:href="@{/favicon.png}">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        html, body { height: 100%; overflow: hidden; background: #f0f2f5; }
        .sidebar { width: 250px; height: 100vh; position: sticky; top: 0; flex-shrink: 0; overflow-y: auto; }
        .main-content { flex: 1; overflow-y: auto; height: 100vh; }
        .page-header { background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); border-radius: 14px; padding: 20px 24px; color: #fff; margin-bottom: 20px; }
        .page-header h4 { margin: 0; font-weight: 700; }
        .page-header p { margin: 4px 0 0; color: rgba(255,255,255,.7); font-size: 0.85rem; }
        .content-card { border: none; border-radius: 14px; box-shadow: 0 2px 12px rgba(0,0,0,.06); }
    </style></head>
<body>
<nav class="navbar navbar-light bg-white border-bottom d-lg-none">
    <div class="container-fluid">
        <button class="btn btn-outline-primary" data-bs-toggle="offcanvas" data-bs-target="#mobileSidebar">
            <i class="bi bi-list"></i>
        </button>
        <span class="fw-bold">BlackSpace Admin</span>
    </div>
</nav>
<div class="d-flex">
    <div th:replace="fragments/sidebar :: desktopSidebar(${user})"></div>
    <div th:replace="fragments/sidebar :: mobileSidebar"></div>

    <main class="main-content p-3 p-md-4">
        <div class="container-fluid">

            <div class="page-header">
                <h4><i class="bi bi-people me-2"></i>Manage Users</h4>
                <p>View, edit, block, and manage user accounts</p>
            </div>

            <!-- Add button + search -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#addUserModal">
            <i class="bi bi-plus-circle"></i> Add User
        </button>
        <div id="customSearch"></div>
    </div>

    <!-- Users Table -->
    <table class="table display" id="myTable" style="width:100%">
        <thead>
        <tr>
            <th>#</th>
            <th>Username</th>
            <th>Email</th>
            <th>Role</th>
            <th>Status</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="u, stat : ${users}">
            <td th:text="${stat.count}"></td>
            <td th:text="${u.username}"></td>
            <td th:text="${u.email}"></td>
            <td th:text="${u.role}"></td>
            <td>
                <span class="badge"
                      th:classappend="${u.enabled} ? 'bg-success' : 'bg-danger'"
                      th:text="${u.enabled} ? 'Active' : 'Disabled'">
                </span>
            </td>
            <td>
                <button class="btn btn-secondary btn-sm"
                        th:data-id="${u.id}"
                        th:data-username="${u.username}"
                        th:data-email="${u.email}"
                        th:data-role="${u.role}"
                        th:data-enabled="${u.enabled}"
                        onclick="openEditModal(this)">
                    <i class="bi bi-pencil-square"></i>
                </button>

                <!-- Block/Unblock -->
                <button th:if="${u.enabled}" class="btn btn-warning btn-sm"
                        th:data-id="${u.id}"
                        th:data-name="${u.username}"
                        onclick="confirmBlock(this)" title="Block User">
                    <i class="bi bi-slash-circle"></i>
                </button>
                <button th:unless="${u.enabled}" class="btn btn-success btn-sm"
                        th:data-id="${u.id}"
                        th:data-name="${u.username}"
                        onclick="confirmUnblock(this)" title="Unblock User">
                    <i class="bi bi-check-circle"></i>
                </button>

                <button class="btn btn-danger btn-sm"
                        th:data-id="${u.id}"
                        th:data-name="${u.username}"
                        onclick="confirmDelete(this)" title="Delete User">
                    <i class="bi bi-trash-fill"></i>
                </button>
            </td>
        </tr>
        </tbody>
    </table>


        </div>
    </main>

</div>

<!-- ================= ADD USER MODAL ================= -->
<div class="modal fade" id="addUserModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content shadow">
            <form th:action="@{/admin/users/save}" method="post">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title">Add User</h5>
                    <button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">

                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" name="username" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Role</label>
                        <select name="role" class="form-select" required>
                            <option value="">Select role</option>
                            <option value="ADMIN">ADMIN</option>
                            <option value="SELLER">SELLER</option>
                        </select>
                    </div>

                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button class="btn btn-primary">Save</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- ================= EDIT USER MODAL ================= -->
<div class="modal fade" id="editUserModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content shadow">
            <form th:action="@{/admin/users/save}" method="post">
                <input type="hidden" name="id" id="editId">

                <div class="modal-header bg-warning">
                    <h5 class="modal-title">Edit User</h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">

                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" name="username" id="editUsername" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" id="editEmail" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Role</label>
                        <select name="role" id="editRole" class="form-select">
                            <option value="ADMIN">ADMIN</option>
                            <option value="SELLER">SELLER</option>
                        </select>
                    </div>

                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="editEnabled" name="enabled">
                        <label class="form-check-label">Enabled</label>
                    </div>

                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button class="btn btn-success">Update</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- JS Scripts -->
<!-- Include jQuery first, then DataTables JS -->
<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.datatables.net/1.13.5/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.5/js/dataTables.bootstrap5.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>


<script>
    $(document).ready(function () {
 // Initialize DataTable without "Show entries" dropdown
 var table = $('#myTable').DataTable({
     responsive: true,
     pageLength: 5, // default rows per page
     lengthChange: false, // remove the "Show entries" dropdown
     dom: '<"d-flex justify-content-between mb-2"f><"table-responsive"t><"d-flex justify-content-between mt-2"ip>', // only search (f) and pagination (ip)
     language: {
         search: "",
         searchPlaceholder: "Search username..."
     }
 });

 // Move the search box to custom div
 $("#customSearch").html($('.dataTables_filter'));

 // Enable Bootstrap tooltips
 $('[data-bs-toggle="tooltip"]').tooltip();
});


    function confirmBlock(btn) {
        Swal.fire({
            title: "Block user?",
            text: "Block " + btn.dataset.name + "? They will not be able to log in.",
            icon: "warning",
            showCancelButton: true,
            confirmButtonColor: "#ffc107",
            confirmButtonText: "Yes, block"
        }).then(result => {
            if (result.isConfirmed) {
                window.location.href = '/admin/users/block/' + btn.dataset.id;
            }
        });
    }

    function confirmUnblock(btn) {
        Swal.fire({
            title: "Unblock user?",
            text: "Unblock " + btn.dataset.name + "?",
            icon: "question",
            showCancelButton: true,
            confirmButtonColor: "#198754",
            confirmButtonText: "Yes, unblock"
        }).then(result => {
            if (result.isConfirmed) {
                window.location.href = '/admin/users/unblock/' + btn.dataset.id;
            }
        });
    }

    function confirmDelete(btn) {
        Swal.fire({
            title: "Delete user?",
            text: btn.dataset.name,
            icon: "warning",
            showCancelButton: true,
            confirmButtonColor: "#d33"
        }).then(result => {
            if (result.isConfirmed) {
                window.location.href = `/admin/users/delete/${btn.dataset.id}`;
            }
        });
    }


        function openEditModal(button) {
        // Read data attributes
        const id = button.getAttribute("data-id");
        const username = button.getAttribute("data-username");
        const email = button.getAttribute("data-email");
        const role = button.getAttribute("data-role");
        const enabled = button.getAttribute("data-enabled") === "true";

        // Fill form fields
        document.getElementById("editId").value = id;
        document.getElementById("editUsername").value = username;
        document.getElementById("editEmail").value = email;
        document.getElementById("editRole").value = role;
        document.getElementById("editEnabled").checked = enabled;

        // Show modal
        const modal = new bootstrap.Modal(document.getElementById("editUserModal"));
        modal.show();
    }

</script>

</body>
</html>
