<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Store | BlackSpace</title>
    <link rel="icon" type="image/png" th:href="@{'/uploads/favicon/' + ${siteSettings.siteFavicon}}">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        html, body { height: 100%; overflow: hidden; background: #F6F6F4; }
        .sidebar { width: 250px; height: 100vh; position: sticky; top: 0; flex-shrink: 0; overflow-y: auto; }
        .main-content { flex: 1; overflow-y: auto; height: 100vh; }
        .page-header { background: linear-gradient(135deg, #0E0E11, #3A3A40); border-radius: 14px; padding: 20px 24px; color: #fff; margin-bottom: 20px; }
        .page-header h4 { margin: 0; font-weight: 700; }
        .page-header p { margin: 4px 0 0; color: rgba(255,255,255,.7); font-size: 0.85rem; }
        .content-card { border: none; border-radius: 14px; box-shadow: 0 2px 12px rgba(0,0,0,.06); }
    </style></head>
<body>
<nav class="navbar navbar-light bg-white border-bottom d-lg-none">
    <div class="container-fluid">
        <button class="btn btn-outline-primary" data-bs-toggle="offcanvas" data-bs-target="#mobileSidebar">
            <i class="bi bi-list"></i>
        </button>
        <span class="fw-bold">BlackSpace Admin</span>
    </div>
</nav>
<div class="d-flex">
    <div th:replace="fragments/sidebar :: desktopSidebar(${user})"></div>
    <div th:replace="fragments/sidebar :: mobileSidebar"></div>

    <main class="main-content p-3 p-md-4">
        <div class="container-fluid">

            <div class="page-header">
                <h4><i class="bi bi-people me-2"></i>Manage Users</h4>
                <p>View, edit, block, and manage user accounts</p>
            </div>

            <!-- Alerts -->
            <div th:if="${success}" class="alert alert-success alert-dismissible fade show py-2 small" role="alert">
                <i class="bi bi-check-circle me-1"></i><span th:text="${success}"></span>
                <button type="button" class="btn-close btn-sm" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show py-2 small" role="alert">
                <i class="bi bi-exclamation-triangle me-1"></i><span th:text="${error}"></span>
                <button type="button" class="btn-close btn-sm" data-bs-dismiss="alert"></button>
            </div>

            <!-- Add button + search -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <button class="btn" style="background:#0E0E11; color:#fff; border:none; border-radius:10px; padding:8px 18px; font-size:0.88rem;" data-bs-toggle="modal" data-bs-target="#addUserModal">
            <i class="bi bi-plus-circle me-1"></i> Add User
        </button>
        <div id="customSearch"></div>
    </div>

    <!-- Users Table -->
    <table class="table display" id="myTable" style="width:100%">
        <thead>
        <tr>
            <th>#</th>
            <th>Username</th>
            <th>Email</th>
            <th>Role</th>
            <th>Status</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="u, stat : ${users}">
            <td th:text="${stat.count}"></td>
            <td th:text="${u.username}"></td>
            <td th:text="${u.email}"></td>
            <td th:text="${u.role}"></td>
            <td>
                <span class="badge"
                      th:classappend="${u.enabled} ? 'bg-success' : 'bg-danger'"
                      th:text="${u.enabled} ? 'Active' : 'Disabled'">
                </span>
            </td>
            <td>
                <button class="btn btn-outline-warning btn-sm" style="border-radius:8px; width:34px; height:34px; padding:0; display:inline-flex; align-items:center; justify-content:center;"
                        th:data-id="${u.id}"
                        th:data-username="${u.username}"
                        th:data-email="${u.email}"
                        th:data-role="${u.role}"
                        th:data-status="${u.status}"
                        th:data-enabled="${u.enabled}"
                        onclick="openEditModal(this)">
                    <i class="bi bi-pencil-square"></i>
                </button>

                <!-- Block/Unblock -->
                <button th:if="${u.enabled}" class="btn btn-outline-warning btn-sm" style="border-radius:8px; width:34px; height:34px; padding:0; display:inline-flex; align-items:center; justify-content:center;"
                        th:data-id="${u.id}"
                        th:data-name="${u.username}"
                        onclick="confirmBlock(this)" title="Block User">
                    <i class="bi bi-slash-circle"></i>
                </button>
                <button th:unless="${u.enabled}" class="btn btn-outline-success btn-sm" style="border-radius:8px; width:34px; height:34px; padding:0; display:inline-flex; align-items:center; justify-content:center;"
                        th:data-id="${u.id}"
                        th:data-name="${u.username}"
                        onclick="confirmUnblock(this)" title="Unblock User">
                    <i class="bi bi-check-circle"></i>
                </button>

                <button class="btn btn-outline-primary btn-sm" style="border-radius:8px; width:34px; height:34px; padding:0; display:inline-flex; align-items:center; justify-content:center;"
                        th:data-email="${u.email}"
                        th:data-name="${u.firstName + ' ' + u.lastName}"
                        onclick="confirmSendReset(this)" title="Send Password Reset">
                    <i class="bi bi-key"></i>
                </button>

                <button class="btn btn-outline-danger btn-sm" style="border-radius:8px; width:34px; height:34px; padding:0; display:inline-flex; align-items:center; justify-content:center;"
                        th:data-id="${u.id}"
                        th:data-name="${u.username}"
                        onclick="confirmDelete(this)" title="Delete User">
                    <i class="bi bi-trash-fill"></i>
                </button>
            </td>
        </tr>
        </tbody>
    </table>


        </div>
    </main>

</div>

<!-- ================= ADD USER MODAL ================= -->
<div class="modal fade" id="addUserModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0" style="border-radius:16px; overflow:hidden; box-shadow:0 20px 60px rgba(0,0,0,.15);">
            <form th:action="@{/admin/users/save}" method="post">
                <div class="modal-header px-4 py-3" style="background:linear-gradient(135deg,#0E0E11,#3A3A40); border-bottom:none;">
                    <div>
                        <h5 class="modal-title fw-bold mb-0" style="color:#fff; font-size:1.1rem;">
                            <i class="bi bi-person-plus me-2" style="color:#E8611D;"></i>Add User
                        </h5>
                        <p class="mb-0" style="color:rgba(255,255,255,.5); font-size:0.78rem;">Create a new user account</p>
                    </div>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4" style="background:#F6F6F4;">
                    <div class="card border-0 p-3" style="border-radius:14px;">
                        <h6 class="fw-semibold mb-3" style="font-size:0.9rem;">User Details</h6>
                        <div class="row g-3">
                            <div class="col-12">
                                <label class="form-label" style="font-size:0.85rem;">Username</label>
                                <input type="text" name="username" class="form-control" style="border-radius:10px;" required>
                            </div>
                            <div class="col-12">
                                <label class="form-label" style="font-size:0.85rem;">Email</label>
                                <input type="email" name="email" class="form-control" style="border-radius:10px;" required>
                            </div>
                            <div class="col-12">
                                <label class="form-label" style="font-size:0.85rem;">Password</label>
                                <input type="password" name="password" class="form-control" style="border-radius:10px;" required>
                            </div>
                            <div class="col-12">
                                <label class="form-label" style="font-size:0.85rem;">Role</label>
                                <select name="role" class="form-select" style="border-radius:10px;" required>
                                    <option value="">Select role</option>
                                    <option value="ADMIN">ADMIN</option>
                                    <option value="SELLER">SELLER</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer border-0 px-4 py-3" style="background:#F6F6F4;">
                    <div class="d-flex justify-content-end gap-2">
                        <button type="button" class="btn btn-light" style="border-radius:10px; padding:8px 20px;" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn" style="background:#0E0E11; color:#fff; border:none; border-radius:10px; padding:8px 24px;">Save</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- ================= EDIT USER MODAL ================= -->
<div class="modal fade" id="editUserModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0" style="border-radius:16px; overflow:hidden; box-shadow:0 20px 60px rgba(0,0,0,.15);">
            <form th:action="@{/admin/users/save}" method="post">
                <input type="hidden" name="id" id="editId">

                <div class="modal-header px-4 py-3" style="background:linear-gradient(135deg,#0E0E11,#3A3A40); border-bottom:none;">
                    <div>
                        <h5 class="modal-title fw-bold mb-0" style="color:#fff; font-size:1.1rem;">
                            <i class="bi bi-pencil-square me-2" style="color:#E8611D;"></i>Edit User
                        </h5>
                        <p class="mb-0" style="color:rgba(255,255,255,.5); font-size:0.78rem;">Update user account details</p>
                    </div>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body p-4" style="background:#F6F6F4;">
                    <div class="card border-0 p-3" style="border-radius:14px;">
                        <h6 class="fw-semibold mb-3" style="font-size:0.9rem;">User Details</h6>
                        <div class="row g-3">
                            <div class="col-12">
                                <label class="form-label" style="font-size:0.85rem;">Username</label>
                                <input type="text" name="username" id="editUsername" class="form-control" style="border-radius:10px;" required>
                            </div>
                            <div class="col-12">
                                <label class="form-label" style="font-size:0.85rem;">Email</label>
                                <input type="email" name="email" id="editEmail" class="form-control" style="border-radius:10px;" required>
                            </div>
                            <div class="col-12">
                                <label class="form-label" style="font-size:0.85rem;">Role</label>
                                <select name="role" id="editRole" class="form-select" style="border-radius:10px;">
                                    <option value="ADMIN">ADMIN</option>
                                    <option value="SELLER">SELLER</option>
                                </select>
                            </div>
                            <div class="col-12">
                                <label class="form-label" style="font-size:0.85rem;">Status</label>
                                <select name="status" id="editStatus" class="form-select" style="border-radius:10px;">
                                    <option value="1">Active</option>
                                    <option value="0">Inactive</option>
                                </select>
                            </div>
                            <div class="col-12">
                                <div class="form-check">
                                    <input type="hidden" name="enabled" value="false">
                                    <input class="form-check-input" type="checkbox" id="editEnabled" name="enabled" value="true">
                                    <label class="form-check-label" style="font-size:0.85rem;">Enabled</label>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer border-0 px-4 py-3" style="background:#F6F6F4;">
                    <div class="d-flex justify-content-end gap-2">
                        <button type="button" class="btn btn-light" style="border-radius:10px; padding:8px 20px;" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn" style="background:#0E0E11; color:#fff; border:none; border-radius:10px; padding:8px 24px;">Update</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Hidden form for password reset -->
<form id="resetPasswordForm" action="/admin/send-reset-link" method="post" style="display:none;">
    <input type="hidden" name="email" id="resetEmail">
    <input type="hidden" name="redirectTo" value="/admin/users">
</form>

<!-- JS Scripts -->
<!-- Include jQuery first, then DataTables JS -->
<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.datatables.net/1.13.5/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.5/js/dataTables.bootstrap5.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>


<script>
    $(document).ready(function () {
 // Initialize DataTable without "Show entries" dropdown
 var table = $('#myTable').DataTable({
     responsive: true,
     pageLength: 5, // default rows per page
     lengthChange: false, // remove the "Show entries" dropdown
     dom: '<"d-flex justify-content-between mb-2"f><"table-responsive"t><"d-flex justify-content-between mt-2"ip>', // only search (f) and pagination (ip)
     language: {
         search: "",
         searchPlaceholder: "Search username..."
     }
 });

 // Move the search box to custom div
 $("#customSearch").html($('.dataTables_filter'));

 // Enable Bootstrap tooltips
 $('[data-bs-toggle="tooltip"]').tooltip();
});


    function confirmBlock(btn) {
        Swal.fire({
            title: "Block user?",
            text: "Block " + btn.dataset.name + "? They will not be able to log in.",
            icon: "warning",
            showCancelButton: true,
            confirmButtonColor: "#F2B705",
            confirmButtonText: "Yes, block"
        }).then(result => {
            if (result.isConfirmed) {
                window.location.href = '/admin/users/block/' + btn.dataset.id;
            }
        });
    }

    function confirmUnblock(btn) {
        Swal.fire({
            title: "Unblock user?",
            text: "Unblock " + btn.dataset.name + "?",
            icon: "question",
            showCancelButton: true,
            confirmButtonColor: "#0F7A4E",
            confirmButtonText: "Yes, unblock"
        }).then(result => {
            if (result.isConfirmed) {
                window.location.href = '/admin/users/unblock/' + btn.dataset.id;
            }
        });
    }

    function confirmDelete(btn) {
        Swal.fire({
            title: "Delete user?",
            text: btn.dataset.name,
            icon: "warning",
            showCancelButton: true,
            confirmButtonColor: "#C33636"
        }).then(result => {
            if (result.isConfirmed) {
                window.location.href = `/admin/users/delete/${btn.dataset.id}`;
            }
        });
    }


    function confirmSendReset(btn) {
        var email = btn.dataset.email;
        var name = btn.dataset.name;
        Swal.fire({
            title: 'Send Password Reset?',
            html: '<p style="font-size:0.9rem; color:#3A3A40;">Send a password reset link to <strong>' + name + '</strong><br><span style="color:#8A8A93;">' + email + '</span></p>',
            icon: 'question',
            showCancelButton: true,
            confirmButtonText: '<i class="bi bi-send me-1"></i> Send Reset Link',
            confirmButtonColor: '#E8611D',
            cancelButtonColor: '#8A8A93',
            customClass: { popup: 'rounded-4' }
        }).then(function(result) {
            if (result.isConfirmed) {
                document.getElementById('resetEmail').value = email;
                document.getElementById('resetPasswordForm').submit();
            }
        });
    }

        function openEditModal(button) {
        // Read data attributes
        const id = button.getAttribute("data-id");
        const username = button.getAttribute("data-username");
        const email = button.getAttribute("data-email");
        const role = button.getAttribute("data-role");
        const status = button.getAttribute("data-status") || "Active";
        const enabled = button.getAttribute("data-enabled") === "true";

        // Fill form fields
        document.getElementById("editId").value = id;
        document.getElementById("editUsername").value = username;
        document.getElementById("editEmail").value = email;
        document.getElementById("editRole").value = role;
        document.getElementById("editStatus").value = status;
        document.getElementById("editEnabled").checked = enabled;

        // Show modal
        const modal = new bootstrap.Modal(document.getElementById("editUserModal"));
        modal.show();
    }

</script>

</body>
</html>
