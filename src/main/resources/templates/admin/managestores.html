<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Store | BlackSpace</title>
    <link rel="icon" type="image/png" th:href="@{/favicon.png}">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body { overflow-x: hidden; }
        html, body { height: 100%; overflow: hidden; background: #f0f2f5; }
        .sidebar { width: 250px; height: 100vh; position: sticky; top: 0; flex-shrink: 0; overflow-y: auto; }
        .main-content { flex: 1; overflow-y: auto; height: 100vh; }
        .page-header { background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); border-radius: 14px; padding: 20px 24px; color: #fff; margin-bottom: 20px; }
        .page-header h4 { margin: 0; font-weight: 700; }
        .page-header p { margin: 4px 0 0; color: rgba(255,255,255,.7); font-size: 0.85rem; }
        .content-card { border: none; border-radius: 14px; box-shadow: 0 2px 12px rgba(0,0,0,.06); }
    </style></head>
<body>
<nav class="navbar navbar-light bg-white border-bottom d-lg-none">
    <div class="container-fluid">
        <button class="btn btn-outline-primary" data-bs-toggle="offcanvas" data-bs-target="#mobileSidebar">
            <i class="bi bi-list"></i>
        </button>
        <span class="fw-bold">BlackSpace Admin</span>
    </div>
</nav>
<div class="d-flex">
    <div th:replace="fragments/sidebar :: desktopSidebar(${user})"></div>
    <div th:replace="fragments/sidebar :: mobileSidebar"></div>

    <main class="main-content p-3 p-md-4">
        <div class="container-fluid">

            <div class="page-header">
                <h4><i class="bi bi-shop-window me-2"></i>Manage Stores</h4>
                <p>View and manage all registered stores</p>
            </div>
            <div class="d-flex justify-content-between align-items-center mb-3">
                <div>
                    <button type="button" class="btn btn-success" data-bs-toggle="modal" data-bs-target="#addStoreModal">
                        <i class="bi bi-plus-circle"></i> Add Store
                    </button>
                </div>
                <div id="customSearch"></div>
            </div>

            <table class="table display" id="myTable" style="width:100%">
            <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Contact Number</th>
            <th>WhatsApp Number</th>
            <th>Description</th>
            <th>Status</th>
            <th>Created On</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="store : ${stores}">
            <td th:text="${store.id}"></td>
            <td th:text="${store.name}"></td>
            <td th:text="${store.email}"></td>
            <td th:text="${store.contactNumber}"></td>
            <td th:text="${store.whatsappNumber}"></td>
            <td th:text="${#strings.abbreviate(store.description, 50)}"></td>

            <td>
        <span class="badge"
              th:classappend="${store.active} ? 'bg-success' : 'bg-danger'"
              th:text="${store.active} ? 'Active' : 'Inactive'">
        </span>
            </td>

            <!-- CREATED DATE -->
            <td th:text="${#temporals.format(store.createdAt, 'dd MMM yyyy')}"></td>

            <td>
                <!-- Edit Button -->
                <button class="btn btn-secondary btn-sm"
                        type="button"
                        th:attr="data-id=${store.id},
                 data-name=${store.name},
                 data-email=${store.email},
                 data-contact=${store.contactNumber},
                 data-whatsapp=${store.whatsappNumber},
                 data-description=${store.description},
                 data-active=${store.active},
                 data-logo=${store.storelogo},
                 data-banner=${store.storebanner}"
                        onclick="openEditModal(this)"
                        data-bs-toggle="tooltip"
                        data-bs-placement="top"
                        title="Edit Store">

                    <i class="bi bi-pencil-square"></i>
                </button>



                <!-- Delete Button -->
                <button class="btn btn-danger btn-sm"
                        type="button"
                        th:attr="data-id=${store.id}, data-name=${store.name}"
                        onclick="confirmDelete(this)"
                        data-bs-toggle="tooltip"
                        data-bs-placement="top"
                        title="Delete Store">
                    <i class="bi bi-trash-fill"></i>
                </button>
            </td>
        </tr>
        </tbody>
    </table>



        </div>
   </main>

</div>


<!-- Add Store Modal -->
<!-- Add Store Modal -->
<div class="modal fade" id="addStoreModal" tabindex="-1" aria-labelledby="addStoreModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content border-0 shadow-lg">

            <div class="modal-header bg-success text-white">
                <h5 class="modal-title fs-5 fw-semibold" id="addStoreModalLabel">
                    <i class="bi bi-plus-circle me-2"></i>Add Store
                </h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>

            <form th:action="@{/admin/stores/add}"
                  method="post"
                  enctype="multipart/form-data">

                <div class="modal-body p-4">

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Store Name</label>
                            <input type="text" class="form-control" name="name" required>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" name="email" required>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Contact Number</label>
                            <input type="text" class="form-control" name="contactNumber">
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">WhatsApp Number</label>
                            <input type="text" class="form-control" name="whatsappNumber">
                        </div>

                        <!-- LOGO -->
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Store Logo</label>
                            <input type="file" class="form-control" name="logoFile" accept="image/*">
                        </div>

                        <!-- BANNER -->
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Store Banner</label>
                            <input type="file" class="form-control" name="bannerFile" accept="image/*">
                        </div>

                        <div class="col-12 mb-3">
                            <label class="form-label">Description</label>
                            <textarea class="form-control" name="description" rows="3"></textarea>
                        </div>
                    </div>

                </div>

                <div class="modal-footer border-top-0">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-success">
                        <i class="bi bi-check-circle me-1"></i>Save Store
                    </button>
                </div>

            </form>

        </div>
    </div>
</div>


<!-- Edit Store Modal -->
<div class="modal fade" id="editStoreModal" tabindex="-1" aria-labelledby="editStoreModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content border-0 shadow-lg">

            <div class="modal-header bg-secondary text-white">
                <h5 class="modal-title fs-5 fw-semibold" id="editStoreModalLabel">
                    <i class="bi bi-pencil-square me-2"></i>Edit Store
                </h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>

            <form id="editStoreForm"
                  method="post"
                  th:action="@{/admin/stores/update}"
                  enctype="multipart/form-data">

                <div class="modal-body p-4">
                    <input type="hidden" id="editStoreId" name="id">

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Name</label>
                            <input type="text" class="form-control" id="editStoreName" name="name" required>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" id="editStoreEmail" name="email" required>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Contact Number</label>
                            <input type="text" class="form-control" id="editStoreContact" name="contactNumber">
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">WhatsApp Number</label>
                            <input type="text" class="form-control" id="editStoreWhatsapp" name="whatsappNumber">
                        </div>

                        <!-- CURRENT LOGO -->
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Current Logo</label><br>
                            <img id="currentLogo" class="img-thumbnail mb-2"
                                 style="max-height:80px">
                            <input type="file" class="form-control" name="logoFile" accept="image/*">
                        </div>

                        <!-- CURRENT BANNER -->
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Current Banner</label><br>
                            <img id="currentBanner" class="img-thumbnail mb-2"
                                 style="max-height:80px">
                            <input type="file" class="form-control" name="bannerFile" accept="image/*">
                        </div>

                        <div class="col-12 mb-3">
                            <label class="form-label">Description</label>
                            <textarea class="form-control"
                                      id="editStoreDescription"
                                      name="description"
                                      rows="3"></textarea>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Status</label>
                            <select class="form-select" id="editStoreActive" name="active">
                                <option value="true">Active</option>
                                <option value="false">Inactive</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="modal-footer border-top-0">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-secondary">
                        <i class="bi bi-save me-1"></i>Update Store
                    </button>
                </div>

            </form>

        </div>
    </div>
</div>




<!-- Include jQuery first, then DataTables JS -->
<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.datatables.net/1.13.5/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.5/js/dataTables.bootstrap5.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
    $(document).ready(function () {
      // Initialize DataTable without "Show entries" dropdown
      var table = $('#myTable').DataTable({
          responsive: true,
          pageLength: 5, // default rows per page
          lengthChange: false, // remove the "Show entries" dropdown
          dom: '<"d-flex justify-content-between mb-2"f><"table-responsive"t><"d-flex justify-content-between mt-2"ip>', // only search (f) and pagination (ip)
          language: {
              search: "",
              searchPlaceholder: "Search stores..."
          }
      });

      // Move the search box to custom div
      $("#customSearch").html($('.dataTables_filter'));

      // Enable Bootstrap tooltips
      $('[data-bs-toggle="tooltip"]').tooltip();
  });

      // Edit Modal
     function openEditModal(button) {
    document.getElementById("editStoreId").value = button.dataset.id;
    document.getElementById("editStoreName").value = button.dataset.name;
    document.getElementById("editStoreEmail").value = button.dataset.email;
    document.getElementById("editStoreContact").value = button.dataset.contact;
    document.getElementById("editStoreWhatsapp").value = button.dataset.whatsapp;
    document.getElementById("editStoreDescription").value = button.dataset.description;
    document.getElementById("editStoreActive").value = button.dataset.active;

    document.getElementById("currentLogo").src =
        "/uploads/stores/" + button.dataset.logo;

    document.getElementById("currentBanner").src =
        "/uploads/stores/" + button.dataset.banner;

    new bootstrap.Modal(document.getElementById('editStoreModal')).show();
}






      // Delete store
      function confirmDelete(button) {
          const storeId = button.getAttribute('data-id');
          const storeName = button.getAttribute('data-name');

          Swal.fire({
              title: 'Are you sure?',
              html: `You are about to delete <b>${storeName}</b>. This action cannot be undone.`,
              icon: 'warning',
              showCancelButton: true,
              confirmButtonColor: '#d33',
              cancelButtonColor: '#6c757d',
              confirmButtonText: 'Yes, delete it!',
              cancelButtonText: 'Cancel'
          }).then((result) => {
              if (result.isConfirmed) {
                  fetch(`/admin/stores/delete/${storeId}`, { method: 'DELETE' })
                      .then(response => {
                          if (response.ok) {
                              Swal.fire({
                                  title: 'Deleted!',
                                  text: `${storeName} has been deleted.`,
                                  icon: 'success',
                                  timer: 1500,
                                  showConfirmButton: false
                              }).then(() => location.reload());
                          } else {
                              Swal.fire('Error!', 'Failed to delete the store.', 'error');
                          }
                      })
                      .catch(error => Swal.fire('Error!', 'An error occurred.', 'error'));
              }
          });
      }
</script>


</body>
</html>
