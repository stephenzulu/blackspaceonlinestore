<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Store | BlackSpace</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body { overflow-x: hidden; }
        .sidebar { width: 250px; min-height: 100vh; background: #fff; border-right: 1px solid #e5e5e5; flex-shrink: 0;  }
        .sidebar .nav-link { color: #333; font-weight: 500; }
        .sidebar .nav-link.active, .sidebar .nav-link:hover { background-color: #f0f4ff; color: #0d6efd; }
        .profile-avatar { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 3px solid #0d6efd; }
        @media (max-width: 991px) { .sidebar { display: none; } }
    </style></head>
<body class="bg-light">
<!-- Top Navbar (Mobile) -->
<nav class="navbar navbar-light bg-white border-bottom d-lg-none">
    <div class="container-fluid">
        <button class="btn btn-outline-primary" data-bs-toggle="offcanvas" data-bs-target="#mobileSidebar">
            <i class="bi bi-list"></i>
        </button>
        <span class="fw-bold">BlackSpace</span>
    </div>
</nav>
<div class="d-flex">



    <!-- Include Desktop Sidebar -->
    <div th:replace="fragments/sidebar :: desktopSidebar(${user})"></div>
    <!-- Include Mobile Sidebar -->
    <div th:replace="fragments/sidebar :: mobileSidebar"></div>

    <main class="flex-grow-1 p-4">


        <div class="container-fluid">

            <h2 class="text-center mb-4">Manage Payments</h2>

            <div class="d-flex justify-content-between align-items-center mb-3">

        <div id="customSearch"></div>
    </div>

            <table class="table display" id="myTable" style="width:100%">
            <thead>
        <tr>
            <th>#</th>
            <th>User Name</th>
            <th>Amount</th>
            <th>Method</th>
            <th>Type</th>
            <th>Description</th>
            <th>Status</th>
            <th>Date</th>
            <th width="120">Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="p, stat : ${payments}">
            <td th:text="${stat.count}"></td>
            <td th:text="${p.username}"></td>
            <td th:text="${p.amount}"></td>
            <td th:text="${p.transactionReference}"></td>
            <td th:text="${p.paymentMethod}"></td>
            <td th:text="${p.paymentType}"></td>
            <td>
                <span class="badge bg-success" th:text="${p.status}"></span>
            </td>
            <td th:text="${#temporals.format(p.createdtime,'yyyy-MM-dd HH:mm')}"></td>
            <td>
                <a th:href="@{/admin/payments/delete/{id}(id=${p.id})}"
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('Delete payment?')">
                    <i class="bi bi-trash"></i>
                </a>
            </td>
        </tr>
        </tbody>
    </table>



        </div>
    </main>

</div>

<!-- ADD PAYMENT MODAL -->
<div class="modal fade" id="addPaymentModal">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <form th:action="@{/admin/payments/add}" method="post">
                <div class="modal-header">
                    <h5>Add Payment</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <input name="username" class="form-control mb-2" placeholder="User Name" required>
                    <input name="amount" class="form-control mb-2" placeholder="Amount" required>

                    <select name="paymentMethod" class="form-select mb-2">
                        <option>Cash</option>
                        <option>MTN</option>
                        <option>Airtel</option>
                        <option>Card</option>
                    </select>

                    <select name="paymentType" class="form-select mb-2">
                        <option>MEMBERSHIP</option>
                        <option>SUBSCRIPTION</option>
                    </select>

                    <input name="transactionReference" class="form-control mb-2" placeholder="Description" required>

                    <input name="transactionReference" class="form-control mb-2"
                           placeholder="Transaction Reference">
                </div>

                <div class="modal-footer">
                    <button class="btn btn-primary">Save</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- JS Scripts -->
<!-- Include jQuery first, then DataTables JS -->
<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.datatables.net/1.13.5/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.5/js/dataTables.bootstrap5.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
    $(document).ready(function () {
 // Initialize DataTable without "Show entries" dropdown
 var table = $('#myTable').DataTable({
     responsive: true,
     pageLength: 5, // default rows per page
     lengthChange: false, // remove the "Show entries" dropdown
     dom: '<"d-flex justify-content-between mb-2"f><"table-responsive"t><"d-flex justify-content-between mt-2"ip>', // only search (f) and pagination (ip)
     language: {
         search: "",
         searchPlaceholder: "Search payer name..."
     }
 });

 // Move the search box to custom div
 $("#customSearch").html($('.dataTables_filter'));

 // Enable Bootstrap tooltips
 $('[data-bs-toggle="tooltip"]').tooltip();
});
</script>

</body>
</html>
