<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Store | BlackSpace</title>
    <link rel="icon" type="image/png" th:href="@{'/uploads/favicon/' + ${siteSettings.siteFavicon}}">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        html, body { height: 100%; overflow: hidden; background: #F6F6F4; }
        .sidebar { width: 250px; height: 100vh; position: sticky; top: 0; flex-shrink: 0; overflow-y: auto; }
        .main-content { flex: 1; overflow-y: auto; height: 100vh; }
        .page-header { background: linear-gradient(135deg, #0E0E11, #3A3A40); border-radius: 14px; padding: 20px 24px; color: #fff; margin-bottom: 20px; }
        .page-header h4 { margin: 0; font-weight: 700; }
        .page-header p { margin: 4px 0 0; color: rgba(255,255,255,.7); font-size: 0.85rem; }
        .content-card { border: none; border-radius: 14px; box-shadow: 0 2px 12px rgba(0,0,0,.06); }
    </style></head>
<body>
<nav class="navbar navbar-light bg-white border-bottom d-lg-none">
    <div class="container-fluid">
        <button class="btn btn-outline-primary" data-bs-toggle="offcanvas" data-bs-target="#mobileSidebar">
            <i class="bi bi-list"></i>
        </button>
        <span class="fw-bold">BlackSpace Admin</span>
    </div>
</nav>
<div class="d-flex">
    <div th:replace="fragments/sidebar :: desktopSidebar(${user})"></div>
    <div th:replace="fragments/sidebar :: mobileSidebar"></div>

    <main class="main-content p-3 p-md-4">
        <div class="container-fluid">

            <div class="page-header">
                <h4><i class="bi bi-credit-card-2-front me-2"></i>Manage Subscriptions</h4>
                <p>View and manage subscription plans</p>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-3">
        <button class="btn" style="background:#0E0E11; color:#fff; border:none; border-radius:10px; padding:8px 18px; font-size:0.88rem;" data-bs-toggle="modal" data-bs-target="#addSubscriptionModal">
            <i class="bi bi-plus-circle me-1"></i> Add Subscription
        </button>
        <div id="customSearch"></div>
    </div>

    <!-- TABLE -->
            <table class="table display" id="myTable" style="width:100%">
            <thead>
        <tr>
            <th>#</th>
            <th>Name</th>
            <th>description</th>
            <th>Amount</th>
            <th>Duration in Days</th>
            <th>Number of Products</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="m, stat : ${subscriptions}">
            <td th:text="${stat.count}"></td>
            <td th:text="${m.name}"></td>
            <td th:text="${m.description}"></td>
            <td th:text="${m.amount}"></td>
            <td th:text="${m.durationtime}"></td>
            <td th:text="${m.numberofproducts}"></td>
            <td>
                <button class="btn btn-outline-warning btn-sm" style="border-radius:8px; width:34px; height:34px; padding:0; display:inline-flex; align-items:center; justify-content:center;"
                        th:attr="
            data-id=${m.id},
            data-name=${m.name},
            data-description=${m.description},
            data-amount=${m.amount},
            data-durationtime=${m.durationtime},
            data-numberofproducts=${m.numberofproducts}
        "
                        onclick="openEditModal(this)">
                    <i class="bi bi-pencil-square"></i>
                </button>


                <a th:href="@{/admin/subscription/delete/{id}(id=${m.id})}"
                   class="btn btn-outline-danger btn-sm" style="border-radius:8px; width:34px; height:34px; padding:0; display:inline-flex; align-items:center; justify-content:center;"
                   onclick="return confirm('Delete this subscription?')">
                    <i class="bi bi-trash"></i>
                </a>
            </td>
        </tr>
        </tbody>
    </table>


        </div>
    </main>

</div>


<!-- ================= ADD MODAL ================= -->
<div class="modal fade" id="addSubscriptionModal">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0" style="border-radius:16px; overflow:hidden; box-shadow:0 20px 60px rgba(0,0,0,.15);">

            <form th:action="@{/admin/subscription/add}" method="post">
                <div class="modal-header px-4 py-3" style="background:linear-gradient(135deg,#0E0E11,#3A3A40); border-bottom:none;">
                    <div>
                        <h5 class="modal-title fw-bold mb-0" style="color:#fff; font-size:1.1rem;">
                            <i class="bi bi-credit-card me-2" style="color:#E8611D;"></i>Add Subscription
                        </h5>
                        <p class="mb-0" style="color:rgba(255,255,255,.5); font-size:0.78rem;">Create a new subscription plan</p>
                    </div>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body p-4" style="background:#F6F6F4;">
                    <div class="bg-white rounded-3 p-3" style="border-radius:14px;">
                        <h6 class="fw-semibold mb-3" style="font-size:0.9rem;">Subscription Details</h6>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label" style="font-size:0.85rem;">Name</label>
                                <input type="text" name="name" class="form-control" style="border-radius:10px;" placeholder="Name" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label" style="font-size:0.85rem;">Duration (Days)</label>
                                <input type="text" name="durationtime" class="form-control" style="border-radius:10px;" placeholder="Duration" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label" style="font-size:0.85rem;">Number of Products</label>
                                <input type="text" name="numberofproducts" class="form-control" style="border-radius:10px;" placeholder="Number of Products" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label" style="font-size:0.85rem;">Amount</label>
                                <input type="text" name="amount" class="form-control" style="border-radius:10px;" placeholder="Amount">
                            </div>
                            <div class="col-12">
                                <label class="form-label" style="font-size:0.85rem;">Description</label>
                                <textarea name="description" class="form-control" style="border-radius:10px;" placeholder="Description"></textarea>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="modal-footer" style="background:#F6F6F4; border-top:none;">
                    <div class="d-flex justify-content-end gap-2">
                        <button type="button" class="btn btn-light" style="border-radius:10px; padding:8px 20px;" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn" style="background:#0E0E11; color:#fff; border:none; border-radius:10px; padding:8px 24px;">Save</button>
                    </div>
                </div>
            </form>

        </div>
    </div>
</div>

<!-- ================= EDIT MODAL ================= -->
<div class="modal fade" id="editsubscriptionModal">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0" style="border-radius:16px; overflow:hidden; box-shadow:0 20px 60px rgba(0,0,0,.15);">

            <form th:action="@{/admin/subscription/update}" method="post">
                <input type="hidden" name="id" id="editId">

                <div class="modal-header px-4 py-3" style="background:linear-gradient(135deg,#0E0E11,#3A3A40); border-bottom:none;">
                    <div>
                        <h5 class="modal-title fw-bold mb-0" style="color:#fff; font-size:1.1rem;">
                            <i class="bi bi-pencil me-2" style="color:#E8611D;"></i>Edit Subscription
                        </h5>
                        <p class="mb-0" style="color:rgba(255,255,255,.5); font-size:0.78rem;">Update subscription plan details</p>
                    </div>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body p-4" style="background:#F6F6F4;">
                    <div class="bg-white rounded-3 p-3" style="border-radius:14px;">
                        <h6 class="fw-semibold mb-3" style="font-size:0.9rem;">Subscription Details</h6>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label" style="font-size:0.85rem;">Name</label>
                                <input id="editName" name="name" class="form-control" style="border-radius:10px;" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label" style="font-size:0.85rem;">Duration (Days)</label>
                                <input id="editdurationtime" name="durationtime" class="form-control" style="border-radius:10px;" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label" style="font-size:0.85rem;">Number of Products</label>
                                <input id="editnumberofproducts" name="numberofproducts" class="form-control" style="border-radius:10px;" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label" style="font-size:0.85rem;">Amount</label>
                                <input id="editAmount" name="amount" class="form-control" style="border-radius:10px;">
                            </div>
                            <div class="col-12">
                                <label class="form-label" style="font-size:0.85rem;">Description</label>
                                <textarea id="editDescription" name="description" class="form-control" style="border-radius:10px;"></textarea>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="modal-footer" style="background:#F6F6F4; border-top:none;">
                    <div class="d-flex justify-content-end gap-2">
                        <button type="button" class="btn btn-light" style="border-radius:10px; padding:8px 20px;" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn" style="background:#0E0E11; color:#fff; border:none; border-radius:10px; padding:8px 24px;">Update</button>
                    </div>
                </div>
            </form>

        </div>
    </div>
</div>

<!-- Include jQuery first, then DataTables JS -->
<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.datatables.net/1.13.5/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.5/js/dataTables.bootstrap5.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>

    $(document).ready(function () {
     // Initialize DataTable without "Show entries" dropdown
     var table = $('#myTable').DataTable({
         responsive: true,
         pageLength: 5, // default rows per page
         lengthChange: false, // remove the "Show entries" dropdown
         dom: '<"d-flex justify-content-between mb-2"f><"table-responsive"t><"d-flex justify-content-between mt-2"ip>', // only search (f) and pagination (ip)
         language: {
             search: "",
             searchPlaceholder: "Search stores..."
         }
     });

     // Move the search box to custom div
     $("#customSearch").html($('.dataTables_filter'));

     // Enable Bootstrap tooltips
     $('[data-bs-toggle="tooltip"]').tooltip();
 });





   $(document).ready(function () {
       const table = $('#subscriptionTable').DataTable({
           pageLength: 5,
           lengthChange: false
       });
       $('#subscriptionTable_filter').appendTo('#customSearch');
   });

  function openEditModal(btn) {
    editId.value = btn.dataset.id;
    editName.value = btn.dataset.name;
    editdurationtime.value = btn.dataset.durationtime;
    editnumberofproducts.value = btn.dataset.numberofproducts;
    editAmount.value = btn.dataset.amount;
    editDescription.value = btn.dataset.description;

    new bootstrap.Modal(editsubscriptionModal).show();
}

</script>

</body>
</html>
