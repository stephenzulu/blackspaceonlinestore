<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Store | BlackSpace</title>
    <link rel="icon" type="image/png" th:href="@{'/uploads/favicon/' + ${siteSettings.siteFavicon}}">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        html, body { height: 100%; overflow: hidden; background: #F6F6F4; }
        .sidebar { width: 250px; height: 100vh; position: sticky; top: 0; flex-shrink: 0; overflow-y: auto; }
        .main-content { flex: 1; overflow-y: auto; height: 100vh; }
        .page-header { background: linear-gradient(135deg, #0E0E11, #3A3A40); border-radius: 14px; padding: 20px 24px; color: #fff; margin-bottom: 20px; }
        .page-header h4 { margin: 0; font-weight: 700; }
        .page-header p { margin: 4px 0 0; color: rgba(255,255,255,.7); font-size: 0.85rem; }
        .content-card { border: none; border-radius: 14px; box-shadow: 0 2px 12px rgba(0,0,0,.06); }
    </style></head>
<body>
<nav class="navbar navbar-light bg-white border-bottom d-lg-none">
    <div class="container-fluid">
        <button class="btn btn-outline-primary" data-bs-toggle="offcanvas" data-bs-target="#mobileSidebar">
            <i class="bi bi-list"></i>
        </button>
        <span class="fw-bold">BlackSpace Admin</span>
    </div>
</nav>
<div class="d-flex">
    <div th:replace="fragments/sidebar :: desktopSidebar(${user})"></div>
    <div th:replace="fragments/sidebar :: mobileSidebar"></div>

    <main class="main-content p-3 p-md-4">
        <div class="container-fluid">

            <div class="page-header">
                <h4><i class="bi bi-grid-3x3-gap me-2"></i>Manage Categories</h4>
                <p>View and manage product categories</p>
            </div>

    <!-- Search + Add button in same line -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <button type="button" class="btn" style="background:#0E0E11; color:#fff; border:none; border-radius:10px; padding:8px 18px; font-size:0.88rem;" data-bs-toggle="modal" data-bs-target="#addCategoryModal">
            <i class="bi bi-plus-circle me-1"></i> Add Category
        </button>
        <div id="customSearch"></div>
    </div>

    <!-- Categories Table -->
            <table class="table display" id="myTable" style="width:100%">
            <thead>
        <tr>
            <th>#</th>
            <th>Category Name</th>
            <th>Image</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="cat, stat : ${categories}">
            <td th:text="${stat.count}"></td>
            <td th:text="${cat.name}"></td>
            <td>
                <img th:src="@{'/uploads/categories/' + ${cat.catimages}}"
                     alt="Category Image"
                     style="width: 50px; height: 50px; object-fit: cover; margin-right: 10px;">
            </td>

            <td>
            <button class="btn btn-outline-warning btn-sm" style="border-radius:8px; width:34px; height:34px; padding:0; display:inline-flex; align-items:center; justify-content:center;"
                        type="button"
                        th:data-id="${cat.id}"
                        th:data-name="${cat.name}"
                        th:data-catimages="${cat.catimages}"
                        onclick="openEditModal(this)"
                        data-bs-toggle="tooltip"
                        data-bs-placement="top"
                        title="Edit">
                    <i class="bi bi-pencil-square"></i>
                </button>

                <button class="btn btn-outline-danger btn-sm" style="border-radius:8px; width:34px; height:34px; padding:0; display:inline-flex; align-items:center; justify-content:center;"
                        type="button"
                        th:data-id="${cat.id}"
                        th:data-name="${cat.name}"
                        th:data-catimages="${cat.catimages}"
                        onclick="confirmDelete(this)"
                        data-bs-toggle="tooltip"
                        data-bs-placement="top"
                        title="Delete">
                    <i class="bi bi-trash-fill"></i>
                </button>
            </td>
        </tr>
        </tbody>
    </table>


        </div>
    </main>

</div>


<!-- ================= ADD CATEGORY MODAL ================= -->
<div class="modal fade" id="addCategoryModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0" style="border-radius:16px; overflow:hidden; box-shadow:0 20px 60px rgba(0,0,0,.15);">
            <div class="modal-header px-4 py-3" style="background:linear-gradient(135deg,#0E0E11,#3A3A40); border-bottom:none;">
                <div>
                    <h5 class="modal-title fw-bold mb-0" style="color:#fff; font-size:1.1rem;">
                        <i class="bi bi-plus-circle me-2" style="color:#E8611D;"></i>Add Category
                    </h5>
                    <p class="mb-0" style="color:rgba(255,255,255,.5); font-size:0.78rem;">Create a new product category</p>
                </div>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4" style="background:#F6F6F4;">
                <form th:action="@{/admin/categories/add}" method="post" enctype="multipart/form-data">

                    <div class="card border-0 mb-3" style="border-radius:12px; box-shadow:0 1px 6px rgba(0,0,0,.04);">
                        <div class="card-body p-3">
                            <h6 class="text-uppercase fw-semibold mb-3" style="font-size:0.75rem; letter-spacing:0.05em; color:#6c757d;">Category Details</h6>
                            <div class="row g-3">
                                <div class="col-12">
                                    <label for="addCategoryName" class="form-label fw-medium" style="font-size:0.85rem;">Primary Category</label>
                                    <select class="form-select" id="addCategoryName" name="name" required style="border-radius:10px;">
                                        <option value="" disabled selected>-- Select Primary Category --</option>
                                        <option value="Electronics">Electronics</option>
                                        <option value="Fashion & Apparel">Fashion & Apparel</option>
                                        <option value="Beauty & Personal Care">Beauty & Personal Care</option>
                                        <option value="Home & Living">Home & Living</option>
                                        <option value="Groceries & Food">Groceries & Food</option>
                                        <option value="Health & Wellness">Health & Wellness</option>
                                        <option value="Baby, Kids & Toys">Baby, Kids & Toys</option>
                                        <option value="Sports & Outdoors">Sports & Outdoors</option>
                                        <option value="Automotive">Automotive</option>
                                        <option value="Media">Media</option>
                                        <option value="Office, Books & Stationery">Office, Books & Stationery</option>
                                        <option value="Hardware & Tools">Hardware & Tools</option>
                                        <option value="Jewelry & Accessories">Jewelry & Accessories</option>
                                        <option value="Pets & Pet Supplies">Pets & Pet Supplies</option>
                                        <option value="Digital Products">Digital Products</option>
                                        <option value="Services">Services</option>
                                        <option value="Real Estate & Housing">Real Estate & Housing</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="card border-0 mb-3" style="border-radius:12px; box-shadow:0 1px 6px rgba(0,0,0,.04);">
                        <div class="card-body p-3">
                            <h6 class="text-uppercase fw-semibold mb-3" style="font-size:0.75rem; letter-spacing:0.05em; color:#6c757d;">Category Image</h6>
                            <label for="addCategoryImage" class="d-flex flex-column align-items-center justify-content-center w-100 py-4" style="border:2px dashed #ccc; border-radius:12px; cursor:pointer; background:#fafafa; transition:border-color .2s;" onmouseover="this.style.borderColor='#E8611D'" onmouseout="this.style.borderColor='#ccc'">
                                <i class="bi bi-cloud-arrow-up" style="font-size:2rem; color:#aaa;"></i>
                                <span class="mt-2 fw-medium" style="font-size:0.85rem; color:#555;">Click to upload image</span>
                                <span style="font-size:0.75rem; color:#999;">PNG, JPG, WEBP accepted</span>
                            </label>
                            <input type="file" class="d-none" id="addCategoryImage" name="catimages" accept="image/*" required>
                        </div>
                    </div>

                    <div class="d-flex justify-content-end gap-2 pt-2">
                        <button type="button" class="btn btn-light" style="border-radius:10px; padding:8px 20px;" data-bs-dismiss="modal">
                            <i class="bi bi-x-circle me-1"></i>Cancel
                        </button>
                        <button type="submit" class="btn" style="background:#0E0E11; color:#fff; border:none; border-radius:10px; padding:8px 24px;">
                            <i class="bi bi-check-circle me-1"></i>Save
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- ================= EDIT CATEGORY MODAL ================= -->

<div class="modal fade" id="editCategoryModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0" style="border-radius:16px; overflow:hidden; box-shadow:0 20px 60px rgba(0,0,0,.15);">
            <div class="modal-header px-4 py-3" style="background:linear-gradient(135deg,#0E0E11,#3A3A40); border-bottom:none;">
                <div>
                    <h5 class="modal-title fw-bold mb-0" style="color:#fff; font-size:1.1rem;">
                        <i class="bi bi-pencil-square me-2" style="color:#E8611D;"></i>Edit Category
                    </h5>
                    <p class="mb-0" style="color:rgba(255,255,255,.5); font-size:0.78rem;">Update category details</p>
                </div>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4" style="background:#F6F6F4;">
                <form th:action="@{/admin/categories/update}" method="post" enctype="multipart/form-data">
                    <!-- Hidden ID -->
                    <input type="hidden" name="id" id="editCategoryId">

                    <div class="card border-0 mb-3" style="border-radius:12px; box-shadow:0 1px 6px rgba(0,0,0,.04);">
                        <div class="card-body p-3">
                            <h6 class="text-uppercase fw-semibold mb-3" style="font-size:0.75rem; letter-spacing:0.05em; color:#6c757d;">Category Details</h6>
                            <div class="row g-3">
                                <!-- Current Category Name (readonly) -->
                                <div class="col-12">
                                    <label for="editCategoryNameDisplay" class="form-label" style="font-size:0.85rem;">Current Category Name</label>
                                    <input type="text" id="editCategoryNameDisplay" class="form-control" style="border-radius:10px;" readonly>
                                </div>

                                <!-- New Category Name -->
                                <div class="col-12">
                                    <label class="form-label fw-medium" style="font-size:0.85rem;">New Category Name</label>
                                    <select class="form-select" id="editCategoryName" name="name" required style="border-radius:10px;">
                                        <option value="" disabled>-- Select Primary Category --</option>
                                        <option value="Electronics">Electronics</option>
                                        <option value="Fashion & Apparel">Fashion & Apparel</option>
                                        <option value="Beauty & Personal Care">Beauty & Personal Care</option>
                                        <option value="Home & Living">Home & Living</option>
                                        <option value="Groceries & Food">Groceries & Food</option>
                                        <option value="Health & Wellness">Health & Wellness</option>
                                        <option value="Baby, Kids & Toys">Baby, Kids & Toys</option>
                                        <option value="Sports & Outdoors">Sports & Outdoors</option>
                                        <option value="Automotive">Automotive</option>
                                        <option value="Media">Media</option>
                                        <option value="Office, Books & Stationery">Office, Books & Stationery</option>
                                        <option value="Hardware & Tools">Hardware & Tools</option>
                                        <option value="Jewelry & Accessories">Jewelry & Accessories</option>
                                        <option value="Pets & Pet Supplies">Pets & Pet Supplies</option>
                                        <option value="Digital Products">Digital Products</option>
                                        <option value="Services">Services</option>
                                        <option value="Real Estate & Housing">Real Estate & Housing</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="card border-0 mb-3" style="border-radius:12px; box-shadow:0 1px 6px rgba(0,0,0,.04);">
                        <div class="card-body p-3">
                            <h6 class="text-uppercase fw-semibold mb-3" style="font-size:0.75rem; letter-spacing:0.05em; color:#6c757d;">Category Image</h6>

                            <!-- Current Image Preview -->
                            <div class="mb-3 text-center">
                                <label class="form-label d-block text-start" style="font-size:0.85rem;">Current Image</label>
                                <img id="editCategoryImagePreview" src="" alt="Category Image"
                                     style="max-width:150px; border-radius:10px; display:block; margin-bottom:10px;">
                            </div>

                            <!-- Upload New Image -->
                            <label for="editCategoryImage" class="d-flex flex-column align-items-center justify-content-center w-100 py-4" style="border:2px dashed #ccc; border-radius:12px; cursor:pointer; background:#fafafa; transition:border-color .2s;" onmouseover="this.style.borderColor='#E8611D'" onmouseout="this.style.borderColor='#ccc'">
                                <i class="bi bi-cloud-arrow-up" style="font-size:2rem; color:#aaa;"></i>
                                <span class="mt-2 fw-medium" style="font-size:0.85rem; color:#555;">Click to upload new image</span>
                                <span style="font-size:0.75rem; color:#999;">PNG, JPG, WEBP accepted</span>
                            </label>
                            <input type="file" class="d-none" id="editCategoryImage" name="catimages" accept="image/*">
                        </div>
                    </div>

                    <div class="d-flex justify-content-end gap-2 pt-2">
                        <button type="button" class="btn btn-light" style="border-radius:10px; padding:8px 20px;" data-bs-dismiss="modal">
                            <i class="bi bi-x-circle me-1"></i>Cancel
                        </button>
                        <button type="submit" class="btn" style="background:#0E0E11; color:#fff; border:none; border-radius:10px; padding:8px 24px;">
                            <i class="bi bi-check-circle me-1"></i>Update
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- JS Scripts -->
<!-- Include jQuery first, then DataTables JS -->
<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.datatables.net/1.13.5/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.5/js/dataTables.bootstrap5.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>

    $(document).ready(function () {
 // Initialize DataTable without "Show entries" dropdown
 var table = $('#myTable').DataTable({
     responsive: true,
     pageLength: 5, // default rows per page
     lengthChange: false, // remove the "Show entries" dropdown
     dom: '<"d-flex justify-content-between mb-2"f><"table-responsive"t><"d-flex justify-content-between mt-2"ip>', // only search (f) and pagination (ip)
     language: {
         search: "",
         searchPlaceholder: "Search stores..."
     }
 });

 // Move the search box to custom div
 $("#customSearch").html($('.dataTables_filter'));

 // Enable Bootstrap tooltips
 $('[data-bs-toggle="tooltip"]').tooltip();
});





    // Open edit modal and populate fields
  // Open edit modal and populate fields
function openEditModal(button) {
    const categoryId = button.getAttribute('data-id');
    const categoryName = button.getAttribute('data-name');
    const categoryCatimages = button.getAttribute('data-catimages');

    // Set hidden ID
    document.getElementById('editCategoryId').value = categoryId;

    // Set readonly display of current name
    document.getElementById('editCategoryNameDisplay').value = categoryName;

    // Set select to current category name
    const select = document.getElementById('editCategoryName');
    for (let i = 0; i < select.options.length; i++) {
        if (select.options[i].value === categoryName) {
            select.selectedIndex = i;
            break;
        }
    }

    // Show current image preview
    const preview = document.getElementById('editCategoryImagePreview');
    if (categoryCatimages) {
        preview.src = '/uploads/categories/' + categoryCatimages;
        preview.style.display = 'block';
    } else {
        preview.style.display = 'none';
    }

    // Show modal
    const editModal = new bootstrap.Modal(document.getElementById('editCategoryModal'));
    editModal.show();
}




    // SweetAlert delete confirmation
function confirmDelete(button) {
    const categoryId = button.getAttribute('data-id');
    const categoryName = button.getAttribute('data-name');

    Swal.fire({
        title: 'Are you sure?',
        html: `You are about to delete <b>${categoryName}</b>. This action cannot be undone.`,
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#C33636',
        cancelButtonColor: '#8A8A93',
        confirmButtonText: 'Yes, delete it!',
        cancelButtonText: 'Cancel'
    }).then((result) => {
        if (result.isConfirmed) {
            // Use GET request to match controller
            window.location.href = `/admin/categories/delete/${categoryId}`;
        }
    });
}


</script>

</body>
</html>
