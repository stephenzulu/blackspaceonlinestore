<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Profile | BlackSpace</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body { overflow-x: hidden; }
        .sidebar { width: 250px; min-height: 100vh; background: #fff; border-right: 1px solid #e5e5e5;  flex-shrink: 0; }
        .sidebar .nav-link { color: #333; font-weight: 500; }
        .sidebar .nav-link.active, .sidebar .nav-link:hover { background-color: #f0f4ff; color: #0d6efd; }
        .profile-avatar { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 3px solid #0d6efd; }
        @media (max-width: 991px) { .sidebar { display: none; } }
    </style>
</head>

<body class="bg-light">

<!-- Top Navbar (Mobile) -->
<nav class="navbar navbar-light bg-white border-bottom d-lg-none">
    <div class="container-fluid">
        <button class="btn btn-outline-primary" data-bs-toggle="offcanvas" data-bs-target="#mobileSidebar">
            <i class="bi bi-list"></i>
        </button>
        <span class="fw-bold">BlackSpace</span>
    </div>
</nav>

<div class="d-flex">

    <!-- Include Desktop Sidebar -->
    <div th:replace="fragments/sidebar :: desktopSidebar(${user})"></div>
    <!-- Include Mobile Sidebar -->
    <div th:replace="fragments/sidebar :: mobileSidebar"></div>



    <!-- Main Content -->
    <main class="flex-grow-1 p-4">

        <div class="container-fluid">




            <div class="card shadow-sm border-0">
                <div class="card-body p-3">

                    <!-- HEADER -->
                    <div class="d-flex align-items-center mb-3">
                        <img src="/store/logo/logo.jpeg"
                             class="rounded-circle me-3"
                             style="width:70px; height:70px; object-fit:cover; border:2px solid #0d6efd;">

                        <div class="flex-grow-1">
                            <h6 class="mb-1" th:text="${user.firstName + ' ' + user.lastName}">John Doe</h6>

                            <div class="small text-muted">
                                <i class="bi bi-person-badge"></i>
                                <span th:text="${user.role}">USER</span>
                            </div>

                            <span class="badge mt-1"
                                  th:classappend="${user.enabled} ? 'bg-success' : 'bg-danger'"
                                  th:text="${user.enabled} ? 'Active' : 'Inactive'">
                </span>
                        </div>
                    </div>

                    <!-- USER INFO -->
                    <div class="row g-2 small">

                        <div class="col-12 col-md-6">
                            <strong>Username:</strong>
                            <span th:text="${user.username}"></span>
                        </div>

                        <div class="col-12 col-md-6">
                            <strong>Email:</strong>
                            <span th:text="${user.email}"></span>
                        </div>

                        <div class="col-12 col-md-6">
                            <strong>Phone:</strong>
                            <span th:text="${user.phoneNumber}"></span>
                        </div>

                        <div class="col-12 col-md-6">
                            <strong>ID No:</strong>
                            <span th:text="${user.docidnumber}"></span>
                        </div>

                        <div class="col-12">
                            <strong>Address:</strong>
                            <span th:text="${user.address}"></span>
                        </div>

                    </div>



                </div>
            </div>






            <div class="card shadow-sm border-0 mt-4">
                <div class="card-body">
                    <h5>Products Overview</h5>
                    <div style="position: relative;">
                        <canvas id="productChart"></canvas>
                    </div>
                </div>
            </div>

            <!-- Chart.js -->
            <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

            <script th:inline="javascript">
                const labels = [[${categoryLabels}]];
                const values = [[${categoryValues}]];

                const ctx = document.getElementById('productChart').getContext('2d');

                new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'Products per Category',
                            data: values,
                            backgroundColor: '#0d6efd'
                        }]
                    },
                    options: {
                        responsive: true,
                        scales: {
                            y: {
                                beginAtZero: true,
                                ticks: { precision: 0 }
                            }
                        },
                        plugins: {
                            legend: { display: false }
                        }
                    }
                });
            </script>




        </div>

    </main>
</div>



<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
