<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Store | BlackSpace</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body { overflow-x: hidden; }
        .sidebar { width: 250px; min-height: 100vh; background: #fff; border-right: 1px solid #e5e5e5;  flex-shrink: 0; }
        .sidebar .nav-link { color: #333; font-weight: 500; }
        .sidebar .nav-link.active, .sidebar .nav-link:hover { background-color: #f0f4ff; color: #0d6efd; }
        .profile-avatar { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 3px solid #0d6efd; }
        @media (max-width: 991px) { .sidebar { display: none; } }
    </style></head>
<body class="bg-light">
<!-- Top Navbar (Mobile) -->
<nav class="navbar navbar-light bg-white border-bottom d-lg-none">
    <div class="container-fluid">
        <button class="btn btn-outline-primary" data-bs-toggle="offcanvas" data-bs-target="#mobileSidebar">
            <i class="bi bi-list"></i>
        </button>
        <span class="fw-bold">BlackSpace</span>
    </div>
</nav>
<div class="d-flex">



    <!-- Include Desktop Sidebar -->
    <div th:replace="fragments/sidebar :: desktopSidebar(${user})"></div>
    <!-- Include Mobile Sidebar -->
    <div th:replace="fragments/sidebar :: mobileSidebar"></div>

    <main class="flex-grow-1 p-4">


        <div class="container-fluid">


            <h2 class="text-center mb-4">Manage Membership</h2>


            <div class="d-flex justify-content-between align-items-center mb-3">
        <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#addMembershipModal">
            <i class="bi bi-plus-circle"></i> Add Membership
        </button>
        <div id="customSearch"></div>
    </div>

    <!-- TABLE -->
            <table class="table display" id="myTable" style="width:100%">
            <thead>
        <tr>
            <th>#</th>
            <th>Name</th>
            <th>Start Date</th>
            <th>End Date</th>
            <th>Duration</th>
            <th>Amount</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="m, stat : ${memberships}">
            <td th:text="${stat.count}"></td>
            <td th:text="${m.name}"></td>
            <td th:text="${m.startDate}"></td>
            <td th:text="${m.endDate}"></td>
            <td th:text="${m.duration}"></td>
            <td th:text="${m.amount}"></td>
            <td>
                <button class="btn btn-secondary btn-sm"
                        th:attr="
                            data-id=${m.id},
                            data-name=${m.name},
                            data-startdate=${m.startDate},
                            data-enddate=${m.endDate},
                            data-amount=${m.amount},
                            data-description=${m.description}
                        "
                        onclick="openEditModal(this)">
                    <i class="bi bi-pencil-square"></i>
                </button>

                <a th:href="@{/admin/membership/delete/{id}(id=${m.id})}"
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('Delete this membership?')">
                    <i class="bi bi-trash"></i>
                </a>
            </td>
        </tr>
        </tbody>
    </table>


        </div>
    </main>

</div>


<!-- ================= ADD MODAL ================= -->
<div class="modal fade" id="addMembershipModal">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">

            <form th:action="@{/admin/membership/add}" method="post">
                <div class="modal-header">
                    <h5>Add Membership</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <input type="text" name="name" class="form-control mb-2" placeholder="Name" required>

                    <input type="date" name="startDate" class="form-control mb-2" required>
                    <input type="date" name="endDate" class="form-control mb-2" required>

                    <input type="text" name="amount" class="form-control mb-2" placeholder="Amount">

                    <textarea name="description" class="form-control" placeholder="Description"></textarea>
                </div>

                <div class="modal-footer">
                    <button class="btn btn-primary">Save</button>
                </div>
            </form>

        </div>
    </div>
</div>

<!-- ================= EDIT MODAL ================= -->
<div class="modal fade" id="editMembershipModal">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">

            <form th:action="@{/admin/membership/update}" method="post">
                <input type="hidden" name="id" id="editId">

                <div class="modal-header">
                    <h5>Edit Membership</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <input id="editName" name="name" class="form-control mb-2" required>
                    <input type="date" id="editStartDate" name="startDate" class="form-control mb-2" required>
                    <input type="date" id="editEndDate" name="endDate" class="form-control mb-2" required>

                    <input id="editAmount" name="amount" class="form-control mb-2">

                    <textarea id="editDescription" name="description" class="form-control"></textarea>
                </div>

                <div class="modal-footer">
                    <button class="btn btn-success">Update</button>
                </div>
            </form>

        </div>
    </div>
</div>

<!-- JS Scripts -->
<!-- Include jQuery first, then DataTables JS -->
<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.datatables.net/1.13.5/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.5/js/dataTables.bootstrap5.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>

    $(document).ready(function () {
 // Initialize DataTable without "Show entries" dropdown
 var table = $('#myTable').DataTable({
     responsive: true,
     pageLength: 5, // default rows per page
     lengthChange: false, // remove the "Show entries" dropdown
     dom: '<"d-flex justify-content-between mb-2"f><"table-responsive"t><"d-flex justify-content-between mt-2"ip>', // only search (f) and pagination (ip)
     language: {
         search: "",
         searchPlaceholder: "Search stores..."
     }
 });

 // Move the search box to custom div
 $("#customSearch").html($('.dataTables_filter'));

 // Enable Bootstrap tooltips
 $('[data-bs-toggle="tooltip"]').tooltip();
});








function openEditModal(btn) {
    editId.value = btn.dataset.id;
    editName.value = btn.dataset.name;
    editStartDate.value = btn.dataset.startdate;
    editEndDate.value = btn.dataset.enddate;
    editAmount.value = btn.dataset.amount;
    editDescription.value = btn.dataset.description;

    new bootstrap.Modal(editMembershipModal).show();
}
</script>

</body>
</html>
