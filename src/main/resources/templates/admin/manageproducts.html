<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Store | BlackSpace</title>
    <link rel="icon" type="image/png" th:href="@{/favicon.png}">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        html, body { height: 100%; overflow: hidden; background: #f0f2f5; }
        .sidebar { width: 250px; height: 100vh; position: sticky; top: 0; flex-shrink: 0; overflow-y: auto; }
        .main-content { flex: 1; overflow-y: auto; height: 100vh; }
        .page-header { background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); border-radius: 14px; padding: 20px 24px; color: #fff; margin-bottom: 20px; }
        .page-header h4 { margin: 0; font-weight: 700; }
        .page-header p { margin: 4px 0 0; color: rgba(255,255,255,.7); font-size: 0.85rem; }
        .content-card { border: none; border-radius: 14px; box-shadow: 0 2px 12px rgba(0,0,0,.06); }
    </style></head>
<body>
<nav class="navbar navbar-light bg-white border-bottom d-lg-none">
    <div class="container-fluid">
        <button class="btn btn-outline-primary" data-bs-toggle="offcanvas" data-bs-target="#mobileSidebar">
            <i class="bi bi-list"></i>
        </button>
        <span class="fw-bold">BlackSpace Admin</span>
    </div>
</nav>
<div class="d-flex">
    <div th:replace="fragments/sidebar :: desktopSidebar(${user})"></div>
    <div th:replace="fragments/sidebar :: mobileSidebar"></div>

    <main class="main-content p-3 p-md-4">
        <div class="container-fluid">

            <div class="page-header">
                <h4><i class="bi bi-box-seam me-2"></i>Manage Products</h4>
                <p>View, add, edit, and delete products</p>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-3">
        <div class="d-flex gap-2">
            <div id="customButtons"></div>
            <button type="button" class="btn btn-success" data-bs-toggle="modal" data-bs-target="#addProductModal">
                <i class="bi bi-plus-circle"></i> Add Products
            </button>
        </div>
        <div id="customSearch"></div>
    </div>

    <!-- Products Table -->
            <table class="table display" id="myTable" style="width:100%">
            <thead>
        <tr>
            <th>ID</th>
            <th>Image</th>
            <th>Title</th>
            <th>Short Description</th>
            <th>Price</th>
            <th>Category</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="productstock : ${listproductstock}">
            <td th:text="${productstock.id}"></td>

            <td>
                <div th:if="${productstock.imageurls != null}">
        <span th:each="img : ${T(java.lang.String).valueOf(productstock.imageurls).split(',')}">
            <img th:src="@{'/uploads/products/images/' + ${img}}"
                 alt="Image"
                 style="width:50px; height:auto; margin-right:2px;">
        </span>
                </div>
            </td>



            <td th:text="${productstock.name}"></td>
            <td th:text="${productstock.shortdescription}"></td>
            <td th:text="${productstock.currency + ' ' + #numbers.formatDecimal(productstock.price, 1, 'COMMA', 0, 'POINT')}"></td>
            <td th:text="${productstock.category}"></td>

            <td>
                <!-- Amend button as an icon -->
                <button class="btn btn-secondary btn-sm"
                        type="button"
                        th:attr="data-id=${productstock.id},
                 data-name=${productstock.name},
                 data-shortdescription=${productstock.shortdescription},
                 data-category=${productstock.category},
                 data-description=${productstock.description},
                 data-price=${productstock.price},
                 data-currency=${productstock.currency},
                 data-imageurls=${productstock.imageurls},
                 data-audiourl=${productstock.audiourl}"
                        onclick="openAmendModal(this)"
                        data-bs-toggle="tooltip"
                        data-bs-placement="top"
                        title="Amend">
                    <i class="bi bi-pencil-square"></i>
                </button>

                <!-- Delete button as an icon -->
                <button class="btn btn-danger btn-sm"
                        type="button"
                        th:attr="data-id=${productstock.id}, data-name=${productstock.name}"
                        onclick="confirmDelete(this)"
                        data-bs-toggle="tooltip"
                        data-bs-placement="top"
                        title="Delete">
                    <i class="bi bi-trash-fill"></i>
                </button>

                <!-- Initialize Bootstrap tooltips -->
                <script>
                    var tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'))
                    var tooltipList = tooltipTriggerList.map(function (tooltipTriggerEl) {
                        return new bootstrap.Tooltip(tooltipTriggerEl)
                    })
                </script>

            </td>
        </tr>
        </tbody>
    </table>


        </div>
    </main>

</div>




<!-- Edit Product Modal -->
<div class="modal fade" id="amendModal" tabindex="-1" aria-labelledby="amendModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-fullscreen modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title fs-5 fw-semibold" id="amendModalLabel">
                    <i class="bi bi-pencil-square me-2"></i>Edit Product
                </h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-4">
                <form id="amendForm" enctype="multipart/form-data" method="post" th:action="@{/adminupdateProductstock}">
                    <input type="hidden" id="amendFromId" name="id">
                    <div class="row">
                        <!-- Left Column -->
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="name" class="form-label fw-medium">Name</label>
                                <input type="text" class="form-control form-control-sm" id="name" name="name" placeholder="Enter product name">
                            </div>
                            <div class="mb-3">
                                <label for="category" class="form-label fw-medium">Category</label>
                                <select class="form-select form-select-sm" id="category" name="category" required>
                                    <option value="">-- Select Category --</option>
                                    <th:block th:each="cat : ${categories}">
                                        <option th:value="${cat.name}" th:text="${cat.name}"></option>
                                    </th:block>
                                </select>
                            </div>

                            <div class="row">
                                <div class="col-8">
                                    <div class="mb-3">
                                        <label for="price" class="form-label fw-medium">Price</label>
                                        <input type="number" class="form-control form-control-sm" id="price" name="price" placeholder="0.00" step="0.01">
                                    </div>
                                </div>
                                <div class="col-4">
                                    <div class="mb-3">
                                        <label for="currency" class="form-label fw-medium">Currency</label>
                                        <select class="form-select form-select-sm" id="currency" name="currency" required>
                                            <option value="USD">(USD)Dollar</option>
                                            <option value="EUR">(EUR)Euro</option>
                                            <option value="GBP">(GBP)Pound</option>
                                            <option value="ZMK">(ZMK)Kwacha</option>
                                        </select>
                                    </div>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="shortdescription" class="form-label fw-medium">Short Description</label>
                                <input type="text" class="form-control form-control-sm" id="shortdescription" name="shortdescription" placeholder="Brief description">
                            </div>
                            <div class="mb-3">
                                <label for="description" class="form-label fw-medium">Full Description</label>

                                <textarea class="form-control form-control-sm"
                                          id="description"
                                          name="description"
                                          rows="9"
                                          placeholder="Detailed product description"
                                          required></textarea>
                            </div>
                        </div>

                        <!-- Right Column - File Uploads -->
                        <div class="col-md-6">
                            <div class="card border-0 bg-light mb-3">
                                <div class="card-body p-3">
                                    <!-- Image Upload -->
                                    <div class="mb-3">
                                        <h6 class="card-title fw-medium mb-3">Cover Image</h6>
                                        <div class="current-file-preview mb-2">
                                            <small class="text-muted" id="currentImageInfo"></small>
                                            <div id="currentImagePreview" class="mt-2 text-center" style="display: none;">
                                                <img  id="imagePreview" src="" alt="Current Image"
                                                     class="img-fluid rounded shadow-sm"
                                                     style="max-height: 120px; border: 2px solid #dee2e6;">
                                            </div>
                                        </div>
                                        <!-- Add this inside the form, e.g., right after the form tag -->
                                        <input type="hidden" id="existingImages" name="existingImages">

                                        <input type="file"
                                               class="form-control form-control-sm"
                                               name="imageurl"
                                               accept="image/*"
                                               multiple
                                               onchange="previewEditImages(event)">
                                        <div id="editImagePreviewContainer" class="text-center"></div>

                                        <div class="form-text">Select Image (JPG, PNG, GIF)</div>
                                    </div>

                                    <!-- Audio Upload -->
                                    <div class="mb-3">
                                        <h6 class="card-title fw-medium mb-3">Audio File</h6>
                                        <div class="current-file-preview mb-2">
                                            <small class="text-muted" id="currentAudioInfo"></small>
                                            <div id="currentAudioPreview" class="mt-2" style="display: none;">
                                                <audio id="audioPlayer" controls class="w-100" style="height: 40px;">
                                                    <source id="audioSource" src="" type="audio/mpeg">
                                                </audio>
                                            </div>
                                        </div>
                                        <input type="file" name="audiourl" accept=".mp3">
                                        <div class="form-text">Select Audio (MP3)</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Modal Footer -->
                    <div class="modal-footer border-top-0 pt-3">
                        <button type="button" class="btn btn-outline-secondary btn-sm" data-bs-dismiss="modal">
                            <i class="bi bi-x-circle me-1"></i>Cancel
                        </button>
                        <button type="submit" class="btn btn-primary btn-sm">
                            <i class="bi bi-check-circle me-1"></i>Save Changes
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

                                    <div class="mb-3">
                                        <h6 class="card-title fw-medium mb-2">Audio File</h6>

                    <div class="modal-footer border-top-0 pt-3">

<!-- JS Scripts -->
<!-- Include jQuery first, then DataTables JS -->
<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.datatables.net/1.13.5/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.5/js/dataTables.bootstrap5.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>


    $(document).ready(function () {
     // Initialize DataTable without "Show entries" dropdown
     var table = $('#myTable').DataTable({
         responsive: true,
         pageLength: 5, // default rows per page
         lengthChange: false, // remove the "Show entries" dropdown
         dom: '<"d-flex justify-content-between mb-2"f><"table-responsive"t><"d-flex justify-content-between mt-2"ip>', // only search (f) and pagination (ip)
         language: {
             search: "",
             searchPlaceholder: "Search stores..."
         }
     });

     // Move the search box to custom div
     $("#customSearch").html($('.dataTables_filter'));

     // Enable Bootstrap tooltips
     $('[data-bs-toggle="tooltip"]').tooltip();
 });














   function confirmDelete(button) {
       const productId = button.getAttribute('data-id');
       const productName = button.getAttribute('data-name');

       Swal.fire({
           title: 'Are you sure?',
           html: `You are about to delete <b>${productName}</b>. This action cannot be undone.`,
           icon: 'warning',
           showCancelButton: true,
           confirmButtonColor: '#d33',
           cancelButtonColor: '#6c757d',
           confirmButtonText: 'Yes, delete it!',
           cancelButtonText: 'Cancel'
       }).then((result) => {
           if (result.isConfirmed) {
               fetch(`/deleteProduct/${productId}`, { method: 'DELETE' })
                   .then(response => {
                       if (response.ok) {
                           Swal.fire({
                               title: 'Deleted!',
                               text: `${productName} has been deleted successfully.`,
                               icon: 'success',
                               timer: 1500,
                               showConfirmButton: false
                           }).then(() => location.reload());
                       } else {
                           Swal.fire('Error!', 'Failed to delete the product.', 'error');
                       }
                   })
                   .catch(error => {
                       console.error('Error:', error);
                       Swal.fire('Error!', 'An error occurred while deleting the product.', 'error');
                   });
           }
       });
   }

   function previewAddImage(event) {
       const file = event.target.files[0];
       if (file) {
           const reader = new FileReader();
           reader.onload = function(e) {
               const preview = document.getElementById("addImagePreview");
               preview.src = e.target.result;
               document.getElementById("addImagePreviewContainer").style.display = "block";
           };
           reader.readAsDataURL(file);
       }
   }

   function previewAddAudio(event) {
       const file = event.target.files[0];
       if (file) {
           const audio = document.getElementById("addAudioPreview");
           audio.src = URL.createObjectURL(file);
           document.getElementById("addAudioPreviewContainer").style.display = "block";
       }
   }
</script>



<script>

    function previewAddImages(event) {
    const files = event.target.files;
    const container = document.getElementById("addImagePreviewContainer");
    container.innerHTML = ""; // clear previous previews

    if (files.length > 0) {
        Array.from(files).forEach((file, index) => {
            const reader = new FileReader();
            reader.onload = function(e) {
                const wrapper = document.createElement("div");
                wrapper.style.display = "inline-block";
                wrapper.style.position = "relative";
                wrapper.style.margin = "5px";

                const img = document.createElement("img");
                img.src = e.target.result;
                img.style.maxHeight = "120px";
                img.classList.add("img-fluid", "rounded", "shadow-sm");

                // Remove button
                const removeBtn = document.createElement("button");
                removeBtn.type = "button";
                removeBtn.innerHTML = "&times;";
                removeBtn.style.position = "absolute";
                removeBtn.style.top = "0";
                removeBtn.style.right = "0";
                removeBtn.style.background = "rgba(255,255,255,0.8)";
                removeBtn.style.border = "none";
                removeBtn.style.borderRadius = "50%";
                removeBtn.style.width = "24px";
                removeBtn.style.height = "24px";
                removeBtn.style.cursor = "pointer";
                removeBtn.onclick = function() {
                    wrapper.remove();
                    removeFile(index);
                };

                wrapper.appendChild(img);
                wrapper.appendChild(removeBtn);
                container.appendChild(wrapper);
            };
            reader.readAsDataURL(file);
        });
        container.style.display = "block";
    } else {
        container.style.display = "none";
    }
  }

// Keep track of files when user removes an image
let addFilesArray = [];

document.getElementById("addimageurl").addEventListener("change", function(e) {
    addFilesArray = Array.from(e.target.files);
});

// Remove file from array
function removeFile(index) {
    addFilesArray.splice(index, 1);
    // Update input.files
    const dataTransfer = new DataTransfer();
    addFilesArray.forEach(file => dataTransfer.items.add(file));
    document.getElementById("addimageurl").files = dataTransfer.files;
}





    // Open Amend Modal
    function openAmendModal(button) {
        document.getElementById("amendFromId").value = button.getAttribute("data-id");
        document.getElementById("name").value = button.getAttribute("data-name");
        document.getElementById("shortdescription").value = button.getAttribute("data-shortdescription");
        document.getElementById("category").value = button.getAttribute("data-category");
        document.getElementById("description").value = button.getAttribute("data-description");
        document.getElementById("price").value = button.getAttribute("data-price");
        document.getElementById("currency").value = button.getAttribute("data-currency");


        // Existing images
        const imageUrls = button.getAttribute("data-imageurls");
        const container = document.getElementById("editImagePreviewContainer");
        container.innerHTML = "";

        if (imageUrls) {
            const urls = imageUrls.split(",");
            urls.forEach(url => {
                const wrapper = document.createElement("div");
                wrapper.style.display = "inline-block";
                wrapper.style.position = "relative";
                wrapper.style.margin = "5px";

                const img = document.createElement("img");
                img.src = "/uploads/products/images/" + url.trim();
                img.style.maxHeight = "120px";
                img.classList.add("img-fluid", "rounded", "shadow-sm");

                // Remove button
                const removeBtn = document.createElement("button");
                removeBtn.type = "button";
                removeBtn.innerHTML = "&times;";
                removeBtn.style.position = "absolute";
                removeBtn.style.top = "0";
                removeBtn.style.right = "0";
                removeBtn.style.background = "rgba(255,255,255,0.8)";
                removeBtn.style.border = "none";
                removeBtn.style.borderRadius = "50%";
                removeBtn.style.width = "24px";
                removeBtn.style.height = "24px";
                removeBtn.style.cursor = "pointer";
                removeBtn.onclick = function() {
                    wrapper.remove();
                    updateExistingImages();
                };

                wrapper.appendChild(img);
                wrapper.appendChild(removeBtn);
                container.appendChild(wrapper);
            });
            container.style.display = "block";

            // Set hidden input value
            document.getElementById("existingImages").value = imageUrls;
        } else {
            container.style.display = "none";
            document.getElementById("existingImages").value = "";
        }

        // Handle audio file
        const audioUrl = button.getAttribute("data-audiourl");
        const audioPlayer = document.getElementById("audioPlayer");
        const audioSource = document.getElementById("audioSource");
        const currentAudioInfo = document.getElementById("currentAudioInfo");

        if (audioUrl) {
            currentAudioInfo.textContent = "Current audio: " + audioUrl;
            audioSource.src = "/uploads/products/audio/" + audioUrl;
            audioPlayer.load();
            document.getElementById("currentAudioPreview").style.display = "block";
        } else {
            currentAudioInfo.textContent = "No audio uploaded";
            document.getElementById("currentAudioPreview").style.display = "none";
        }

        const amendModal = new bootstrap.Modal(document.getElementById('amendModal'));
        amendModal.show();
    }

    // Update hidden input when images are removed
    function updateExistingImages() {
        const container = document.getElementById("editImagePreviewContainer");
        const images = container.querySelectorAll("img");
        const remaining = Array.from(images).map(img => img.src.split("/").pop()); // get filename
        document.getElementById("existingImages").value = remaining.join(",");
    }

    // Preview newly added images in edit modal
    function previewEditImages(event) {
        const files = event.target.files;
        const container = document.getElementById("editImagePreviewContainer");

        Array.from(files).forEach(file => {
            const reader = new FileReader();
            reader.onload = function(e) {
                const wrapper = document.createElement("div");
                wrapper.style.display = "inline-block";
                wrapper.style.position = "relative";
                wrapper.style.margin = "5px";

                const img = document.createElement("img");
                img.src = e.target.result;
                img.style.maxHeight = "120px";
                img.classList.add("img-fluid", "rounded", "shadow-sm");

                // Remove button for new images
                const removeBtn = document.createElement("button");
                removeBtn.type = "button";
                removeBtn.innerHTML = "&times;";
                removeBtn.style.position = "absolute";
                removeBtn.style.top = "0";
                removeBtn.style.right = "0";
                removeBtn.style.background = "rgba(255,255,255,0.8)";
                removeBtn.style.border = "none";
                removeBtn.style.borderRadius = "50%";
                removeBtn.style.width = "24px";
                removeBtn.style.height = "24px";
                removeBtn.style.cursor = "pointer";
                removeBtn.onclick = function() {
                    wrapper.remove();
                };

                wrapper.appendChild(img);
                wrapper.appendChild(removeBtn);
                container.appendChild(wrapper);
            };
            reader.readAsDataURL(file);
        });

        container.style.display = "block";
    }
</script>


</body>
</html>
