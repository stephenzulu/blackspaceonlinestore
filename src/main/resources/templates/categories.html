<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" th:href="@{/favicon.png}">

    <title>All Stores | Black Space Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
          rel="stylesheet">


</head>
<body>

<!-- Navbar -->
<div th:replace="fragments/navbar :: topbar"></div>

<!-- HERO SECTION -->
<section class="about-hero">
    <div class="container">
        <h1 class="fw-bold">Discover Products or Services Near You</h1>
        <p class="lead mt-2">
            Buy directly from local stores
        </p>
    </div>
</section>


<!-- Breadcrumb -->
<div class="container mt-3">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb bg-light p-2 rounded">
            <li class="breadcrumb-item">
                <a th:href="@{/}">
                    <i class="bi bi-house-door-fill me-1"></i>
                </a>
            </li>
            <li class="breadcrumb-item active" aria-current="page">Categories</li>
        </ol>
    </nav>
</div>

<div class="container mt-4">
    <h2 class="mb-4 text-center">All Categories</h2>


    <!-- CATEGORIES -->
    <section class="py-5">
        <div class="container">
            <div class="row g-3 ">
                <div th:each="cat : ${categories}" class="store-card col-6 col-sm-6 col-md-3">
                    <a th:href="@{'/category/' + ${cat.name}}" class="text-decoration-none text-dark">

                        <div class="card h-100 text-center product-card" >
                        <!-- Show image from database -->
                            <img th:src="@{${categoryImages[cat.name]}}"
                                 th:alt="${cat.name}"
                                 class="img-fluid mb-2"
                                 style="height: 150px; object-fit: contain; border-radius: 10px;" />

                            <h6 th:text="${cat.name}">Category</h6>
                        </div>

                    </a>
                </div>
            </div>
        </div>
    </section>







</div>


<style>

    .about-hero {
        background: linear-gradient(rgba(0,0,0,.6), rgba(0,0,0,.6)),
                    url('/store/banner/store_banner.png') center/cover no-repeat;
        color: white;
        padding: 80px 0;
        text-align: center;
    }

    .icon-box i {
        font-size: 2rem;
        color: #0d6efd;
    }
</style>


<style>
    /* Product Card Hover Effect */
.product-card {
    border-radius: 12px;
    transition: all 0.35s ease;
    cursor: pointer;
    overflow: hidden;
}

/* Lift + shadow */
.product-card:hover {
    transform: translateY(-10px);
    box-shadow: 0 14px 30px rgba(0, 0, 0, 0.15);
}

/* Image zoom on hover */
.product-card img {
    transition: transform 0.4s ease;
}

.product-card:hover img {
    transform: scale(1.08);
}

/* Button emphasis on hover */
.product-card:hover .btn {
    background-color: #0d6efd;
    color: #fff;
    border-color: #0d6efd;
}

</style>



<!-- FOOTER -->
<div th:replace="fragments/footer :: footer"></div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
