<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" th:href="@{'/uploads/favicon/' + ${siteSettings.siteFavicon}}">
    <title>Categories | Black Space Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body { background: #F6F6F4; }
        .page-hero {
            background: #F6F6F4; padding: 24px 0 16px;
        }
        .page-hero h1 { font-weight: 700; font-size: 1.5rem; color: #0E0E11; margin: 0; }
        .page-hero p.lead { color: #8A8A93 !important; font-size: 0.88rem; margin: 4px 0 0; }
        .section-title { font-weight: 700; font-size: 1.4rem; margin-bottom: 8px; }
        .section-subtitle { color: #8A8A93; font-size: 0.9rem; margin-bottom: 32px; }
        .cat-card {
            border: none; border-radius: 16px; overflow: hidden;
            background: #fff; box-shadow: 0 2px 12px rgba(0,0,0,.05);
            transition: transform .3s, box-shadow .3s;
            text-decoration: none; color: #3A3A40; display: block;
        }
        .cat-card:hover { transform: translateY(-6px); box-shadow: 0 10px 30px rgba(0,0,0,.12); color: #3A3A40; }
        .cat-card .cat-img {
            height: 140px; width: 100%; object-fit: contain;
            padding: 12px; transition: transform .35s;
        }
        .cat-card:hover .cat-img { transform: scale(1.06); }
        .cat-card .cat-name {
            font-weight: 600; font-size: 0.9rem; padding: 10px 14px 14px;
            text-align: center; border-top: 1px solid #F0F0F0;
        }
        @media (max-width: 576px) {
            .page-hero { padding: 28px 0 20px; }
            .page-hero h1 { font-size: 1.6rem; }
            .cat-card .cat-img { height: 110px; }
        }
    </style>
</head>
<body>

<div th:replace="fragments/navbar :: topbar"></div>

<!-- Hero -->
<section class="page-hero">
    <div class="container">
        <div class="d-flex align-items-center gap-3">
            <div class="d-inline-flex align-items-center justify-content-center" style="width:44px; height:44px; border-radius:12px; background:rgba(168,85,247,.12); flex-shrink:0;">
                <i class="bi bi-grid-3x3-gap-fill" style="font-size:1.2rem; color:#A855F7;"></i>
            </div>
            <div>
                <h1>All Categories</h1>
                <p class="lead mb-0">Browse products by category</p>
            </div>
        </div>
    </div>
</section>

<!-- Breadcrumb -->
<div class="container mt-3">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb bg-white p-2 px-3 rounded-3 shadow-sm small mb-0">
            <li class="breadcrumb-item"><a th:href="@{/}" style="color:#E8611D; text-decoration:none;"><i class="bi bi-house-door-fill"></i></a></li>
            <li class="breadcrumb-item active">Categories</li>
        </ol>
    </nav>
</div>

<!-- Categories Grid -->
<section class="py-5">
    <div class="container">
        <div class="text-center mb-4">
            <span class="badge mb-2" style="background:rgba(168,85,247,.1); color:#A855F7; font-size:0.75rem; padding:6px 12px; border-radius:20px;">Browse</span>
            <h2 class="section-title">Shop by Category</h2>
            <p class="section-subtitle">Find exactly what you're looking for</p>
        </div>
        <div class="row g-3">
            <div th:each="cat : ${categories}" class="col-6 col-sm-4 col-md-3">
                <a th:href="@{'/category/' + ${cat.name}}" class="cat-card">
                    <img loading="lazy" th:src="@{${categoryImages[cat.name]}}" th:alt="${cat.name}" class="cat-img">
                    <div class="cat-name" th:text="${cat.name}">Category</div>
                </a>
            </div>
        </div>

        <!-- Empty state -->
        <div th:if="${#lists.isEmpty(categories)}" class="text-center py-5">
            <i class="bi bi-grid-3x3-gap" style="font-size:3rem; color:#E7E7EA;"></i>
            <p class="text-muted mt-3">No categories available yet.</p>
        </div>
    </div>
</section>

<div th:replace="fragments/footer :: footer"></div>
</body>
</html>
