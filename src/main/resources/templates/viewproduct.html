<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" th:href="@{'/uploads/favicon/' + ${siteSettings.siteFavicon}}">

    <title th:if="${product != null and store != null}"
           th:text="${product.name + ' | ' + store.name}">
        View Product
    </title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">



    <style>
        .banner-img {
            width: 100%;
            height: 260px;
            object-fit: cover;
        }

        .store-logo {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            margin-top: -55px;
            background: #fff;
            border: 4px solid #fff;
            object-fit: cover;
        }

        .product-image {
            width: 100%;
            max-height: 250px;
            object-fit: contain;
            background: #F6F6F4;
        }

        .price {
            font-size: 1.5rem;
            font-weight: bold;
            color: #0F7A4E;
        }

        .thumb-img {
            height: 80px;
            object-fit: cover;
            cursor: pointer;
            border-radius: 6px;
            border: 2px solid transparent;
        }

        .thumb-img:hover {
            border-color: #E8611D;
        }

        .carousel-control-prev-icon,
        .carousel-control-next-icon {
            background-color: rgba(15, 122, 78, 0.7);
            border-radius: 50%;
            padding: 10px;
            background-size: 100%, 100%;
        }

        .carousel-control-prev-icon::after,
        .carousel-control-next-icon::after {
            content: '';
        }

    </style>
</head>
<body>

<!-- Include navbar -->
<div th:replace="fragments/navbar :: topbar"></div>

<!-- ================= BANNER ================= -->
<div class="container-fluid p-0 position-relative">
    <img loading="lazy" class="banner-img"
         th:if="${store != null and store.storebanner != null and store.storebanner != ''}"
         th:src="@{'/uploads/stores/' + ${store.storebanner}}"
         alt="Store Banner">

    <img loading="lazy" class="banner-img"
         th:unless="${store != null and store.storebanner != null and store.storebanner != ''}"
         th:src="@{/store/banner/banner.jpeg}"
         alt="Store Banner">


    <!-- Call & Email Icons -->
    <div class="banner-contact position-absolute bottom-0 end-0 p-3 d-flex gap-3"  style="background: rgba(0,0,0,0.5); border-top-right-radius:8px;">
        <!-- Phone -->
        <a class="btn btn-sm d-flex align-items-center">
            <i class="bi bi-eye me-1 text-white"></i>
            <span class="text-white" th:text="${product.views}">0</span>
        </a>
        <!-- Email -->
        <a th:if="${store != null and store.email != null and store.email != ''}"
           th:href="'mailto:' + ${store.email}"
           class="btn btn-sm btn-outline-light d-flex align-items-center">
            <i class="bi bi-envelope me-1"></i>
            <span th:text="${store.email}">info@blackspace.com</span>
        </a>


    </div>


</div>

<!-- ================= STORE HEADER ================= -->
<div class="container mt-3 p-0 position-relative">
    <div class="d-flex align-items-center">
        <!-- Store Logo -->
        <img loading="lazy" class="store-logo me-3"
             th:if="${store != null and store.storelogo != null and store.storelogo != ''}"
             th:src="@{'/uploads/stores/' + ${store.storelogo}}"
             alt="Store Logo">
        <img loading="lazy" class="store-logo me-3"
             th:unless="${store != null and store.storelogo != null and store.storelogo != ''}"
             th:src="@{/store/logo/logo.jpeg}"
             alt="Store Logo">

        <!-- Store Name -->
        <div class="flex-grow-1">
            <h2 class="mb-0" th:text="${store != null} ? ${store.name} : 'Store'">Store </h2>
        </div>
    </div>
</div>

<!-- ================= BREADCRUMB ================= -->
<div class="container mt-3">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb bg-light p-2 rounded">
            <li class="breadcrumb-item">
                <a th:href="@{/}">
                    <i class="bi bi-house-door-fill me-1"></i>
                </a>
            </li>
            <li class="breadcrumb-item">
                <a th:href="@{/stores}">Stores</a>
            </li>
            <li class="breadcrumb-item active" aria-current="page"
                th:text="${store != null} ? ${store.name} : 'Store'">Store</li>
        </ol>
    </nav>
</div>


<!-- ================= PRODUCT VIEW ================= -->
<div class="container mt-5">
    <div class="row g-4">

        <!-- Product Images -->
        <div class="col-md-6">

            <div class="container">
                <div class="row">

                    <!-- Left Column -->
                    <div class="col-md-9">
                        <div id="productCarousel" class="carousel slide mb-3">
                            <div class="carousel-inner">
                                <div th:each="img,iter : ${#strings.arraySplit(product.imageurls, ',')}"
                                     class="carousel-item"
                                     th:classappend="${iter.index == 0} ? ' active'">
                                    <img loading="lazy" th:src="@{'/uploads/products/images/'+${img}}"
                                         class="d-block w-100 product-image"
                                         alt="Product Image">
                                </div>
                            </div>

                            <button class="carousel-control-prev" type="button" data-bs-target="#productCarousel"
                                    data-bs-slide="prev">
                                <span class="carousel-control-prev-icon"></span>
                            </button>
                            <button class="carousel-control-next" type="button" data-bs-target="#productCarousel"
                                    data-bs-slide="next">
                                <span class="carousel-control-next-icon"></span>
                            </button>
                        </div>
                    </div>

                    <!-- Right Column -->
                    <div class="col-md-3">
                        <!-- Thumbnails: vertical on md+ screens, horizontal on small screens -->
                        <div class="d-flex flex-row flex-md-column gap-2">
                            <img loading="lazy" th:each="img,iter : ${#strings.arraySplit(product.imageurls, ',')}"
                                 th:src="@{'/uploads/products/images/' + ${img}}"
                                 class="thumb-img"
                                 style="cursor: pointer; width: 60px; height: 60px; object-fit: cover;"
                                 th:onclick="'showSlide(' + ${iter.index} + ')'" />
                        </div>
                         </div>

                </div>
            </div>




            <!-- ================= AUDIO PLAYER ================= -->


            <div th:if="${product.audiourl != null and product.audiourl != ''}" class="mt-4">
                <h6 class="mb-2">Audio Preview</h6>

                <!-- Waveform Container -->
                <div id="waveform" style="height: 100px; border-radius: 10px; background: #F6F6F4;"></div>

                <!-- Controls -->
                <div class="d-flex gap-3 mt-2 align-items-center">
                    <button id="playPause" class="btn btn-success btn-sm d-flex align-items-center">
                        <i class="bi bi-play-fill me-1"></i> Play / Pause
                    </button>

                    <span id="currentTime">0:00</span> / <span id="totalTime">0:00</span>

                    <a th:href="@{'/uploads/products/audio/' + ${product.audiourl}}"
                       download
                       class="btn btn-outline-secondary btn-sm d-flex align-items-center ms-auto">
                        <i class="bi bi-download me-1"></i> Download
                    </a>
                </div>
            </div>

            <!-- WaveSurfer JS -->
            <script src="https://unpkg.com/wavesurfer.js"></script>
            <script th:inline="javascript">
                document.addEventListener('DOMContentLoaded', () => {
                    const audioUrl = /*[[${product.audiourl}]]*/ null;
                    if(audioUrl){
                        const wavesurfer = WaveSurfer.create({
                            container: '#waveform',
                            waveColor: '#dee2e6',
                            progressColor: '#0F7A4E',
                            cursorColor: '#0F7A4E',
                            barWidth: 3,
                            barRadius: 3,
                            responsive: true,
                            height: 100
                        });

                        wavesurfer.load('/uploads/products/audio/' + audioUrl);

                        const playPauseBtn = document.getElementById('playPause');
                        const currentTimeEl = document.getElementById('currentTime');
                        const totalTimeEl = document.getElementById('totalTime');

                        // Play/Pause button
                        playPauseBtn.addEventListener('click', () => {
                            wavesurfer.playPause();
                        });

                        // When audio is ready, show total duration
                        wavesurfer.on('ready', () => {
                            const duration = wavesurfer.getDuration();
                            totalTimeEl.textContent = formatTime(duration);
                        });

                        // Update current time while playing
                        wavesurfer.on('audioprocess', () => {
                            currentTimeEl.textContent = formatTime(wavesurfer.getCurrentTime());
                        });

                        // Reset current time when paused or finished
                        wavesurfer.on('pause', () => {
                            currentTimeEl.textContent = formatTime(wavesurfer.getCurrentTime());
                        });

                        wavesurfer.on('finish', () => {
                            currentTimeEl.textContent = formatTime(wavesurfer.getDuration());
                        });

                        function formatTime(seconds){
                            const minutes = Math.floor(seconds / 60);
                            const secs = Math.floor(seconds % 60);
                            return `${minutes}:${secs < 10 ? '0' + secs : secs}`;
                        }
                    }
                });
            </script>




            <div class="d-flex justify-content-center gap-2 mt-3 mb-4">
            <!-- Like / Dislike Buttons -->
            <div class="d-flex gap-2 my-3">
                <!-- Like -->
                <form id="likeForm"
                      th:action="@{'/product/' + ${product.id} + '/like'}"
                      method="post">
                    <button type="submit" class="btn btn-success">
                        👍 Like
                        <span id="likeCount"
                              class="badge bg-light text-dark"
                              th:text="${product.likes}">0</span>
                    </button>
                </form>

                <!-- Dislike -->
                <form id="dislikeForm"
                      th:action="@{'/product/' + ${product.id} + '/dislike'}"
                      method="post">
                    <button type="submit" class="btn btn-danger">
                        👎 Dislike
                        <span id="dislikeCount"
                              class="badge bg-light text-dark"
                              th:text="${product.dislikes}">0</span>
                    </button>
                </form>
            </div>
            </div>



            <script>
                document.addEventListener("DOMContentLoaded", () => {

                    function handleForm(formId, like = true) {
                        const form = document.getElementById(formId);

                        form.addEventListener("submit", function (e) {
                            e.preventDefault(); //  stop reload

                            fetch(form.action, {
                                method: "POST",
                                headers: {
                                    "X-Requested-With": "XMLHttpRequest"
                                }
                            })
                            .then(res => res.json())
                            .then(data => {
                                document.getElementById("likeCount").textContent = data.likes;
                                document.getElementById("dislikeCount").textContent = data.dislikes;
                            })
                            .catch(err => console.error(err));
                        });
                    }

                    handleForm("likeForm", true);
                    handleForm("dislikeForm", false);
                });
            </script>


        </div>



        <!-- Product Details -->
        <div class="col-md-6">


            <h3 th:text="${product.name}">Product Name</h3>

            <p class="price">
                <span th:text="${product.currency + ' ' + #numbers.formatDecimal(product.price, 1, 'COMMA', 0, 'POINT')}">0.00</span>
            </p>


            <hr>

            <h6>Description</h6>
            <p th:text="${product.description}" style="white-space: pre-wrap;"></p>

            <h6 class="d-flex justify-content-center mt-2" >Share</h6>
            <div class="d-flex justify-content-center mb-5">

            <!-- Facebook -->
            <a th:href="'https://www.facebook.com/sharer/sharer.php?u=' + ${currentUrl}" target="_blank" class="btn btn-primary btn-sm mx-1">
                <i class="bi bi-facebook me-1  "></i> Facebook
            </a>

            <!-- Twitter -->
            <a th:href="'https://twitter.com/intent/tweet?url=' + ${currentUrl} + '&text=' + ${product.name}" target="_blank" class="btn btn-info btn-sm text-white">
                <i class="bi bi-twitter me-1"></i> Twitter
            </a>

            <!-- WhatsApp -->
            <a th:href="'https://wa.me/?text=' + ${product.name + ' ' + currentUrl}" target="_blank" class="btn btn-success btn-sm mx-1">
                <i class="bi bi-whatsapp me-1"></i> WhatsApp
            </a>

            <!-- LinkedIn -->
            <a th:href="'https://www.linkedin.com/sharing/share-offsite/?url=' + ${currentUrl}" target="_blank" class="btn btn-secondary btn-sm">
                <i class="bi bi-linkedin me-1"></i> LinkedIn
            </a>
            </div>

            <!-- WhatsApp & Call Buttons -->
            <div class="d-flex justify-content-center gap-2 mt-3 mb-4">

                <a th:if="${store != null and store.whatsappNumber != null and store.whatsappNumber != ''}"
                   th:href="'https://wa.me/' + ${store.whatsappNumber}"
                   target="_blank"
                   class="btn btn-success btn-sm d-flex align-items-center">
                    <i class="bi bi-whatsapp me-1"></i> Chat on WhatsApp
                </a>

                <a th:if="${store != null and store.contactNumber != null and store.contactNumber != ''}"
                   th:href="'tel:' + ${store.contactNumber}"
                   class="btn btn-outline-primary btn-sm d-flex align-items-center">
                    <i class="bi bi-telephone me-1"></i> Call Seller
                </a>

            </div>


        </div>
    </div>

</div>




<style>
    .star-rating i {
    font-size: 1.4rem;
    cursor: pointer;
    color: #ccc;
}

.star-rating i.active {
    color: #F2B705;
}

</style>

<script th:inline="javascript">
    const productId = [[${product.id}]];
    const stars = document.querySelectorAll('#starRating i');

    stars.forEach(star => {
        star.addEventListener('click', () => {
            const rating = star.getAttribute('data-star');

            fetch(`/product/${productId}/rate`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded'
                },
                body: `stars=${rating}`
            })
            .then(res => res.json())
            .then(data => {
                document.getElementById('ratingAvg').textContent = data.average;
                document.getElementById('ratingCount').textContent = data.count;

                stars.forEach(s => {
                    s.classList.toggle(
                        'active',
                        s.getAttribute('data-star') <= Math.round(data.average)
                    );
                });
            })
            .catch(console.error);
        });
    });
</script>




<!-- ================= SIMILAR PRODUCTS ================= -->
<!-- ================= SIMILAR PRODUCTS SLIDER ================= -->
<div class="container mt-5"
     th:if="${similarProducts != null and !similarProducts.isEmpty()}">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="mb-0">Similar Products</h4>

        <!-- Controls -->
        <div>
            <button class="btn btn-sm btn-outline-secondary me-1"
                    onclick="scrollSimilar(-1)">
                ‹
            </button>
            <button class="btn btn-sm btn-outline-secondary"
                    onclick="scrollSimilar(1)">
                ›
            </button>
        </div>
    </div>

    <!-- Scroll Container -->
    <div class="similar-scroll-wrapper">
        <div class="similar-scroll">

            <div class="similar-item"
                 th:each="p : ${similarProducts}">

                <div class="card h-100 shadow-sm">
                    <a th:href="@{'/product/' + ${p.id}}">
                        <img loading="lazy" class="card-img-top"
                             th:src="@{'/uploads/products/images/' +
                             ${#strings.arraySplit(p.imageurls, ',')[0]}}"
                             style="height:180px; object-fit:contain;">
                    </a>

                    <div class="card-body p-2">
                        <h6 class="text-truncate" th:text="${p.name}"></h6>
                        <span class="text-success fw-bold"
                              th:text="${p.currency + ' ' + #numbers.formatDecimal(p.price, 1, 'COMMA', 0, 'POINT')}">
                        </span>
                    </div>
                </div>

            </div>

        </div>
    </div>
</div>

<style>
    .similar-scroll-wrapper {
    overflow: hidden;
    width: 100%;
}

.similar-scroll {
    display: flex;
    gap: 1rem;
    overflow-x: auto;
    scroll-behavior: smooth;
    padding-bottom: 10px;
}

.similar-scroll::-webkit-scrollbar {
    display: none;
}

.similar-item {
    min-width: 250px;
    max-width: 250px;
    flex: 0 0 auto;
}

</style>

<script>
    function scrollSimilar(direction) {
        const container = document.querySelector('.similar-scroll');
        const scrollAmount = 300;
        container.scrollBy({
            left: direction * scrollAmount,
            behavior: 'smooth'
        });
    }
</script>



<script>
    function showSlide(index) {
        const carousel = document.querySelector('#productCarousel');
        const bsCarousel = bootstrap.Carousel.getOrCreateInstance(carousel);
        bsCarousel.to(index);
    }
</script>



<script th:inline="javascript">
    const productId = [[${product.id}]]; // Thymeleaf replaces this with the real ID

    document.getElementById('likeBtn').addEventListener('click', () => {
        fetch(`/product/${productId}/like`, {
            method: 'POST'
        })
        .then(res => res.json())
        .then(data => {
            document.getElementById('likeCount').textContent = data.likes;
            document.getElementById('dislikeCount').textContent = data.dislikes;
        })
        .catch(err => console.error(err));
    });

    document.getElementById('dislikeBtn').addEventListener('click', () => {
        fetch(`/product/${productId}/dislike`, {
            method: 'POST'
        })
        .then(res => res.json())
        .then(data => {
            document.getElementById('likeCount').textContent = data.likes;
            document.getElementById('dislikeCount').textContent = data.dislikes;
        })
        .catch(err => console.error(err));
    });
</script>


<!-- FOOTER -->
<div th:replace="fragments/footer :: footer"></div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
