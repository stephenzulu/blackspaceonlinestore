<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Subscription | BlackSpace</title>
    <link rel="icon" type="image/png" th:href="@{/favicon.png}">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        html, body { height: 100%; overflow: hidden; background: #f0f2f5; }
        .sidebar { width: 250px; height: 100vh; position: sticky; top: 0; flex-shrink: 0; overflow-y: auto; }
        .main-content { flex: 1; overflow-y: auto; height: 100vh; }
        .page-header { background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); border-radius: 14px; padding: 20px 24px; color: #fff; margin-bottom: 20px; }
        .page-header h4 { margin: 0; font-weight: 700; }
        .page-header p { margin: 4px 0 0; color: rgba(255,255,255,.7); font-size: 0.85rem; }

        .plan-card {
            border: none; border-radius: 16px; overflow: hidden;
            box-shadow: 0 2px 16px rgba(0,0,0,.08);
            transition: transform 0.25s, box-shadow 0.25s;
        }
        .plan-card:hover { transform: translateY(-5px); box-shadow: 0 8px 30px rgba(0,0,0,.15); }
        .plan-header {
            background: linear-gradient(135deg, #0f0c29, #302b63);
            color: #fff; padding: 20px; text-align: center;
        }
        .plan-header h5 { margin: 0; font-weight: 700; font-size: 1.1rem; }
        .plan-price { font-size: 2rem; font-weight: 800; color: #302b63; }
        .plan-feature { padding: 8px 0; border-bottom: 1px solid #f0f0f0; font-size: 0.9rem; }
        .plan-feature:last-child { border-bottom: none; }
        .plan-feature i { width: 20px; color: #302b63; }
    </style>
</head>
<body>
<nav class="navbar navbar-light bg-white border-bottom d-lg-none">
    <div class="container-fluid">
        <button class="btn btn-outline-primary" data-bs-toggle="offcanvas" data-bs-target="#mobileSidebar">
            <i class="bi bi-list"></i>
        </button>
        <span class="fw-bold">BlackSpace</span>
    </div>
</nav>
<div class="d-flex">
    <div th:replace="~{fragments/userbar :: desktopSidebar(${user})}"></div>
    <div th:replace="~{fragments/userbar :: mobileSidebar}"></div>

    <main class="main-content p-3 p-md-4">
        <div class="container-fluid">

            <div class="page-header">
                <h4><i class="bi bi-credit-card-2-front me-2"></i>Subscription Plans</h4>
                <p>Choose a plan to start selling your products</p>
            </div>

            <!-- Current Status -->
            <div class="alert mb-4 d-flex align-items-center" style="border-radius:12px;"
                 th:classappend="${subscriptionActive} ? 'alert-success' : 'alert-warning'">
                <i class="bi me-2 fs-5"
                   th:classappend="${subscriptionActive} ? 'bi-check-circle-fill' : 'bi-exclamation-triangle-fill'"></i>
                <span th:if="${subscriptionActive}">You have an active subscription.</span>
                <span th:unless="${subscriptionActive}">You don't have an active subscription. Choose a plan below to get started.</span>
            </div>

            <!-- Plans Grid -->
            <div class="row g-4">
                <div class="col-12 col-md-6 col-lg-4" th:each="m : ${subscriptions}">
                    <div class="card plan-card h-100">
                        <div class="plan-header">
                            <h5 th:text="${m.name}">Plan Name</h5>
                        </div>
                        <div class="card-body d-flex flex-column p-4">
                            <div class="text-center mb-3">
                                <span class="plan-price" th:text="'ZMK ' + ${#numbers.formatDecimal(m.amount, 1, 'COMMA', 0, 'POINT')}">ZMK 0</span>
                            </div>

                            <div class="plan-feature">
                                <i class="bi bi-box-seam me-2"></i>
                                <strong th:text="${m.numberofproducts}">0</strong> Products
                            </div>
                            <div class="plan-feature">
                                <i class="bi bi-clock me-2"></i>
                                <span th:text="${m.description}">Duration info</span>
                            </div>

                            <div class="mt-auto pt-3">
                                <button type="button"
                                        class="btn w-100 fw-semibold"
                                        style="border-radius:10px; padding:10px;"
                                        th:classappend="${subscriptionActive} ? 'btn-outline-primary' : 'btn-primary'"
                                        th:text="${subscriptionActive} ? 'Upgrade Plan' : 'Get Started'"
                                        th:onclick="'selectPlan(' + ${m.id} + ')'">
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="${lencoInlineJsUrl}"></script>
<script th:inline="javascript">
    window.LENCO_CONFIG = {
        publicKey: /*[[${lencoPublicKey}]]*/ '',
        currency: /*[[${lencoCurrency}]]*/ 'ZMW',
        email: /*[[${user.email}]]*/ '',
        firstName: /*[[${user.firstName}]]*/ '',
        lastName: /*[[${user.lastName}]]*/ '',
        phone: /*[[${user.phoneNumber}]]*/ ''
    };
</script>
<script th:src="@{/js/lenco-subscription.js}"></script>
</body>
</html>
