<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register | BlackSpace</title>
    <link rel="icon" type="image/png" th:href="@{/favicon.png}">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <style>
        body {
            min-height: 100vh;
            margin: 0;
            display: flex;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        .reg-left {
            flex: 0 0 320px;
            background: linear-gradient(135deg, rgba(15,12,41,.85), rgba(48,43,99,.85), rgba(36,36,62,.85)),
                        url('/store/banner/store_banner.png') center/cover no-repeat;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
            padding: 40px 30px;
            text-align: center;
            position: sticky;
            top: 0;
            height: 100vh;
        }
        .reg-left h2 { font-weight: 700; letter-spacing: 1px; font-size: 1.5rem; }
        .reg-left p { color: rgba(255,255,255,.7); font-size: 0.9rem; margin-top: 10px; }
        .reg-right {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, rgba(248,249,250,.92), rgba(230,230,250,.92)),
                        url('/store/banner/store_banner.png') center/cover no-repeat;
            padding: 30px 20px;
            min-height: 100vh;
        }
        .reg-card {
            width: 100%;
            max-width: 640px;
            background: #fff;
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 4px 24px rgba(0,0,0,.08);
            position: relative;
        }
        .form-control {
            border-radius: 10px;
            padding: 10px 14px;
            border: 1px solid #e0e0e0;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-control:focus {
            border-color: #302b63;
            box-shadow: 0 0 0 3px rgba(48,43,99,.12);
        }
        .form-label {
            font-weight: 500;
            font-size: 0.88rem;
            margin-bottom: 4px;
        }
        .btn-register {
            background: linear-gradient(135deg, #302b63, #24243e);
            color: #fff;
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: opacity 0.2s, transform 0.2s;
        }
        .btn-register:hover { opacity: 0.9; transform: translateY(-1px); color: #fff; }
        .btn-register:disabled { opacity: 0.5; transform: none; }
        .step-icon {
            width: 48px; height: 48px; border-radius: 50%;
            background: rgba(255,255,255,.1);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 8px;
        }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            .reg-left { display: none; }
            .reg-right { padding: 20px 15px; }
            .reg-card { padding: 24px 18px; }
        }
    </style>
</head>

<body>

<!-- Left Panel -->
<div class="reg-left d-none d-md-flex">
    <img th:src="@{'/uploads/logo/logo.jpeg'}" alt="Logo"
         style="width: 70px; height: 70px; border-radius: 14px; margin-bottom: 16px; object-fit: cover;">
    <h2>Join BlackSpace</h2>
    <p>Create your free account and start selling or shopping today.</p>

    <div class="mt-4">
        <div class="d-flex align-items-center mb-3" style="color:rgba(255,255,255,.8);">
            <div class="step-icon me-3"><i class="bi bi-1-circle fs-5"></i></div>
            <small>Create your account</small>
        </div>
        <div class="d-flex align-items-center mb-3" style="color:rgba(255,255,255,.8);">
            <div class="step-icon me-3"><i class="bi bi-2-circle fs-5"></i></div>
            <small>Set up your store</small>
        </div>
        <div class="d-flex align-items-center" style="color:rgba(255,255,255,.8);">
            <div class="step-icon me-3"><i class="bi bi-3-circle fs-5"></i></div>
            <small>Start selling instantly</small>
        </div>
    </div>
</div>

<!-- Right Panel -->
<div class="reg-right">
    <div class="reg-card">
        <a th:href="@{/}" class="btn-close position-absolute top-0 end-0 m-3" aria-label="Close"></a>

        <!-- Mobile logo -->
        <div class="text-center d-md-none mb-3">
            <img th:src="@{'/uploads/logo/logo.jpeg'}" alt="Logo"
                 style="width: 50px; height: 50px; border-radius: 10px; object-fit: cover;">
        </div>

        <h4 class="text-center fw-bold mb-1">Create an Account</h4>
        <p class="text-center text-muted mb-4" style="font-size:0.88rem;">Join BlackSpace Store today</p>

        <div th:if="${error}" class="alert alert-danger py-2" th:text="${error}"></div>
        <div th:if="${success}" class="alert alert-success py-2" th:text="${success}"></div>

        <form th:action="@{/register}" th:object="${user}" method="post" id="registerForm" onsubmit="showLoader('Creating your account...')">
            <div class="row g-3">

                <div class="col-6">
                    <label class="form-label"><i class="bi bi-person me-1"></i>First Name</label>
                    <input type="text" th:field="*{firstName}" class="form-control" placeholder="John" required>
                </div>
                <div class="col-6">
                    <label class="form-label"><i class="bi bi-person me-1"></i>Last Name</label>
                    <input type="text" th:field="*{lastName}" class="form-control" placeholder="Doe" required>
                </div>

                <div class="col-6">
                    <label class="form-label"><i class="bi bi-telephone me-1"></i>Phone Number</label>
                    <input type="text" th:field="*{phoneNumber}" class="form-control" placeholder="+260..." required>
                </div>
                <div class="col-6">
                    <label class="form-label"><i class="bi bi-envelope me-1"></i>Email</label>
                    <input type="email" th:field="*{email}" class="form-control" placeholder="you@example.com" required>
                </div>

                <div class="col-6">
                    <label class="form-label"><i class="bi bi-lock me-1"></i>Password</label>
                    <div class="input-group">
                        <input type="password" th:field="*{password}" class="form-control" id="password" placeholder="Create password" required
                               style="border-radius:10px 0 0 10px;">
                        <button class="btn btn-outline-secondary" type="button" onclick="togglePassword('password', this)"
                                style="border-radius:0 10px 10px 0; border-color:#e0e0e0;">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                </div>
                <div class="col-6">
                    <label class="form-label"><i class="bi bi-lock-fill me-1"></i>Confirm Password</label>
                    <div class="input-group">
                        <input type="password" name="confirmPassword" class="form-control" id="confirmPassword" placeholder="Repeat password" required
                               style="border-radius:10px 0 0 10px;">
                        <button class="btn btn-outline-secondary" type="button" onclick="togglePassword('confirmPassword', this)"
                                style="border-radius:0 10px 10px 0; border-color:#e0e0e0;">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="col-6">
                    <label class="form-label"><i class="bi bi-geo-alt me-1"></i>Address</label>
                    <input type="text" th:field="*{address}" class="form-control" placeholder="Street address">
                </div>
                <div class="col-6">
                    <label class="form-label"><i class="bi bi-card-text me-1"></i>ID Number</label>
                    <input type="text" th:field="*{docidnumber}" class="form-control" placeholder="National ID">
                </div>

                <div class="col-6">
                    <label class="form-label"><i class="bi bi-building me-1"></i>Town</label>
                    <input type="text" th:field="*{town}" class="form-control" placeholder="Lusaka">
                </div>
                <div class="col-6">
                    <label class="form-label"><i class="bi bi-globe me-1"></i>Country</label>
                    <input type="text" th:field="*{country}" class="form-control" placeholder="Zambia">
                </div>

                <!-- reCAPTCHA -->
                <div class="col-12 d-flex justify-content-center">
                    <div class="g-recaptcha" th:attr="data-sitekey=${recaptchaSiteKey}"></div>
                </div>
            </div>

            <!-- Disclaimer -->
            <div class="text-center mt-3">
                <button type="button" class="btn btn-sm btn-outline-secondary" id="viewDisclaimerBtn">
                    <i class="bi bi-info-circle me-1"></i> View Disclaimer
                </button>
                <div class="form-check mt-2 d-inline-block">
                    <input class="form-check-input" type="checkbox" id="agreeDisclaimer">
                    <label class="form-check-label small" for="agreeDisclaimer">
                        I have read and agree to the disclaimer
                    </label>
                </div>
            </div>

            <button type="submit" class="btn btn-register w-100 mt-3" id="registerBtn" disabled>
                <i class="bi bi-person-plus me-1"></i> Create Account
            </button>
        </form>

        <div class="text-center mt-3">
            <small class="text-muted">Already have an account?
                <a href="/login" class="fw-semibold text-decoration-none" style="color:#302b63;">Login here</a>
            </small>
        </div>
    </div>
</div>

<!-- Loading Overlay -->
<div id="loadingOverlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,.6); z-index:9999; justify-content:center; align-items:center;">
    <div style="background:#fff; border-radius:16px; padding:30px 40px; text-align:center; box-shadow:0 8px 30px rgba(0,0,0,.3);">
        <div class="spinner-border text-primary mb-3" style="width:3rem; height:3rem;" role="status"></div>
        <p id="loaderText" class="mb-1 fw-semibold" style="color:#302b63;">Creating your account...</p>
        <div style="width:200px; height:4px; background:#e0e0e0; border-radius:4px; overflow:hidden; margin:10px auto 0;">
            <div id="progressBar" style="width:0%; height:100%; background:linear-gradient(90deg,#302b63,#667eea); border-radius:4px; transition:width 0.3s;"></div>
        </div>
    </div>
</div>

<script src="https://www.google.com/recaptcha/api.js" async defer></script>

<script>
    function showLoader(text) {
        var overlay = document.getElementById('loadingOverlay');
        var bar = document.getElementById('progressBar');
        document.getElementById('loaderText').textContent = text;
        overlay.style.display = 'flex';
        var width = 0;
        var interval = setInterval(function() {
            width += Math.random() * 15;
            if (width > 90) { width = 90; clearInterval(interval); }
            bar.style.width = width + '%';
        }, 300);
    }

    function togglePassword(fieldId, btn) {
        var field = document.getElementById(fieldId);
        var icon = btn.querySelector('i');
        if (field.type === "password") {
            field.type = "text";
            icon.classList.remove("bi-eye");
            icon.classList.add("bi-eye-slash");
        } else {
            field.type = "password";
            icon.classList.remove("bi-eye-slash");
            icon.classList.add("bi-eye");
        }
    }
</script>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        var viewBtn = document.getElementById('viewDisclaimerBtn');
        var agreeCheckbox = document.getElementById('agreeDisclaimer');
        var registerBtn = document.getElementById('registerBtn');

        viewBtn.addEventListener('click', function() {
            Swal.fire({
                title: 'Disclaimer',
                html: '<p>By registering, you agree to our terms and conditions, consent to make online payments, and acknowledge that all personal information provided including full name, phone number, email address, and national identity card number must be accurate. Any misuse or false information may result in account suspension.</p>',
                icon: 'info',
                confirmButtonText: 'OK',
                confirmButtonColor: '#302b63',
                width: '550px',
                customClass: { popup: 'rounded-4' }
            });
        });

        agreeCheckbox.addEventListener('change', function() {
            registerBtn.disabled = !agreeCheckbox.checked;
        });
    });
</script>

</body>
</html>
