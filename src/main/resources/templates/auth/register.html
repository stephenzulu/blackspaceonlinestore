<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register | BlackSpace</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(rgba(0,0,0,.6), rgba(0,0,0,.6)),
                        url('/store/banner/store_banner.png') center/cover no-repeat;
            font-family: Arial, sans-serif;
        }

        .card {
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }

        .form-label {
            font-weight: 500;
        }
    </style>
</head>

<body>

<div class="container d-flex justify-content-center align-items-center min-vh-100 py-3">
    <div class="card w-100" style="max-width: 700px;">
        <div class="card-body p-4">

            <h4 class="text-center mb-2">Create an Account</h4>
            <p class="text-center text-muted mb-4">Join BlackSpace Store</p>

            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

            <!-- CLOSE BUTTON -->
            <a th:href="@{/}"
               class="btn-close position-absolute top-0 end-0 m-3"
               aria-label="Close"></a>

            <form th:action="@{/register}" th:object="${user}" method="post">
                <div class="row g-3">

                    <!-- First & Last Name -->
                    <div class="col-6 col-md-6">
                        <label class="form-label">First Name</label>
                        <input type="text" th:field="*{firstName}" class="form-control" required>
                    </div>

                    <div class="col-6 col-md-6">
                        <label class="form-label">Last Name</label>
                        <input type="text" th:field="*{lastName}" class="form-control" required>
                    </div>

                    <!-- Phone & Email -->
                    <div class="col-6 col-md-6">
                        <label class="form-label">Phone Number</label>
                        <input type="text" th:field="*{phoneNumber}" class="form-control" required>
                    </div>

                    <div class="col-6 col-md-6">
                        <label class="form-label">Email</label>
                        <input type="email" th:field="*{email}" class="form-control" required>
                    </div>

                    <!-- Password -->
                    <div class="col-6 col-md-6">
                        <label class="form-label">Password</label>
                        <div class="input-group">
                            <input type="password" th:field="*{password}" class="form-control" id="password" required>
                            <button class="btn btn-outline-secondary" type="button"
                                    onclick="togglePassword('password', this)">👁</button>
                        </div>
                    </div>

                    <!-- Confirm Password -->
                    <div class="col-6 col-md-6">
                        <label class="form-label">Confirm Password</label>
                        <div class="input-group">
                            <input type="password" name="confirmPassword" class="form-control" id="confirmPassword" required>
                            <button class="btn btn-outline-secondary" type="button"
                                    onclick="togglePassword('confirmPassword', this)">👁</button>
                        </div>
                    </div>


                    <!-- Address & ID -->
                    <div class="col-6 col-md-6">
                        <label class="form-label">Address</label>
                        <input type="text" th:field="*{address}" class="form-control">
                    </div>

                    <div class="col-6 col-md-6">
                        <label class="form-label">ID Number</label>
                        <input type="text" th:field="*{docidnumber}" class="form-control">
                    </div>

                    <!-- Town & Country -->
                    <div class="col-6 col-md-6">
                        <label class="form-label">Town</label>
                        <input type="text" th:field="*{town}" class="form-control">
                    </div>

                    <div class="col-6 col-md-6">
                        <label class="form-label">Country</label>
                        <input type="text" th:field="*{country}" class="form-control">
                    </div>

                    <!-- reCAPTCHA -->
                    <div class="mb-3 d-flex justify-content-center">
                        <div class="g-recaptcha"
                             th:attr="data-sitekey=${recaptchaSiteKey}">
                        </div>
                    </div>
                    <script src="https://www.google.com/recaptcha/api.js" async defer></script>


                </div>


                <!-- Disclaimer Checkbox & Button -->
                <div class="col-12 mt-3 text-center">
                    <button type="button" class="btn btn-info mb-2" id="viewDisclaimerBtn">
                        View Disclaimer
                    </button>
                    <div class="form-check mt-2 w-50 mx-auto">
                        <input class="form-check-input" type="checkbox" id="agreeDisclaimer">
                        <label class="form-check-label" for="agreeDisclaimer">
                            I have read and agree to the disclaimer
                        </label>
                    </div>

                </div>

                <!-- Register Button -->
                <div class="d-flex justify-content-center">
                    <button type="submit" class="btn btn-primary w-50 mt-4" id="registerBtn" disabled>
                        Register
                    </button>
                </div>


            </form>

            <div class="text-center mt-3">
                <small>
                    Already have an account?
                    <a href="/login">Login here</a>
                </small>
            </div>

        </div>
    </div>
</div>

<script src="https://www.google.com/recaptcha/api.js" async defer></script>

<script>
    function togglePassword(fieldId, btn) {
        const field = document.getElementById(fieldId);
        field.type = field.type === "password" ? "text" : "password";
        btn.innerText = field.type === "password" ? "👁" : "🙈";
    }
</script>


<script>
    document.addEventListener('DOMContentLoaded', function() {
        const viewBtn = document.getElementById('viewDisclaimerBtn');
        const agreeCheckbox = document.getElementById('agreeDisclaimer');
        const registerBtn = document.getElementById('registerBtn');

        // Show disclaimer popup
        viewBtn.addEventListener('click', () => {
            Swal.fire({
                title: 'Disclaimer',
                html: `<p> By registering, you agree to our terms and conditions, consent to make online payments,
    and acknowledge that all personal information provided including full name, phone number,
    email address, and national identity card number must be accurate. Any misuse or false
    information may result in account suspension.</p>`,
                icon: 'info',
                confirmButtonText: 'OK',
                width: '600px',
                customClass: {
                    popup: 'rounded-3'
                }
            });
        });

        // Enable register button only if checkbox is checked
        agreeCheckbox.addEventListener('change', () => {
            registerBtn.disabled = !agreeCheckbox.checked;
        });
    });
</script>


</body>
</html>
