<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Verify OTP | BlackSpace</title>
    <link rel="icon" type="image/png" th:href="@{'/uploads/favicon/' + ${siteSettings.siteFavicon}}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <style>
        body {
            min-height: 100vh; margin: 0; display: flex;
            align-items: center; justify-content: center;
            background: linear-gradient(135deg, rgba(246,246,244,.95), rgba(251,237,230,.6)),
                        url('/store/banner/store_banner.png') center/cover no-repeat;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        .otp-card {
            width: 100%; max-width: 440px; background: #fff;
            border-radius: 16px; padding: 36px; text-align: center;
            box-shadow: 0 4px 24px rgba(0,0,0,.08); position: relative;
        }
        .otp-icon {
            width: 64px; height: 64px; border-radius: 16px;
            background: rgba(232,97,29,.1); display: inline-flex;
            align-items: center; justify-content: center; margin-bottom: 16px;
        }
        .otp-inputs { display: flex; justify-content: center; gap: 8px; margin: 24px 0; }
        .otp-inputs input {
            width: 48px; height: 56px; text-align: center;
            font-size: 1.4rem; font-weight: 700; color: #0E0E11;
            border: 2px solid #E7E7EA; border-radius: 12px;
            transition: border-color .2s, box-shadow .2s;
            outline: none;
        }
        .otp-inputs input:focus {
            border-color: #E8611D; box-shadow: 0 0 0 3px rgba(232,97,29,.12);
        }
        .otp-inputs input.filled { border-color: #0F7A4E; background: rgba(15,122,78,.04); }
        .btn-verify {
            background: linear-gradient(135deg, #E8611D, #B8480F);
            color: #fff; border: none; border-radius: 10px;
            padding: 12px; font-weight: 600; letter-spacing: 0.5px;
            transition: opacity .2s, transform .2s;
        }
        .btn-verify:hover { opacity: .9; transform: translateY(-1px); color: #fff; }
        .btn-verify:disabled { opacity: .5; transform: none; }
        .resend-link {
            color: #8A8A93; font-size: 0.85rem; text-decoration: none;
            transition: color .2s;
        }
        .resend-link:hover { color: #E8611D; }
        .timer { color: #E8611D; font-weight: 600; font-size: 0.85rem; }

        @media (max-width: 480px) {
            .otp-card { margin: 16px; padding: 24px 20px; }
            .otp-inputs input { width: 42px; height: 50px; font-size: 1.2rem; }
        }
    </style>
</head>
<body>

<div class="otp-card">
    <a th:href="@{/login}" class="btn-close position-absolute top-0 end-0 m-3" aria-label="Close"></a>

    <div class="otp-icon">
        <i class="bi bi-shield-lock" style="font-size:1.8rem; color:#E8611D;"></i>
    </div>

    <h4 class="fw-bold mb-1">Verify Your Identity</h4>
    <p class="text-muted mb-0" style="font-size:0.9rem;">
        We've sent a 6-digit code to
    </p>
    <p class="fw-semibold mb-0" style="font-size:0.9rem; color:#0E0E11;" th:text="${maskedEmail}">e***@example.com</p>

    <!-- Alerts -->
    <div th:if="${error}" class="alert alert-danger py-2 small mt-3 mb-0">
        <i class="bi bi-exclamation-triangle me-1"></i><span th:text="${error}"></span>
    </div>
    <div th:if="${success}" class="alert alert-success py-2 small mt-3 mb-0">
        <i class="bi bi-check-circle me-1"></i><span th:text="${success}"></span>
    </div>

    <form th:action="@{/verify-otp}" method="post" id="otpForm">
        <input type="hidden" name="otp" id="otpHidden">

        <!-- OTP Input Boxes -->
        <div class="otp-inputs">
            <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" class="otp-box" autofocus>
            <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" class="otp-box">
            <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" class="otp-box">
            <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" class="otp-box">
            <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" class="otp-box">
            <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" class="otp-box">
        </div>

        <button type="submit" class="btn btn-verify w-100" id="verifyBtn" disabled>
            <i class="bi bi-check-circle me-1"></i> Verify & Login
        </button>
    </form>

    <div class="mt-3">
        <p class="mb-1" style="font-size:0.82rem; color:#8A8A93;">Didn't receive the code?</p>
        <form th:action="@{/resend-otp}" method="post" class="d-inline" id="resendForm">
            <button type="submit" class="btn btn-sm btn-link resend-link p-0" id="resendBtn">
                <i class="bi bi-arrow-clockwise me-1"></i>Resend Code
            </button>
        </form>
        <div class="timer mt-1" id="timerDisplay"></div>
    </div>

    <div class="mt-3 pt-3" style="border-top:1px solid #F0F0F0;">
        <a th:href="@{/login}" class="small text-decoration-none" style="color:#8A8A93;">
            <i class="bi bi-arrow-left me-1"></i>Back to Login
        </a>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    var boxes = document.querySelectorAll('.otp-box');
    var hiddenInput = document.getElementById('otpHidden');
    var verifyBtn = document.getElementById('verifyBtn');
    var resendBtn = document.getElementById('resendBtn');
    var timerDisplay = document.getElementById('timerDisplay');

    // OTP input behavior
    boxes.forEach(function(box, index) {
        box.addEventListener('input', function() {
            this.value = this.value.replace(/[^0-9]/g, '');
            if (this.value && index < boxes.length - 1) {
                boxes[index + 1].focus();
            }
            this.classList.toggle('filled', this.value.length > 0);
            updateOtp();
        });

        box.addEventListener('keydown', function(e) {
            if (e.key === 'Backspace' && !this.value && index > 0) {
                boxes[index - 1].focus();
                boxes[index - 1].value = '';
                boxes[index - 1].classList.remove('filled');
                updateOtp();
            }
        });

        // Paste support
        box.addEventListener('paste', function(e) {
            e.preventDefault();
            var data = (e.clipboardData || window.clipboardData).getData('text').replace(/[^0-9]/g, '');
            for (var i = 0; i < Math.min(data.length, boxes.length); i++) {
                boxes[i].value = data[i];
                boxes[i].classList.add('filled');
            }
            if (data.length >= boxes.length) boxes[boxes.length - 1].focus();
            else if (data.length > 0) boxes[Math.min(data.length, boxes.length - 1)].focus();
            updateOtp();
        });
    });

    function updateOtp() {
        var otp = '';
        boxes.forEach(function(b) { otp += b.value; });
        hiddenInput.value = otp;
        verifyBtn.disabled = otp.length < 6;
    }

    // Resend cooldown timer (60 seconds)
    var cooldown = 60;
    var timer = null;

    function startCooldown() {
        resendBtn.disabled = true;
        var remaining = cooldown;
        timerDisplay.textContent = 'Resend available in ' + remaining + 's';
        timer = setInterval(function() {
            remaining--;
            if (remaining <= 0) {
                clearInterval(timer);
                resendBtn.disabled = false;
                timerDisplay.textContent = '';
            } else {
                timerDisplay.textContent = 'Resend available in ' + remaining + 's';
            }
        }, 1000);
    }

    startCooldown();
});
</script>

</body>
</html>
