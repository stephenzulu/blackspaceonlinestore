<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/png" th:href="@{'/uploads/favicon/' + ${siteSettings.siteFavicon}}">
    <title>All Products | Black Space Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background: #F6F6F4; }
        .page-hero {
            background: #F6F6F4; padding: 24px 0 16px;
        }
        .page-hero h1 { font-weight: 700; font-size: 1.5rem; color: #0E0E11; margin: 0; }
        .page-hero p.lead { color: #8A8A93 !important; font-size: 0.88rem; margin: 4px 0 0; }
        .section-title { font-weight: 700; font-size: 1.4rem; margin-bottom: 8px; }
        .section-subtitle { color: #8A8A93; font-size: 0.9rem; margin-bottom: 32px; }

        .filter-bar {
            background: #fff; border-radius: 14px; padding: 14px 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,.05);
        }
        .filter-bar .form-control, .filter-bar .form-select {
            border: 1px solid #E7E7EA; border-radius: 10px; font-size: 0.88rem;
        }
        .filter-bar .form-control:focus, .filter-bar .form-select:focus {
            border-color: #E8611D; box-shadow: 0 0 0 3px rgba(232,97,29,.1);
        }

        .product-card {
            border: none; border-radius: 16px; overflow: hidden;
            background: #fff; box-shadow: 0 2px 12px rgba(0,0,0,.05);
            transition: transform .3s, box-shadow .3s;
        }
        .product-card:hover { transform: translateY(-6px); box-shadow: 0 10px 30px rgba(0,0,0,.12); }
        .product-card .product-img {
            height: 150px; width: 100%; object-fit: contain; padding: 8px;
            transition: transform .35s;
        }
        .product-card:hover .product-img { transform: scale(1.05); }
        .product-card .card-body { padding: 12px 14px; border-top: 1px solid #F0F0F0; }
        .product-card .card-body h6 {
            font-size: 0.88rem; font-weight: 600; margin-bottom: 4px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .product-card .product-category {
            font-size: 0.72rem; color: #8A8A93; margin-bottom: 8px;
        }
        .product-card .product-price { font-weight: 700; color: #E8611D; font-size: 0.9rem; }
        .product-card .product-stats {
            display: flex; align-items: center; justify-content: center; gap: 12px;
            padding-top: 8px; margin-top: 8px; border-top: 1px solid #F0F0F0;
            font-size: 0.75rem; color: #8A8A93;
        }

        .trending-card {
            border: none; border-radius: 14px; overflow: hidden;
            box-shadow: 0 2px 12px rgba(0,0,0,.05); transition: transform .3s;
        }
        .trending-card:hover { transform: translateY(-4px); }

        @media (max-width: 576px) {
            .page-hero { padding: 28px 0 20px; }
            .page-hero h1 { font-size: 1.6rem; }
            .product-card .product-img { height: 120px; }
        }
    </style>
</head>
<body>

<div th:replace="fragments/navbar :: topbar"></div>

<!-- Hero -->
<section class="page-hero">
    <div class="container">
        <div class="d-flex align-items-center gap-3">
            <div class="d-inline-flex align-items-center justify-content-center" style="width:44px; height:44px; border-radius:12px; background:rgba(242,183,5,.12); flex-shrink:0;">
                <i class="bi bi-box-seam" style="font-size:1.2rem; color:#F2B705;"></i>
            </div>
            <div>
                <h1>All Products</h1>
                <p class="lead mb-0">Explore products from trusted local sellers</p>
            </div>
        </div>
    </div>
</section>

<!-- Breadcrumb -->
<div class="container mt-3">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb bg-white p-2 px-3 rounded-3 shadow-sm small mb-0">
            <li class="breadcrumb-item"><a th:href="@{/}" style="color:#E8611D; text-decoration:none;"><i class="bi bi-house-door-fill"></i></a></li>
            <li class="breadcrumb-item active">Products</li>
        </ol>
    </nav>
</div>

<!-- Filter & Products -->
<section class="py-4">
    <div class="container">
        <!-- Filter Bar -->
        <form th:action="@{/products}" method="get" class="filter-bar mb-4">
            <div class="row g-2 align-items-center">
                <div class="col-12 col-md-5">
                    <input type="text" name="name" class="form-control" placeholder="Search by product name..." th:value="${name}">
                </div>
                <div class="col-6 col-md-3">
                    <select name="category" class="form-select">
                        <option value="">All Categories</option>
                        <option th:each="cat : ${categories}" th:value="${cat}" th:text="${cat}" th:selected="${cat == category}"></option>
                    </select>
                </div>
                <div class="col-3 col-md-2">
                    <button type="submit" class="btn w-100" style="background:#0E0E11; color:#fff; border:none; border-radius:10px;">
                        <i class="bi bi-search me-1"></i>Search
                    </button>
                </div>
                <div class="col-3 col-md-2">
                    <a th:href="@{/products}" class="btn btn-light w-100" style="border-radius:10px;">Reset</a>
                </div>
            </div>
        </form>

        <!-- Products Grid -->
        <div class="row g-3">
            <div th:each="product : ${products}" class="col-6 col-sm-4 col-md-3">
                <div class="product-card h-100">
                    <a th:href="@{'/product/' + ${product.id}}" class="d-flex justify-content-center align-items-center" style="background:#FAFAFA;">
                        <img loading="lazy" th:src="@{'/uploads/products/images/' + ${#strings.arraySplit(product.imageurls, ',')[0]}}"
                             class="product-img" alt="Product">
                    </a>
                    <div class="card-body">
                        <h6 th:text="${product.name}">Product Name</h6>
                        <div class="product-category" th:text="${product.category}"></div>
                        <div class="d-flex justify-content-between align-items-center">
                            <span class="product-price" th:text="${product.currency + ' ' + #numbers.formatDecimal(product.price, 1, 'COMMA', 0, 'POINT')}"></span>
                            <a th:href="@{'/product/' + ${product.id}}" class="btn btn-sm" style="background:#0E0E11; color:#fff; border:none; border-radius:8px; padding:4px 12px; font-size:0.75rem;">View</a>
                        </div>
                        <div class="product-stats">
                            <span><i class="bi bi-eye-fill me-1"></i><span th:text="${product.views}">0</span></span>
                            <span><i class="bi bi-hand-thumbs-up-fill me-1" style="color:#0F7A4E;"></i><span th:text="${product.likes}">0</span></span>
                            <span><i class="bi bi-hand-thumbs-down-fill me-1" style="color:#C33636;"></i><span th:text="${product.dislikes}">0</span></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Empty state -->
        <div th:if="${#lists.isEmpty(products)}" class="text-center py-5">
            <i class="bi bi-box-seam" style="font-size:3rem; color:#E7E7EA;"></i>
            <p class="text-muted mt-3">No products found.</p>
        </div>

        <!-- Pagination -->
        <nav class="mt-4" th:if="${totalPages > 1}">
            <ul class="pagination justify-content-center">
                <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                    <a class="page-link" th:href="@{/products(page=${currentPage - 1}, name=${name}, category=${category})}">Previous</a>
                </li>
                <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}" th:classappend="${i == currentPage} ? 'active'">
                    <a class="page-link" th:text="${i + 1}" th:href="@{/products(page=${i}, name=${name}, category=${category})}"></a>
                </li>
                <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
                    <a class="page-link" th:href="@{/products(page=${currentPage + 1}, name=${name}, category=${category})}">Next</a>
                </li>
            </ul>
        </nav>
    </div>
</section>

<!-- Top Stores -->
<section class="py-5" style="background:#fff;" th:if="${topStores != null and !#lists.isEmpty(topStores)}">
    <div class="container text-center">
        <span class="badge mb-2" style="background:rgba(29,158,99,.1); color:#1D9E63; font-size:0.75rem; padding:6px 12px; border-radius:20px;">Featured</span>
        <h2 class="section-title">Top Stores</h2>
        <p class="section-subtitle">Discover popular stores on our platform</p>
        <div id="topStoresCarousel" class="carousel slide" data-bs-ride="carousel" data-bs-interval="3000">
            <div class="carousel-inner">
                <div th:each="store, stat : ${topStores}" class="carousel-item" th:classappend="${stat.index == 0} ? ' active'">
                    <div class="d-flex justify-content-center px-3">
                        <div style="max-width:260px; width:100%;">
                            <a th:href="@{'/store/' + ${store.id}}" class="text-decoration-none text-dark">
                                <div class="trending-card bg-white mx-auto">
                                    <div class="position-relative">
                                        <img loading="lazy" th:if="${store.storebanner != null and store.storebanner != ''}"
                                             th:src="@{'/uploads/stores/' + ${store.storebanner}}" class="w-100" style="height:110px; object-fit:cover;">
                                        <img loading="lazy" th:unless="${store.storebanner != null and store.storebanner != ''}"
                                             th:src="@{/store/banner/banner.jpeg}" class="w-100" style="height:110px; object-fit:cover;">
                                        <img loading="lazy" th:if="${store.storelogo != null and store.storelogo != ''}"
                                             th:src="@{'/uploads/stores/' + ${store.storelogo}}"
                                             class="position-absolute rounded-circle border bg-white"
                                             style="width:40px;height:40px;object-fit:contain;bottom:-20px;left:50%;transform:translateX(-50%);">
                                        <img loading="lazy" th:unless="${store.storelogo != null and store.storelogo != ''}"
                                             th:src="@{/store/logo/logo.jpeg}"
                                             class="position-absolute rounded-circle border bg-white"
                                             style="width:40px;height:40px;object-fit:contain;bottom:-20px;left:50%;transform:translateX(-50%);">
                                    </div>
                                    <div class="text-center mt-2 p-2">
                                        <p class="mb-1 small fw-semibold text-truncate" th:text="${store.name}">Store</p>
                                        <small style="color:#E8611D;">Visit Store</small>
                                    </div>
                                </div>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <a th:href="@{/stores}" class="btn btn-sm mt-4" style="background:#0E0E11; color:#fff; border:none; border-radius:10px; padding:8px 24px;">
            View All Stores <i class="bi bi-arrow-right ms-1"></i>
        </a>
    </div>
</section>

<div th:replace="fragments/footer :: footer"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
