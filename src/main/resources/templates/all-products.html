<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>All Products | Black Space Store</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/png" th:href="@{'/uploads/favicon/' + ${siteSettings.siteFavicon}}">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<!-- NAVBAR -->
<div th:replace="fragments/navbar :: topbar"></div>

<!-- HERO SECTION -->
<section class="about-hero">
    <div class="container">
        <h1 class="fw-bold"><i class="bi bi-box-seam me-2"></i>All Products</h1>
        <p class="lead mt-2" style="color:#fff;">
            Explore products from trusted local sellers
        </p>
    </div>
</section>

<div class="container mt-3">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb bg-light p-2 rounded">
            <li class="breadcrumb-item">
                <a th:href="@{/}">
                    <i class="bi bi-house-door-fill me-1"></i>
                </a>
            </li>
            <li class="breadcrumb-item active" aria-current="page">Products</li>
        </ol>
    </nav>
</div>

<div class="container py-2">

    <h2 class="mb-4 text-center"><i class="bi bi-box-seam me-2 text-primary"></i>All Products</h2>

    <!-- Search Form -->
    <form th:action="@{/products}" method="get" class="row g-3 mb-4 ">
        <div class="col-md-4">
            <input type="text" name="name" class="form-control" placeholder="Search by product name" th:value="${name}">
        </div>
        <div class="col-md-4">
            <select name="category" class="form-select">
                <option value="">All Categories</option>
                <option th:each="cat : ${categories}" th:value="${cat}" th:text="${cat}" th:selected="${cat == category}"></option>
            </select>
        </div>
        <div class="col-md-2">
            <button type="submit" class="btn btn-primary w-100">Search</button>
        </div>
        <div class="col-md-2">
            <a th:href="@{/products}" class="btn btn-secondary w-100">Reset</a>
        </div>
    </form>

    <!-- Products Grid -->
    <div class="row g-3">

            <div th:each="product : ${products}" class="col-6 col-sm-6 col-md-3">

            <div class="card h-100 product-card shadow-sm">

                <a th:href="@{'/product/' + ${product.id}}" class="d-flex justify-content-center align-items-center" style="height:150px;">
                    <img th:src="@{'/uploads/products/images/' + ${#strings.arraySplit(product.imageurls, ',')[0]}}" class="img-fluid" alt="image"
                         style="max-height:150px; object-fit:contain; cursor:pointer;">
                </a>


                <div class="card-body">
                    <h6 th:text="${product.name}">Product Name</h6>
                    <p class="small text-muted" th:text="${product.category}"></p>
                    <div class="d-flex justify-content-between align-items-center">
                        <span class="fw-bold text-primary" th:text="${product.currency + ' ' + #numbers.formatDecimal(product.price, 1, 'COMMA', 0, 'POINT')}"></span>
                        <a th:href="@{'/product/' + ${product.id}}" class="btn btn-sm btn-outline-primary">View</a>
                    </div>

                    <div class="d-flex justify-content-center align-items-center gap-3">
                        <p class="text-muted mb-0">
                            <i class="bi bi-eye-fill me-1"></i> <span th:text="${product.views}">0</span>
                        </p>

                        <div class="vr"></div> <!-- Vertical line -->

                        <p class="text-muted mb-0">
                            <i class="bi bi-hand-thumbs-up-fill text-success me-1"></i> <span th:text="${product.likes}">0</span>
                        </p>

                        <div class="vr"></div> <!-- Vertical line -->

                        <p class="text-muted mb-0">
                            <i class="bi bi-hand-thumbs-down-fill text-danger me-1"></i> <span th:text="${product.dislikes}">0</span>
                        </p>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- More Button -->
    <nav class="mt-4" th:if="${totalPages > 1}">
        <ul class="pagination justify-content-center">

            <!-- Previous -->
            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/products(
                   page=${currentPage - 1},
                   name=${name},
                   category=${category}
               )}">
                    Previous
                </a>
            </li>

            <!-- Page Numbers -->
            <li class="page-item"
                th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                th:classappend="${i == currentPage} ? 'active'">
                <a class="page-link"
                   th:text="${i + 1}"
                   th:href="@{/products(
                   page=${i},
                   name=${name},
                   category=${category}
               )}">
                </a>
            </li>

            <!-- Next -->
            <li class="page-item"
                th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/products(
                   page=${currentPage + 1},
                   name=${name},
                   category=${category}
               )}">
                    Next
                </a>
            </li>

        </ul>
    </nav>


    <div class="text-center mt-4" th:if="${#lists.isEmpty(products)}">
        <p class="text-muted">No products found.</p>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<style>

    .about-hero {
        background: linear-gradient(135deg, rgba(14,14,17,.85), rgba(58,58,64,.8)),
                    url('/store/banner/store_banner.png') center/cover no-repeat;
        color: white;
        padding: 80px 0;
        text-align: center;
    }

    .icon-box i {
        font-size: 2rem;
        color: #E8611D;
    }

    body { background: linear-gradient(180deg, #F6F6F4, #E7E7EA); }
</style>


<style>
    /* Product Card Hover Effect */
.product-card {
    border-radius: 12px;
    transition: all 0.35s ease;
    cursor: pointer;
    overflow: hidden;
}

/* Lift + shadow */
.product-card:hover {
    transform: translateY(-10px);
    box-shadow: 0 14px 30px rgba(0, 0, 0, 0.15);
}

/* Image zoom on hover */
.product-card img {
    transition: transform 0.4s ease;
}

.product-card:hover img {
    transform: scale(1.08);
}

/* Button emphasis on hover */
.product-card:hover .btn {
    background-color: #E8611D;
    color: #fff;
    border-color: #E8611D;
}

</style>


<!-- TOP STORES CAROUSEL -->
<section class="py-4" style="background: linear-gradient(135deg, #E6F2EC, #FBEDE6);" th:if="${topStores != null and !#lists.isEmpty(topStores)}">
    <div class="container">
        <h4 class="text-center mb-4">
            <i class="bi bi-shop me-2 text-white"></i>Top Stores
        </h4>
        <div id="topStoresCarousel" class="carousel slide" data-bs-ride="carousel" data-bs-interval="3000">
            <div class="carousel-inner">
                <div th:each="store, stat : ${topStores}"
                     class="carousel-item"
                     th:classappend="${stat.index == 0} ? ' active'">
                    <div class="d-flex justify-content-center px-3">
                        <div style="max-width:260px; width:100%;">
                            <a th:href="@{'/store/' + ${store.id}}" class="text-decoration-none text-dark">
                                <div class="card shadow-sm mx-auto overflow-hidden" style="border-radius:10px;">
                                    <div class="position-relative">
                                        <img th:if="${store.storebanner != null and store.storebanner != ''}"
                                             th:src="@{'/uploads/stores/' + ${store.storebanner}}"
                                             class="w-100" style="height:110px; object-fit:cover;">
                                        <img th:unless="${store.storebanner != null and store.storebanner != ''}"
                                             th:src="@{/store/banner/banner.jpeg}"
                                             class="w-100" style="height:110px; object-fit:cover;">
                                        <img th:if="${store.storelogo != null and store.storelogo != ''}"
                                             th:src="@{'/uploads/stores/' + ${store.storelogo}}"
                                             class="position-absolute rounded-circle border bg-white"
                                             style="width:40px;height:40px;object-fit:contain;bottom:-20px;left:50%;transform:translateX(-50%);">
                                        <img th:unless="${store.storelogo != null and store.storelogo != ''}"
                                             th:src="@{/store/logo/logo.jpeg}"
                                             class="position-absolute rounded-circle border bg-white"
                                             style="width:40px;height:40px;object-fit:contain;bottom:-20px;left:50%;transform:translateX(-50%);">
                                    </div>
                                    <div class="card-body text-center mt-2 p-2">
                                        <p class="mb-1 small fw-semibold text-truncate" th:text="${store.name}">Store</p>
                                        <small class="text-primary">Visit Store</small>
                                    </div>
                                </div>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="mt-4 text-center">
            <a th:href="@{/stores}" class="btn btn-primary btn-sm px-4 py-2 rounded-pill shadow-sm">
                <span>View All Stores</span> <i class="bi bi-arrow-right-circle-fill ms-1"></i>
            </a>
        </div>
    </div>
</section>

<!-- FOOTER -->
<div th:replace="fragments/footer :: footer"></div>

</body>
</html>
