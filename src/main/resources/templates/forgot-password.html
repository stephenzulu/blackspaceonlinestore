<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Forgot Password | Black Space Store</title>
    <link rel="icon" type="image/png" th:href="@{'/uploads/favicon/' + ${siteSettings.siteFavicon}}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <style>
        body {
            min-height: 100vh; margin: 0; display: flex;
            align-items: center; justify-content: center;
            background: linear-gradient(135deg, rgba(246,246,244,.95), rgba(251,237,230,.6)),
                        url('/store/banner/store_banner.png') center/cover no-repeat;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        .reset-card {
            width: 100%; max-width: 440px; background: #fff;
            border-radius: 16px; padding: 36px; text-align: center;
            box-shadow: 0 4px 24px rgba(0,0,0,.08); position: relative;
        }
        .reset-icon {
            width: 64px; height: 64px; border-radius: 16px;
            background: rgba(232,97,29,.1); display: inline-flex;
            align-items: center; justify-content: center; margin-bottom: 16px;
        }
        .form-control {
            border-radius: 10px; padding: 12px 14px;
            border: 1px solid #E7E7EA;
            transition: border-color .2s, box-shadow .2s;
        }
        .form-control:focus {
            border-color: #E8611D;
            box-shadow: 0 0 0 3px rgba(232,97,29,.12);
        }
        .btn-reset {
            background: linear-gradient(135deg, #E8611D, #B8480F);
            color: #fff; border: none; border-radius: 10px;
            padding: 12px; font-weight: 600; letter-spacing: 0.5px;
            transition: opacity .2s, transform .2s;
        }
        .btn-reset:hover { opacity: .9; transform: translateY(-1px); color: #fff; }
        .btn-reset:disabled { opacity: .5; transform: none; }
        .progress-wrap {
            display: none; margin-top: 16px;
        }
        .progress-wrap .progress {
            height: 5px; border-radius: 3px; background: #E7E7EA;
        }
        .progress-wrap .progress-bar {
            background: linear-gradient(90deg, #E8611D, #F2B705);
            border-radius: 3px; transition: width .3s;
        }
        @media (max-width: 480px) {
            .reset-card { margin: 16px; padding: 24px 20px; }
        }
    </style>
</head>
<body>

<div class="reset-card">
    <a th:href="@{/login}" class="btn-close position-absolute top-0 end-0 m-3" aria-label="Close"></a>

    <div class="reset-icon">
        <i class="bi bi-key" style="font-size:1.8rem; color:#E8611D;"></i>
    </div>

    <h4 class="fw-bold mb-1">Forgot Password?</h4>
    <p class="text-muted mb-4" style="font-size:0.88rem;">
        Enter your email address and we'll send you a link to reset your password.
    </p>

    <!-- Alerts -->
    <div th:if="${message}" class="alert py-2 small text-start mb-3" style="background:rgba(15,122,78,.08); border:1px solid rgba(15,122,78,.2); border-radius:10px; color:#0F7A4E;">
        <i class="bi bi-check-circle-fill me-1"></i><span th:text="${message}"></span>
    </div>
    <div th:if="${error}" class="alert alert-danger py-2 small text-start mb-3" style="border-radius:10px;">
        <i class="bi bi-exclamation-triangle me-1"></i><span th:text="${error}"></span>
    </div>

    <form th:action="@{/forgot-password}" method="post" id="resetForm">
        <div class="mb-3 text-start">
            <label class="form-label fw-medium" style="font-size:0.88rem;">
                <i class="bi bi-envelope me-1" style="color:#E8611D;"></i> Email Address
            </label>
            <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
        </div>

        <button type="submit" class="btn btn-reset w-100" id="resetBtn">
            <i class="bi bi-send me-1"></i> Send Reset Link
        </button>

        <!-- Progress bar -->
        <div class="progress-wrap" id="progressWrap">
            <div class="progress">
                <div class="progress-bar progress-bar-striped progress-bar-animated" id="progressBar" style="width:0%;"></div>
            </div>
            <small class="text-muted mt-1 d-block" style="font-size:0.78rem;">Sending reset link to your email...</small>
        </div>
    </form>

    <div class="mt-4 pt-3" style="border-top:1px solid #F0F0F0;">
        <div class="d-flex justify-content-center gap-3">
            <a th:href="@{/login}" class="small text-decoration-none" style="color:#8A8A93;">
                <i class="bi bi-arrow-left me-1"></i>Back to Login
            </a>
            <span style="color:#E7E7EA;">|</span>
            <a th:href="@{/register}" class="small text-decoration-none" style="color:#E8611D;">
                Create Account <i class="bi bi-arrow-right ms-1"></i>
            </a>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    var form = document.getElementById('resetForm');
    var btn = document.getElementById('resetBtn');
    var progressWrap = document.getElementById('progressWrap');
    var progressBar = document.getElementById('progressBar');

    form.addEventListener('submit', function(e) {
        if (!form.checkValidity()) return;

        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span> Sending...';
        progressWrap.style.display = 'block';

        var width = 0;
        var interval = setInterval(function() {
            width += Math.random() * 15;
            if (width > 90) { width = 90; clearInterval(interval); }
            progressBar.style.width = width + '%';
        }, 300);
    });
});
</script>

</body>
</html>
