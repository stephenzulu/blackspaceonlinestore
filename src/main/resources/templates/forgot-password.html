<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password | Black Space Store</title>
    <link rel="icon" type="image/png" th:href="@{/favicon.png}">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<style>
    /* Full page background image */
    body {
        height: 100vh;
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;

  background: linear-gradient(rgba(0,0,0,.6), rgba(0,0,0,.6)),
                url('/store/banner/store_banner.png') center/cover no-repeat;

        background-size: cover;
        font-family: 'Arial', sans-serif;
    }

    /* Login card styling */
    .card {
        background-color: rgba(255, 255, 255, 0.95);
        border-radius: 12px;
        box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        position: relative;
    }

    /* Close button adjustment */
    .btn-close {
        z-index: 10;
    }

    /* Input group styling */
    .input-group input {
        border-radius: 0.375rem 0 0 0.375rem;
    }

    .input-group button {
        border-radius: 0 0.375rem 0.375rem 0;
    }
</style>


<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card p-4" style="width:100%; max-width:400px;">
        <a th:href="@{/login}" class="btn-close position-absolute top-0 end-0 m-3"></a>

        <h4 class="text-center mb-3">Forgot Password</h4>
        <p class="text-muted text-center small">
            Enter your email and we’ll send you a reset link.
        </p>

        <form th:action="@{/forgot-password}" method="post">
            <div class="mb-3">
                <label class="form-label">Email address</label>
                <input type="email"
                       name="email"
                       class="form-control"
                       required>
            </div>

            <button class="btn btn-primary w-100 view-details-btn">Send Reset Link</button>
        </form>


        <div class="mt-3 text-center">
            <small th:if="${message}" class="text-success" th:text="${message}"></small>
            <small th:if="${error}" class="text-danger" th:text="${error}"></small>
        </div>
    </div>
</div>

<!-- loader -->
<script>
    document.addEventListener('DOMContentLoaded', function() {
        // Select all buttons with the class "view-details-btn"
        document.querySelectorAll('.view-details-btn').forEach(button => {
            button.addEventListener('click', function(e) {
                e.preventDefault(); // Prevent immediate navigation

                const url = this.getAttribute('href'); // Get the link to redirect

                // Show SweetAlert loader
                Swal.fire({
                    title: 'Loading...',
                    text: 'please wait...',
                    allowOutsideClick: false,
                    didOpen: () => {
                        Swal.showLoading();
                    }
                });

                // Redirect after short delay (so loader is visible)
                setTimeout(() => {
                    window.location.href = url;
                }, 800); // 800ms delay
            });
        });
    });
</script>

</body>
</html>
