<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Search Results | BlackSpace</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<!-- NAVBAR -->
<div th:replace="fragments/navbar :: topbar"></div>

<!-- HERO SECTION -->
<section class="about-hero">
    <div class="container">
        <h1 class="fw-bold">About Black Space Store</h1>
        <p class="lead mt-2">
            Connecting buyers with trusted local sellers
        </p>
    </div>
</section>

<div class="container mt-3">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb bg-light p-2 rounded">
            <li class="breadcrumb-item">
                <a th:href="@{/}">
                    <i class="bi bi-house-door-fill me-1"></i>
                </a>
            </li>
            <li class="breadcrumb-item active" aria-current="page">Products</li>
        </ol>
    </nav>
</div>

<div class="container py-5">

    <h3 th:text="'Search results for: ' + ${q}"></h3>

    <div th:if="${products.isEmpty()}" class="alert alert-warning mt-3">
        No products found.
    </div>

    <div class="row row-cols-2 row-cols-sm-2 row-cols-md-3 row-cols-lg-5 g-4 mt-3">
        <div class="col" th:each="product : ${products}">
            <a th:href="@{'/product/' + ${product.id}}" class="text-decoration-none text-dark">
                <div class="card h-100 shadow-sm overflow-hidden product-card">

                    <img th:src="@{'/uploads/products/images/' + ${product.imageurl}}"
                         class="card-img-top"
                         alt="Product Image"
                         style="width: 100%; height: 200px; object-fit: cover;">

                    <div class="card-body">
                        <p class="card-title" th:text="${product.name}">Product Name</p>
                        <p class="card-text fw-bold" th:text="${product.currency + ' ' + product.price}">Price</p>
                    </div>

                </div>
            </a>
        </div>
    </div>





</div>


<style>
    /* Product Card Hover Effect */
.product-card {
    border-radius: 12px;
    transition: all 0.35s ease;
    cursor: pointer;
    overflow: hidden;
}

/* Lift + shadow */
.product-card:hover {
    transform: translateY(-10px);
    box-shadow: 0 14px 30px rgba(0, 0, 0, 0.15);
}

/* Image zoom on hover */
.product-card img {
    transition: transform 0.4s ease;
}

.product-card:hover img {
    transform: scale(1.08);
}

/* Button emphasis on hover */
.product-card:hover .btn {
    background-color: #0d6efd;
    color: #fff;
    border-color: #0d6efd;
}

</style>



<style>

    .about-hero {
        background: linear-gradient(rgba(0,0,0,.6), rgba(0,0,0,.6)),
                    url('/store/banner/store_banner.png') center/cover no-repeat;
        color: white;
        padding: 80px 0;
        text-align: center;
    }

    .icon-box i {
        font-size: 2rem;
        color: #0d6efd;
    }
</style>

<!-- FOOTER -->
<div th:replace="fragments/footer :: footer"></div>


</body>
</html>
