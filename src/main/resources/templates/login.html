<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login | Black Space Store</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        /* Full page background image */
        body {
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;

      background: linear-gradient(rgba(0,0,0,.6), rgba(0,0,0,.6)),
                    url('/store/banner/store_banner.png') center/cover no-repeat;

            background-size: cover;
            font-family: 'Arial', sans-serif;
        }

        /* Login card styling */
        .card {
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
            position: relative;
        }

        /* Close button adjustment */
        .btn-close {
            z-index: 10;
        }

        /* Input group styling */
        .input-group input {
            border-radius: 0.375rem 0 0 0.375rem;
        }

        .input-group button {
            border-radius: 0 0.375rem 0.375rem 0;
        }
    </style>


</head>
<body>


<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card p-4" style="width: 100%; max-width: 500px;">
        <!-- CLOSE BUTTON -->
        <a th:href="@{/}"
           class="btn-close position-absolute top-0 end-0 m-3"
           aria-label="Close"></a>

        <!-- LOGO -->
        <div class="mb-3">
            <img th:src="@{'/uploads/logo/logo.jpeg'}"
                 alt="Black Space Logo"
                 style="width: 120px; height: auto; display: block; margin: 0 auto;">
        </div>
        <h3 class="text-center mb-4">Login</h3>

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label for="username" class="form-label">Email</label>
                <input type="email" class="form-control" name="username" id="username" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>

                <div class="input-group">
                    <input type="password"
                           class="form-control"
                           name="password"
                           id="password"
                           required>

                    <button class="btn btn-outline-secondary"
                            type="button"
                            onclick="togglePassword()">
                        <i class="bi bi-eye" id="toggleIcon"></i>
                    </button>
                </div>
            </div>


            <!-- FORGOT PASSWORD -->
            <div class="mb-3 text-end ">
                <a th:href="@{/forgot-password}"
                   class="small text-decoration-none ">
                    Forgot password?
                </a>
            </div>


            <!-- reCAPTCHA -->
            <div class="mb-3 d-flex justify-content-center">
                <div class="g-recaptcha"
                     th:attr="data-sitekey=${recaptchaSiteKey}">
                </div>
            </div>
            <script src="https://www.google.com/recaptcha/api.js" async defer></script>



            <div class="d-flex justify-content-center ">
                <button type="submit" class="btn btn-primary w-50 " >Login</button>
            </div>
        </form>

        <div class="mt-3 text-center">
            <span>Don't have an account? </span>
            <a th:href="@{/register}" class="text-primary ">Create one</a>
        </div>
    </div>
</div>

<script src="https://www.google.com/recaptcha/api.js" async defer></script>
<script>
    function togglePassword() {
        const passwordInput = document.getElementById("password");
        const icon = document.getElementById("toggleIcon");

        if (passwordInput.type === "password") {
            passwordInput.type = "text";
            icon.classList.remove("bi-eye");
            icon.classList.add("bi-eye-slash");
        } else {
            passwordInput.type = "password";
            icon.classList.remove("bi-eye-slash");
            icon.classList.add("bi-eye");
        }
    }
</script>



</body>
</html>
