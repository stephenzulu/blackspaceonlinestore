<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/png" th:href="@{'/uploads/favicon/' + ${siteSettings.siteFavicon}}">
    <title th:text="${categoryName} + ' Products | Black Space Store'">Category Products</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background: #F6F6F4; }
        .page-hero {
            position: relative; overflow: hidden;
            color: #fff; padding: 70px 0 60px; text-align: center;
        }
        .page-hero h1, .page-hero p { color: #fff !important; }
        .page-hero h1 { font-weight: 700; font-size: 2.2rem; position: relative; z-index: 2; }
        .page-hero p { position: relative; z-index: 2; }
        .page-hero .hero-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: 0;
        }
        .page-hero .hero-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(14,14,17,.85), rgba(58,58,64,.7));
            z-index: 1;
        }
        .hero-content { position: relative; z-index: 2; }

        .section-title { font-weight: 700; font-size: 1.4rem; margin-bottom: 8px; }
        .section-subtitle { color: #8A8A93; font-size: 0.9rem; margin-bottom: 32px; }

        .search-bar {
            background: #fff; border-radius: 14px; padding: 12px 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,.05); display: flex; gap: 10px;
            max-width: 500px; margin: 0 auto;
        }
        .search-bar .form-control {
            border: 1px solid #E7E7EA; border-radius: 10px; font-size: 0.88rem;
        }
        .search-bar .form-control:focus {
            border-color: #E8611D; box-shadow: 0 0 0 3px rgba(232,97,29,.1);
        }

        .product-card {
            border: none; border-radius: 16px; overflow: hidden;
            background: #fff; box-shadow: 0 2px 12px rgba(0,0,0,.05);
            transition: transform .3s, box-shadow .3s;
        }
        .product-card:hover { transform: translateY(-6px); box-shadow: 0 10px 30px rgba(0,0,0,.12); }
        .product-card .product-img {
            height: 150px; width: 100%; object-fit: contain; padding: 8px;
            transition: transform .35s; background: #FAFAFA;
        }
        .product-card:hover .product-img { transform: scale(1.05); }
        .product-card .card-body { padding: 12px 14px; border-top: 1px solid #F0F0F0; }
        .product-card .card-body .product-name {
            font-size: 0.88rem; font-weight: 600; margin-bottom: 6px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            color: #3A3A40;
        }
        .product-card .product-price { font-weight: 700; color: #E8611D; font-size: 0.9rem; }

        .result-count {
            display: inline-flex; align-items: center; gap: 6px;
            background: #fff; padding: 6px 14px; border-radius: 20px;
            font-size: 0.8rem; color: #8A8A93; box-shadow: 0 1px 6px rgba(0,0,0,.04);
        }

        @media (max-width: 576px) {
            .page-hero { padding: 50px 0 40px; }
            .page-hero h1 { font-size: 1.6rem; }
            .product-card .product-img { height: 120px; }
        }
    </style>
</head>
<body>

<div th:replace="fragments/navbar :: topbar"></div>

<!-- Hero with category image -->
<section class="page-hero">
    <img loading="lazy" th:src="@{${categoryImage}}" alt="banner" class="hero-bg">
    <div class="hero-overlay"></div>
    <div class="container hero-content">
        <div class="d-inline-flex align-items-center justify-content-center mb-3"
             style="width:56px; height:56px; border-radius:14px; background:rgba(168,85,247,.25);">
            <i class="bi bi-grid-3x3-gap-fill" style="font-size:1.5rem; color:#A855F7;"></i>
        </div>
        <h1 th:text="${categoryName}">Category</h1>
        <p class="lead mt-2 mb-0" style="color:#fff;">Browse products in this category</p>
    </div>
</section>

<!-- Breadcrumb -->
<div class="container mt-3">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb bg-white p-2 px-3 rounded-3 shadow-sm small mb-0">
            <li class="breadcrumb-item"><a th:href="@{/}" style="color:#E8611D; text-decoration:none;"><i class="bi bi-house-door-fill"></i></a></li>
            <li class="breadcrumb-item"><a th:href="@{/categories}" style="color:#E8611D; text-decoration:none;">Categories</a></li>
            <li class="breadcrumb-item active" th:text="${categoryName}">Category</li>
        </ol>
    </nav>
</div>

<!-- Search & Products -->
<section class="py-4">
    <div class="container">
        <!-- Search bar -->
        <div class="search-bar mb-3">
            <input type="text" id="productSearch" class="form-control flex-grow-1" placeholder="Search products by name...">
        </div>

        <!-- Result count -->
        <div class="text-center mb-4">
            <span class="result-count">
                <i class="bi bi-box-seam" style="color:#E8611D;"></i>
                <span id="resultCount" th:text="${#lists.size(products)} + ' products found'">0 products found</span>
            </span>
        </div>

        <!-- Products Grid -->
        <div class="row g-3" id="productsWrapper">
            <div th:each="product : ${products}" class="col-6 col-sm-4 col-md-3 product-item">
                <a th:href="@{'/product/' + ${product.id}}" class="text-decoration-none">
                    <div class="product-card h-100">
                        <img loading="lazy" th:src="@{'/uploads/products/images/' + ${#strings.arraySplit(product.imageurls, ',')[0]}}"
                             class="product-img" alt="Product">
                        <div class="card-body">
                            <div class="product-name" th:text="${product.name}">Product Name</div>
                            <div class="d-flex justify-content-between align-items-center">
                                <span class="product-price" th:text="${product.currency + ' ' + #numbers.formatDecimal(product.price, 1, 'COMMA', 0, 'POINT')}">Price</span>
                                <span class="btn btn-sm" style="background:#0E0E11; color:#fff; border:none; border-radius:8px; padding:4px 12px; font-size:0.72rem;">View</span>
                            </div>
                        </div>
                    </div>
                </a>
            </div>
        </div>

        <!-- Empty state -->
        <div id="emptyState" style="display:none;" class="text-center py-5">
            <i class="bi bi-search" style="font-size:3rem; color:#E7E7EA;"></i>
            <p class="text-muted mt-3">No products match your search.</p>
        </div>

        <!-- Pagination -->
        <nav class="mt-4">
            <ul class="pagination justify-content-center" id="pagination"></ul>
        </nav>
    </div>
</section>

<div th:replace="fragments/footer :: footer"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
document.addEventListener('DOMContentLoaded', function() {
    var searchInput = document.getElementById('productSearch');
    var allCards = Array.from(document.querySelectorAll('.product-item'));
    var paginationEl = document.getElementById('pagination');
    var resultCountEl = document.getElementById('resultCount');
    var emptyState = document.getElementById('emptyState');
    var pageSize = 8;
    var currentPage = 1;

    function getFiltered() {
        var q = searchInput.value.toLowerCase();
        return allCards.filter(function(card) {
            return card.querySelector('.product-name').textContent.toLowerCase().indexOf(q) !== -1;
        });
    }

    function render(filtered, page) {
        allCards.forEach(function(c) { c.style.display = 'none'; });

        var start = (page - 1) * pageSize;
        var end = start + pageSize;
        filtered.slice(start, end).forEach(function(c) { c.style.display = 'block'; });

        resultCountEl.textContent = filtered.length + ' product' + (filtered.length !== 1 ? 's' : '') + ' found';
        emptyState.style.display = filtered.length === 0 ? 'block' : 'none';

        // Pagination
        var totalPages = Math.ceil(filtered.length / pageSize);
        paginationEl.innerHTML = '';
        if (totalPages <= 1) return;

        for (var i = 1; i <= totalPages; i++) {
            (function(pg) {
                var li = document.createElement('li');
                li.className = 'page-item' + (pg === page ? ' active' : '');
                var a = document.createElement('a');
                a.className = 'page-link';
                a.href = '#';
                a.textContent = pg;
                a.addEventListener('click', function(e) {
                    e.preventDefault();
                    currentPage = pg;
                    render(getFiltered(), currentPage);
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                });
                li.appendChild(a);
                paginationEl.appendChild(li);
            })(i);
        }
    }

    searchInput.addEventListener('keyup', function() {
        currentPage = 1;
        render(getFiltered(), currentPage);
    });

    render(allCards, currentPage);
});
</script>
</body>
</html>
