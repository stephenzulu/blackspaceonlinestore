<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Users • ZEO Online Store</title>
    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
    />
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="#" th:href="@{/}">ZEO Online Store</a>
        <span class="navbar-text">Users</span>
    </div>
</nav>

<div class="container">

    <!-- Alerts -->
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div class="row g-4">
        <!-- Form Card -->
        <div class="col-lg-5">
            <div class="card shadow-sm">
                <div class="card-header">
                    <h5 class="mb-0" th:text="${#ids.seq('formTitle', user?.id != null ? 'Edit User' : 'Create User')}">Create User</h5>
                </div>
                <div class="card-body">
                    <form th:action="${user != null && user.id != null} ? @{/users/{id}(id=${user.id})} : @{/users}"
                          th:object="${user}"
                          method="post" novalidate>

                        <!-- CSRF (if Spring Security is enabled) -->
                        <input type="hidden" th:if="${_csrf != null}"
                               th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                        <div class="mb-3">
                            <label class="form-label">Username</label>
                            <input class="form-control" th:field="*{username}" placeholder="e.g. stephenz"/>
                            <div class="text-danger small" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" th:field="*{email}" placeholder="name@example.com"/>
                            <div class="text-danger small" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" class="form-control" th:field="*{password}" placeholder="••••••••"/>
                            <div class="text-danger small" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">First Name</label>
                                <input class="form-control" th:field="*{firstName}"/>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Last Name</label>
                                <input class="form-control" th:field="*{lastName}"/>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Phone Number</label>
                            <input class="form-control" th:field="*{phoneNumber}" placeholder="+260…"/>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Address</label>
                            <input class="form-control" th:field="*{address}" placeholder="Street and number"/>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">City</label>
                                <input class="form-control" th:field="*{city}" placeholder="Lusaka"/>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Country</label>
                                <input class="form-control" th:field="*{country}" placeholder="Zambia"/>
                            </div>
                            <div class="col-md-2 mb-3">
                                <label class="form-label">Postal Code</label>
                                <input class="form-control" th:field="*{postalCode}" placeholder="10101"/>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-5 mb-3">
                                <label class="form-label">Role</label>
                                <select class="form-select" th:field="*{role}">
                                    <option value="CUSTOMER">CUSTOMER</option>
                                    <option value="ADMIN">ADMIN</option>
                                    <option value="SELLER">SELLER</option>
                                </select>
                            </div>
                            <div class="col-md-7 d-flex align-items-center mb-3">
                                <div class="form-check mt-3">
                                    <input class="form-check-input" type="checkbox" th:field="*{enabled}" id="enabledCheck"/>
                                    <label class="form-check-label" for="enabledCheck">Enabled</label>
                                </div>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Created At</label>
                            <input class="form-control" th:value="${user?.createdAt}" disabled />
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Updated At</label>
                            <input class="form-control" th:value="${user?.updatedAt}" disabled />
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary" th:text="${user?.id != null ? 'Update' : 'Create'}">Create</button>
                            <a class="btn btn-secondary" th:href="@{/users}">Reset</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- List Card -->
        <div class="col-lg-7">
            <div class="card shadow-sm">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h5 class="mb-0">All Users</h5>
                    <form class="d-flex" method="get" th:action="@{/users}">
                        <input class="form-control form-control-sm me-2" type="search" name="q" placeholder="Search username/email" th:value="${param.q}" />
                        <button class="btn btn-sm btn-outline-secondary" type="submit">Search</button>
                    </form>
                </div>
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                        <tr>
                            <th>ID</th>
                            <th>Username</th>
                            <th>Email</th>
                            <th>Role</th>
                            <th>Enabled</th>
                            <th>Created</th>
                            <th class="text-end">Actions</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="u : ${users}">
                            <td th:text="${u.id}">1</td>
                            <td th:text="${u.username}">stephen</td>
                            <td th:text="${u.email}">stephen@example.com</td>
                            <td th:text="${u.role}">CUSTOMER</td>
                            <td>
                                <span th:text="${u.enabled ? 'Yes' : 'No'}">Yes</span>
                            </td>
                            <td th:text="${#temporals.format(u.createdAt, 'yyyy-MM-dd HH:mm')}">2025-08-30</td>
                            <td class="text-end">
                                <a class="btn btn-sm btn-outline-primary"
                                   th:href="@{/users/{id}/edit(id=${u.id})}">Edit</a>
                                <form th:action="@{/users/{id}(id=${u.id})}" method="post" class="d-inline"
                                      onsubmit="return confirm('Delete this user?');">
                                    <input type="hidden" name="_method" value="delete"/>
                                    <input type="hidden" th:if="${_csrf != null}"
                                           th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button class="btn btn-sm btn-outline-danger" type="submit">Delete</button>
                                </form>
                            </td>
