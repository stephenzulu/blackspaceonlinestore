<!-- src/main/resources/templates/fragments/navbar.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/extras/spring-security">

<body>
<div th:fragment="topbar">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <!-- Dynamic favicon from settings -->
    <link rel="icon" type="image/png" th:href="@{'/uploads/favicon/' + ${siteSettings.siteFavicon}}">

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- Site-wide font from settings -->
    <style th:inline="text">
        body { font-family: [[${siteSettings.fontFamily}]]; }
    </style>

    <!-- STICKY NAVBAR top -->
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top shadow"
         th:style="'background: linear-gradient(135deg,' + ${siteSettings.primaryColor} + ',' + ${siteSettings.secondaryColor} + ');'">

        <div class="container">

            <!-- Brand -->
            <a class="navbar-brand fw-bold d-flex align-items-center" th:href="@{/}">
                <!-- Logo -->
                <img th:src="@{'/uploads/logo/' + ${siteSettings.siteLogo}}" alt="Logo"
                     style="height:34px; width:auto; margin-right:10px; border-radius:6px;" class="d-inline-block align-text-top">
                <!-- Brand Name -->
                <span style="letter-spacing: 1px;" th:text="${siteSettings.siteName}">Black Space</span>

            </a>

            <!-- Mobile toggle -->
            <button style="display:none;" class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#mainNavbar" aria-controls="mainNavbar"
                    aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- Navbar links -->
            <div class="collapse navbar-collapse" id="mainNavbar">

                <!-- Left links -->
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link view-details-btn" th:href="@{/}">
                            <i class="bi bi-house me-1"></i> Home
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link view-details-btn" th:href="@{/stores}">
                            <i class="bi bi-shop me-1"></i> Stores
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link view-details-btn" th:href="@{/categories}">
                            <i class="bi bi-grid-3x3-gap-fill mb-1 "></i> Categories
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link view-details-btn" th:href="@{/products}">
                            <i class="bi bi-box-seam me-1"></i> Products
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link view-details-btn" th:href="@{/about}">
                            <i class="bi bi-info-circle me-1"></i> About
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link view-details-btn" th:href="@{/help}">
                            <i class="bi bi-question-circle mb-1"></i> Help
                        </a>
                    </li>





                </ul>


            </div>

            <div  id="mainNavbar2">

                <!-- actions -->
                <div class="d-flex gap-2 align-items-center">

                    <!-- Dark Mode Toggle -->
                    <button class="btn btn-outline-light btn-sm" id="darkModeToggleNav" onclick="toggleDarkMode()" title="Toggle Dark Mode">
                        <i class="bi bi-moon-fill"></i>
                    </button>

                    <!-- MY ACCOUNT → ONLY SELLER -->
                    <a th:if="${isSeller }"
                       th:href="@{/account/dashboard}"
                       class="btn btn-outline-light btn-sm view-details-btn">
                        <i class="bi bi-person"></i> My Account
                    </a>

                    <!-- ADMIN → ONLY ADMIN -->
                    <a th:if="${isAdmin}"
                       th:href="@{/admin/dashboard}"
                       class="btn btn-outline-light btn-sm view-details-btn">
                        <i class="bi bi-shield-lock"></i> Admin
                    </a>

                    <!-- LOGIN → ONLY WHEN NOT LOGGED IN -->
                    <a th:if="${!isLoggedIn}"
                       th:href="@{/login}"
                       class="btn btn-outline-light btn-sm view-details-btn">
                        <i class="bi bi-box-arrow-in-right"></i> Login
                    </a>

                    <!-- LOGOUT → ONLY WHEN LOGGED IN -->
                    <a th:if="${isLoggedIn}"
                       href="#"
                       onclick="confirmLogout(event)"
                       class="btn btn-outline-light btn-sm text-danger ">
                        <i class="bi bi-box-arrow-right"></i> Logout
                    </a>

                </div>



            </div>


        </div>


    </nav>



    <!-- Navbar styling -->
    <style>
        .nav-link {
            font-size: 0.95rem;
            padding: 8px 14px !important;
            border-radius: 8px;
            transition: background 0.2s;
        }
        .nav-link:hover {
            background: rgba(255,255,255,.15);
        }
        .nav-link.active-page {
            background: rgba(255,255,255,.2) !important;
            color: #fff !important;
            font-weight: 600;
        }
        .bottom-button2 .btn.active-page {
            color: #0d6efd !important;
            font-weight: 700;
        }
        .bottom-button2 .btn.active-page i {
            color: #0d6efd;
        }

        @media (max-width: 576px) {
            .nav-link {
                font-size: 0.85rem;
            }
            .btn {
                font-size: 0.85rem;
            }
        }

        /* Dropdown menu on mobile fits width */
        .dropdown-menu {
            min-width: 150px;
        }
    </style>

    <!-- Rotating Loader -->
    <div id="progressContainer" class="loader-overlay">
        <div class="spinner"></div>
    </div>




    <!-- Bottom Buttons Container -->
    <div class="bottom-button2 d-flex">
        <!-- Home -->
        <a th:href="@{/}" class="btn flex-fill d-flex flex-column align-items-center justify-content-center view-details-btn">
            <i class="bi bi-house-door mb-1"></i>
            Home
        </a>

        <!-- Stores -->
        <a th:href="@{/stores}" class="btn flex-fill d-flex flex-column align-items-center justify-content-center view-details-btn">
            <i class="bi bi-shop-window mb-1"></i>
            Stores
        </a>
        <!-- categories -->
        <a th:href="@{/categories}" class="btn flex-fill d-flex flex-column align-items-center justify-content-center view-details-btn">
            <i class="bi bi-grid-3x3-gap-fill mb-1 "></i>
            Categories
        </a>

        <!-- Products -->
        <a th:href="@{/products}" class="btn flex-fill d-flex flex-column align-items-center justify-content-center view-details-btn">
            <i class="bi bi-box-seam mb-1"></i>
            Products
        </a>

        <!-- About -->
        <a th:href="@{/about}" class="btn flex-fill d-flex flex-column align-items-center justify-content-center view-details-btn">
            <i class="bi bi-info-circle mb-1"></i>
            About
        </a>

        <!-- Account -->
        <a th:href="@{/help}" class="btn flex-fill d-flex flex-column align-items-center justify-content-center view-details-btn">
            <i class="bi bi-question-circle mb-1"></i>
            Help
        </a>
    </div>

    <script>
        function confirmLogout(event) {
            event.preventDefault();

            Swal.fire({
                title: 'Are you sure?',
                text: "You will be logged out of your account",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#d33',
                cancelButtonColor: '#6c757d',
                confirmButtonText: 'Yes, logout',
                cancelButtonText: 'Cancel'
            }).then((result) => {
                if (result.isConfirmed) {
                    window.location.href = '/logout';
                }
            });
        }
    </script>



    <style>
        /* Bottom buttons container */
        .bottom-button2 {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            z-index: 1050;
            display: none; /* only show on mobile */
            gap: 5px; /* space between buttons */
            background-color: #f0f0f0; /* light grey background */
            padding: 0.1rem 0; /* reduced top and bottom padding */
            border-top: 1px solid #ccc;
        }

        /* Button styling */
        .bottom-button2 .btn {
            border-radius: 0;
            background-color: transparent;
            color: #333;
            font-size: 0.7rem; /* slightly smaller text */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0.25rem 0; /* reduced top/bottom padding */
        }

        /* Icon styling */
        .bottom-button2 .btn i {
            font-size: 1.3rem; /* slightly smaller icon */
            margin-bottom: 0.2rem;
        }

        /* Add bottom padding on mobile so content doesn't hide behind fixed nav */
        @media (max-width: 982px) {
            body {
                padding-bottom: 100px;
            }
        }

         /* Show ONLY on small screens (mobile) */
        @media (min-width: 983px) {
            .bottom-button2 {
                display: none !important;
            }
        }
    </style>




    <!-- Dark mode styles -->
    <style>
        body { transition: background-color 0.3s, color 0.3s; }
        body.dark-mode { background-color: #1a1a2e !important; color: #fff; }
        body.dark-mode .bg-light { background-color: #1a1a2e !important; }
        body.dark-mode .bg-white { background-color: #16213e !important; color: #fff; }
        body.dark-mode .card { background-color: #16213e; color: #fff; border-color: #0f3460; }
        body.dark-mode .navbar { background: linear-gradient(135deg, #0a0a1a, #1a1a3e, #0f0f2e) !important; }
        body.dark-mode .text-dark { color: #fff !important; }
        body.dark-mode .table { color: #fff; }
        body.dark-mode .border-bottom { border-color: #0f3460 !important; }
        body.dark-mode .bottom-button2 { background-color: #16213e; border-top-color: #0f3460; }
        body.dark-mode .bottom-button2 .btn { color: #e0e0e0; }
        body.dark-mode .form-control { background-color: #16213e; color: #e0e0e0; border-color: #0f3460; }
        body.dark-mode .list-group-item { background-color: #16213e; color: #e0e0e0; border-color: #0f3460; }
        body.dark-mode footer.bg-dark { background-color: #0f3460 !important; }
        body.dark-mode, body.dark-mode * { color: #fff !important; }
        body.dark-mode .text-muted { color: #ccc !important; }
        body.dark-mode .btn-primary { color: #fff !important; background-color: #0d6efd !important; border-color: #0d6efd !important; }
        body.dark-mode .btn-success { color: #fff !important; background-color: #198754 !important; border-color: #198754 !important; }
        body.dark-mode .btn-danger { color: #fff !important; background-color: #dc3545 !important; border-color: #dc3545 !important; }
        body.dark-mode .btn-warning { color: #000 !important; background-color: #ffc107 !important; border-color: #ffc107 !important; }
        body.dark-mode .btn-secondary { color: #fff !important; background-color: #6c757d !important; border-color: #6c757d !important; }
        body.dark-mode .btn-info { color: #fff !important; background-color: #0dcaf0 !important; border-color: #0dcaf0 !important; }
        body.dark-mode .btn-outline-light { color: #e0e0e0 !important; border-color: #e0e0e0 !important; }
        body.dark-mode .btn-outline-primary { color: #4d94ff !important; border-color: #4d94ff !important; background: transparent !important; }
        body.dark-mode .btn-outline-secondary { color: #adb5bd !important; border-color: #adb5bd !important; background: transparent !important; }
        body.dark-mode .btn-outline-danger { color: #d9534f !important; border-color: #d9534f !important; background: transparent !important; }
        body.dark-mode .btn-outline-success { color: #5cb85c !important; border-color: #5cb85c !important; background: transparent !important; }
        body.dark-mode .badge { color: #fff !important; }
        body.dark-mode .badge.bg-success { background-color: #198754 !important; }
        body.dark-mode .badge.bg-danger { background-color: #dc3545 !important; }
        body.dark-mode .badge.bg-warning { background-color: #ffc107 !important; color: #000 !important; }
        body.dark-mode .badge.bg-primary { background-color: #0d6efd !important; }
        body.dark-mode .navbar-dark .nav-link, body.dark-mode .navbar-dark .navbar-brand { color: rgba(255,255,255,.85); }
        body.dark-mode .text-primary { color: #4d94ff !important; }
        body.dark-mode .text-success { color: #5cb85c !important; }
        body.dark-mode .text-danger { color: #d9534f !important; }
    </style>

    <!-- Dark mode script -->
    <script>
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            var isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('darkMode', isDark);
            updateDarkModeIcons(isDark);
        }

        function updateDarkModeIcons(isDark) {
            document.querySelectorAll('#darkModeToggleNav').forEach(function(btn) {
                var icon = btn.querySelector('i');
                if (isDark) {
                    icon.classList.remove('bi-moon-fill');
                    icon.classList.add('bi-sun-fill');
                } else {
                    icon.classList.remove('bi-sun-fill');
                    icon.classList.add('bi-moon-fill');
                }
            });
        }

        // Apply saved preference on load
        (function() {
            if (localStorage.getItem('darkMode') === 'true') {
                document.body.classList.add('dark-mode');
                document.addEventListener('DOMContentLoaded', function() {
                    updateDarkModeIcons(true);
                });
            }
        })();
    </script>

    <!-- loader -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            document.querySelectorAll('.view-details-btn').forEach(button => {
                button.addEventListener('click', function(e) {
                    e.preventDefault();
                    const url = this.getAttribute('href');

                    // Show SweetAlert loader with only the spinning icon
                    Swal.fire({
                        html: '<i class="fa fa-spinner fa-spin fa-3x"></i>', // spinner only
                        showConfirmButton: false,
                        allowOutsideClick: false,
                        background: 'transparent',   // remove modal background
                        backdrop: false,             // remove dark overlay
                        didOpen: () => {
                            // Remove the box-shadow on the modal
                            const modal = Swal.getPopup();
                            modal.style.boxShadow = 'none';
                        }
                    });

                    // Redirect after short delay
                    setTimeout(() => {
                        window.location.href = url;
                    }, 800);
                });
            });
        });
    </script>








<!-- Active nav highlight -->
<script>
    document.addEventListener('DOMContentLoaded', function() {
        var path = window.location.pathname;

        // Top navbar links
        document.querySelectorAll('#mainNavbar .nav-link').forEach(function(link) {
            var href = link.getAttribute('href');
            if (!href) return;
            if (href === '/' && path === '/') {
                link.classList.add('active-page');
            } else if (href !== '/' && path.startsWith(href)) {
                link.classList.add('active-page');
            }
        });

        // Bottom mobile nav buttons
        document.querySelectorAll('.bottom-button2 .btn').forEach(function(btn) {
            var href = btn.getAttribute('href');
            if (!href) return;
            if (href === '/' && path === '/') {
                btn.classList.add('active-page');
            } else if (href !== '/' && path.startsWith(href)) {
                btn.classList.add('active-page');
            }
        });
    });
</script>

</div>
</body>
</html>
