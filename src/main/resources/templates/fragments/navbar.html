<!-- src/main/resources/templates/fragments/navbar.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/extras/spring-security">

<body>
<div th:fragment="topbar">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <!-- Dynamic favicon from settings -->
    <link rel="icon" type="image/png" th:href="@{'/uploads/favicon/' + ${siteSettings.siteFavicon}}">

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- Site-wide font & base colors from settings -->
    <style th:inline="text">
        body {
            font-family: [[${siteSettings.fontFamily}]];
            background-color: #F6F6F4;
            color: #3A3A40;
            font-size: 16px;
            font-weight: 400;
            line-height: 1.6;
        }
        h1, h2, h3, h4, h5, h6 { color: #0E0E11; }
        #site-footer h1, #site-footer h2, #site-footer h3, #site-footer h4, #site-footer h5, #site-footer h6 { color: #fff !important; }

        h1 { font-size: 32px; font-weight: 600; }
        h2 { font-size: 22px; font-weight: 600; }
        h3 { font-size: 18px; font-weight: 600; }
        h4 { font-size: 16px; font-weight: 500; }
        h5 { font-size: 15px; font-weight: 500; }
        h6 { font-size: 13px; font-weight: 500; }
        @media (min-width: 768px) { h1 { font-size: 44px; } }
        p { font-size: 16px; font-weight: 400; line-height: 1.6; }
        .badge { font-size: 12px; font-weight: 500; }
        .form-label { font-size: 15px; font-weight: 400; }
        .form-control { font-size: 15px; font-weight: 400; }
        .form-text, .invalid-feedback, .valid-feedback { font-size: 13px; font-weight: 400; }
        .btn { font-size: 15px; font-weight: 500; }
        .price, .fw-price { font-size: 18px; font-weight: 600; font-variant-numeric: tabular-nums; }
        .meta, .text-meta { font-size: 12px; font-weight: 400; }
        .card-title { font-size: 15px; font-weight: 500; }
        .small, small { font-size: 13px; font-weight: 400; }
        .text-muted { color: #8A8A93 !important; }
        a { color: #B8480F; }
        a:hover { color: #E8611D; }
        .btn-primary { background-color: #E8611D; border-color: #E8611D; color: #fff; }
        .btn-primary:hover { background-color: #B8480F; border-color: #B8480F; color: #fff; }
        .btn-success { background-color: #0F7A4E; border-color: #0F7A4E; color: #fff; }
        .btn-success:hover { background-color: #0a6340; border-color: #0a6340; color: #fff; }
        .btn-danger { background-color: #C33636; border-color: #C33636; color: #fff; }
        .btn-danger:hover { background-color: #a82d2d; border-color: #a82d2d; color: #fff; }
        .btn-warning { background-color: #F2B705; border-color: #F2B705; color: #0E0E11; }
        .btn-warning:hover { background-color: #d9a504; border-color: #d9a504; color: #0E0E11; }
        .btn-info { background-color: #2B6CB0; border-color: #2B6CB0; color: #fff; }
        .btn-info:hover { background-color: #245a94; border-color: #245a94; color: #fff; }
        .btn-outline-primary { color: #E8611D; border-color: #E8611D; }
        .btn-outline-primary:hover { background-color: #E8611D; border-color: #E8611D; color: #fff; }
        .btn-outline-success { color: #0F7A4E; border-color: #0F7A4E; }
        .btn-outline-success:hover { background-color: #0F7A4E; border-color: #0F7A4E; color: #fff; }
        .btn-outline-danger { color: #C33636; border-color: #C33636; }
        .btn-outline-danger:hover { background-color: #C33636; border-color: #C33636; color: #fff; }
        .btn-secondary { background-color: #8A8A93; border-color: #8A8A93; color: #fff; }
        .btn-secondary:hover { background-color: #6e6e76; border-color: #6e6e76; color: #fff; }
        .text-primary { color: #E8611D !important; }
        .text-success { color: #0F7A4E !important; }
        .text-danger { color: #C33636 !important; }
        .text-warning { color: #C98A0B !important; }
        .text-info { color: #2B6CB0 !important; }
        .bg-primary { background-color: #E8611D !important; }
        .bg-success { background-color: #0F7A4E !important; }
        .bg-danger { background-color: #C33636 !important; }
        .bg-warning { background-color: #F2B705 !important; }
        .bg-info { background-color: #2B6CB0 !important; }
        .bg-light { background-color: #F6F6F4 !important; }
        .badge.bg-success { background-color: #1D9E63 !important; }
        .badge.bg-danger { background-color: #C33636 !important; }
        .badge.bg-warning { background-color: #F2B705 !important; color: #0E0E11 !important; }
        .badge.bg-primary { background-color: #E8611D !important; }
        .badge.bg-info { background-color: #2B6CB0 !important; }
        .card { background-color: #FFFFFF; border-color: #E7E7EA; }
        .border-bottom { border-color: #E7E7EA !important; }
        .form-control { border-color: #E7E7EA; }
        .form-control:focus { border-color: #E8611D; box-shadow: 0 0 0 3px rgba(232,97,29,.12); }
        .table { color: #3A3A40; }
        .list-group-item { border-color: #E7E7EA; }
    </style>

    <!-- STICKY NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top"
         style="background: #0E0E11; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);">

        <div class="container">

            <!-- Brand -->
            <a class="navbar-brand fw-bold d-flex align-items-center gap-2" th:href="@{/}">
                <img th:src="@{'/uploads/logo/' + ${siteSettings.siteLogo}}" alt="Logo"
                     style="height:36px; width:36px; object-fit:cover; border-radius:10px; border:2px solid rgba(255,255,255,.2);">
                <span class="brand-text" th:text="${siteSettings.siteName}">Black Space</span>
            </a>

            <!-- Mobile toggle (hidden, bottom nav used instead) -->
            <button style="display:none;" class="navbar-toggler border-0" type="button" data-bs-toggle="collapse"
                    data-bs-target="#mainNavbar" aria-controls="mainNavbar"
                    aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- Navbar links -->
            <div class="collapse navbar-collapse" id="mainNavbar">

                <ul class="navbar-nav mx-auto mb-2 mb-lg-0 gap-1">
                    <li class="nav-item">
                        <a class="nav-link view-details-btn" th:href="@{/}">
                            <i class="bi bi-house-door me-1"></i> Home
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link view-details-btn" th:href="@{/stores}">
                            <i class="bi bi-shop me-1"></i> Stores
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link view-details-btn" th:href="@{/categories}">
                            <i class="bi bi-grid-3x3-gap me-1"></i> Categories
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link view-details-btn" th:href="@{/products}">
                            <i class="bi bi-box-seam me-1"></i> Products
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link view-details-btn" th:href="@{/about}">
                            <i class="bi bi-info-circle me-1"></i> About
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link view-details-btn" th:href="@{/help}">
                            <i class="bi bi-question-circle me-1"></i> Help
                        </a>
                    </li>
                </ul>

            </div>

            <!-- Right actions -->
            <div class="d-flex gap-2 align-items-center" id="mainNavbar2">

                <!-- Dark Mode Toggle -->
                <button class="btn btn-icon" id="darkModeToggleNav" onclick="toggleDarkMode()" title="Toggle Dark Mode">
                    <i class="bi bi-moon-fill"></i>
                </button>

                <!-- MY ACCOUNT -->
                <a th:if="${isSeller}"
                   th:href="@{/account/dashboard}"
                   class="btn btn-nav-action view-details-btn">
                    <i class="bi bi-person-circle"></i>
                    <span class="d-none d-xl-inline ms-1">Account</span>
                </a>

                <!-- ADMIN -->
                <a th:if="${isAdmin}"
                   th:href="@{/admin/dashboard}"
                   class="btn btn-nav-action view-details-btn">
                    <i class="bi bi-shield-lock"></i>
                    <span class="d-none d-xl-inline ms-1">Admin</span>
                </a>

                <!-- LOGIN -->
                <a th:if="${!isLoggedIn}"
                   th:href="@{/login}"
                   class="btn btn-nav-login view-details-btn">
                    <i class="bi bi-box-arrow-in-right me-1"></i> Login
                </a>

                <!-- LOGOUT -->
                <a th:if="${isLoggedIn}"
                   href="#"
                   onclick="confirmLogout(event)"
                   class="btn btn-nav-logout">
                    <i class="bi bi-box-arrow-right me-1"></i> Logout
                </a>

            </div>

        </div>
    </nav>



    <!-- Navbar styling -->
    <style>
        /* Brand */
        .brand-text {
            font-size: 20px;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        /* Nav links */
        .navbar .nav-link {
            font-size: 15px;
            font-weight: 500;
            padding: 8px 16px !important;
            border-radius: 10px;
            color: rgba(255,255,255,.8);
            transition: all 0.25s ease;
            position: relative;
            display: inline-flex;
            align-items: center;
            white-space: nowrap;
        }
        .navbar .nav-link:hover {
            background: rgba(255,255,255,.12);
            color: #fff;
            transform: translateY(-1px);
        }
        .navbar .nav-link.active-page {
            background: rgba(255,255,255,.18);
            color: #fff !important;
            font-weight: 600;
            box-shadow: 0 2px 8px rgba(0,0,0,.1);
        }

        /* Icon button (dark mode) */
        .btn-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,.1);
            border: 1px solid rgba(255,255,255,.15);
            color: rgba(255,255,255,.85);
            transition: all 0.25s ease;
            padding: 0;
        }
        .btn-icon:hover {
            background: rgba(255,255,255,.2);
            color: #fff;
            transform: translateY(-1px);
        }

        /* Action buttons */
        .btn-nav-action {
            font-size: 15px;
            font-weight: 500;
            padding: 6px 14px;
            border-radius: 10px;
            background: rgba(255,255,255,.1);
            border: 1px solid rgba(255,255,255,.18);
            color: rgba(255,255,255,.9);
            transition: all 0.25s ease;
        }
        .btn-nav-action:hover {
            background: rgba(255,255,255,.2);
            color: #fff;
            transform: translateY(-1px);
        }

        /* Login button */
        .btn-nav-login {
            font-size: 15px;
            font-weight: 500;
            padding: 6px 18px;
            border-radius: 10px;
            background: rgba(255,255,255,.95);
            color: #0E0E11;
            border: none;
            transition: all 0.25s ease;
        }
        .btn-nav-login:hover {
            background: #fff;
            color: #0E0E11;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(0,0,0,.15);
        }

        /* Logout button */
        .btn-nav-logout {
            font-size: 15px;
            font-weight: 500;
            padding: 6px 14px;
            border-radius: 10px;
            background: rgba(195,54,54,.15);
            border: 1px solid rgba(195,54,54,.3);
            color: #C33636;
            transition: all 0.25s ease;
        }
        .btn-nav-logout:hover {
            background: rgba(195,54,54,.25);
            color: #a82d2d;
            transform: translateY(-1px);
        }

        /* Bottom mobile nav active */
        .bottom-button2 .btn.active-page {
            color: #E8611D !important;
            font-weight: 700;
        }
        .bottom-button2 .btn.active-page i {
            color: #E8611D;
        }

        @media (max-width: 576px) {
            .navbar .nav-link { font-size: 14px; }
            .btn-nav-action, .btn-nav-login, .btn-nav-logout { font-size: 14px; }
        }

        .dropdown-menu { min-width: 150px; }
    </style>

    <!-- Page Loading Overlay -->
    <div id="pageLoader" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,.95); z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center; transition:opacity .4s ease;">
        <!-- Top progress bar -->
        <div style="position:absolute; top:0; left:0; width:100%; height:3px; background:rgba(0,0,0,.06);">
            <div id="pageLoaderBar" style="height:100%; width:0%; background:linear-gradient(90deg, #E8611D, #F2B705, #E8611D); background-size:200% 100%; animation:loaderBarGrow 1.8s ease-in-out forwards, loaderBarShimmer 1s linear infinite; border-radius:0 2px 2px 0;"></div>
        </div>
        <!-- Logo -->
        <img th:src="@{'/uploads/logo/' + ${siteSettings.siteLogo}}" alt="Loading..."
             style="width:56px; height:56px; object-fit:cover; border-radius:14px; animation:loaderPulse 1.2s ease-in-out infinite; box-shadow:0 4px 20px rgba(232,97,29,.2);">
        <p style="margin-top:14px; font-size:0.8rem; font-weight:500; color:#8A8A93; letter-spacing:0.5px;">Loading...</p>
    </div>

    <style>
        @keyframes loaderPulse {
            0%, 100% { transform:scale(1); opacity:1; }
            50% { transform:scale(1.08); opacity:.7; }
        }
        @keyframes loaderBarGrow {
            0% { width:0%; }
            30% { width:45%; }
            60% { width:70%; }
            80% { width:85%; }
            100% { width:95%; }
        }
        @keyframes loaderBarShimmer {
            0% { background-position:200% 0; }
            100% { background-position:-200% 0; }
        }
        body.dark-mode #pageLoader { background:rgba(14,14,17,.95) !important; }
        body.dark-mode #pageLoader p { color:#8A8A93 !important; }
    </style>

    <script>
        window.addEventListener('load', function() {
            var loader = document.getElementById('pageLoader');
            var bar = document.getElementById('pageLoaderBar');
            if (loader) {
                bar.style.animation = 'none';
                bar.style.width = '100%';
                bar.style.transition = 'width .3s ease';
                setTimeout(function() {
                    loader.style.opacity = '0';
                    setTimeout(function() { loader.style.display = 'none'; }, 400);
                }, 300);
            }
        });
    </script>


    <!-- Bottom Mobile Nav -->
    <div class="bottom-button2 d-flex">
        <a th:href="@{/}" class="btn flex-fill d-flex flex-column align-items-center justify-content-center view-details-btn">
            <i class="bi bi-house-door mb-1" style="color:#E8611D;"></i>
            Home
        </a>
        <a th:href="@{/stores}" class="btn flex-fill d-flex flex-column align-items-center justify-content-center view-details-btn">
            <i class="bi bi-shop-window mb-1" style="color:#1D9E63;"></i>
            Stores
        </a>
        <a th:href="@{/categories}" class="btn flex-fill d-flex flex-column align-items-center justify-content-center view-details-btn">
            <i class="bi bi-grid-3x3-gap mb-1" style="color:#3B82F6;"></i>
            Categories
        </a>
        <a th:href="@{/products}" class="btn flex-fill d-flex flex-column align-items-center justify-content-center view-details-btn">
            <i class="bi bi-box-seam mb-1" style="color:#F2B705;"></i>
            Products
        </a>
        <a th:href="@{/about}" class="btn flex-fill d-flex flex-column align-items-center justify-content-center view-details-btn">
            <i class="bi bi-info-circle mb-1" style="color:#A855F7;"></i>
            About
        </a>
        <a th:href="@{/help}" class="btn flex-fill d-flex flex-column align-items-center justify-content-center view-details-btn">
            <i class="bi bi-question-circle mb-1" style="color:#06B6D4;"></i>
            Help
        </a>
    </div>

    <script>
        function confirmLogout(event) {
            event.preventDefault();
            Swal.fire({
                title: 'Are you sure?',
                text: "You will be logged out of your account",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#C33636',
                cancelButtonColor: '#8A8A93',
                confirmButtonText: 'Yes, logout',
                cancelButtonText: 'Cancel'
            }).then((result) => {
                if (result.isConfirmed) {
                    window.location.href = '/logout';
                }
            });
        }
    </script>

    <style>
        /* Bottom buttons container */
        .bottom-button2 {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            z-index: 1050;
            display: none;
            gap: 0;
            background: rgba(255,255,255,.95);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 6px 0 env(safe-area-inset-bottom, 4px);
            border-top: 1px solid #E7E7EA;
            box-shadow: 0 -2px 16px rgba(0,0,0,.04);
        }

        .bottom-button2 .btn {
            border-radius: 0;
            background-color: transparent;
            color: #8A8A93;
            font-size: 0.65rem;
            font-weight: 500;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4px 0;
            transition: color 0.2s;
        }
        .bottom-button2 .btn:hover { color: #E8611D; }

        .bottom-button2 .btn i {
            font-size: 1.25rem;
            margin-bottom: 2px;
        }

        @media (max-width: 982px) {
            body { padding-bottom: 80px; }
        }
        @media (min-width: 983px) {
            .bottom-button2 { display: none !important; }
        }
    </style>


    <!-- Dark mode styles -->
    <style>
        body { transition: background-color 0.3s, color 0.3s; }

        /* ── Base ── */
        body.dark-mode { background-color: #0E0E11 !important; color: #E7E7EA !important; }
        body.dark-mode, body.dark-mode * { color: #E7E7EA !important; }
        body.dark-mode h1, body.dark-mode h2, body.dark-mode h3,
        body.dark-mode h4, body.dark-mode h5, body.dark-mode h6 { color: #fff !important; }
        body.dark-mode a { color: #E8611D !important; }
        body.dark-mode a:hover { color: #f0783d !important; }
        body.dark-mode hr { border-color: #3A3A40 !important; opacity: .5; }

        /* ── Backgrounds ── */
        body.dark-mode .bg-light { background-color: #1a1a1e !important; }
        body.dark-mode .bg-white { background-color: #1a1a1e !important; color: #E7E7EA !important; }
        body.dark-mode .card { background-color: #1a1a1e !important; color: #E7E7EA !important; border-color: #3A3A40 !important; }
        body.dark-mode .card-header { background-color: #222228 !important; border-color: #3A3A40 !important; }
        body.dark-mode .card-footer { background-color: #222228 !important; border-color: #3A3A40 !important; }
        body.dark-mode .navbar { background: #0E0E11 !important; }
        body.dark-mode footer, body.dark-mode footer.bg-dark { background-color: #0E0E11 !important; }

        /* ── Text utilities ── */
        body.dark-mode .text-dark { color: #E7E7EA !important; }
        body.dark-mode .text-muted { color: #8A8A93 !important; }
        body.dark-mode .text-primary { color: #E8611D !important; }
        body.dark-mode .text-success { color: #1D9E63 !important; }
        body.dark-mode .text-danger { color: #C33636 !important; }
        body.dark-mode .text-warning { color: #F2B705 !important; }
        body.dark-mode .text-info { color: #2B6CB0 !important; }
        body.dark-mode .text-body { color: #E7E7EA !important; }

        /* ── Borders ── */
        body.dark-mode .border-bottom { border-color: #3A3A40 !important; }
        body.dark-mode .border-top { border-color: #3A3A40 !important; }
        body.dark-mode .border { border-color: #3A3A40 !important; }

        /* ── Tables ── */
        body.dark-mode .table { color: #E7E7EA !important; }
        body.dark-mode .table thead th { background-color: #222228 !important; color: #E7E7EA !important; border-color: #3A3A40 !important; }
        body.dark-mode .table td, body.dark-mode .table th { border-color: #3A3A40 !important; }
        body.dark-mode .table-striped > tbody > tr:nth-of-type(odd) { background-color: rgba(255,255,255,.03) !important; }
        body.dark-mode .table-hover > tbody > tr:hover { background-color: rgba(255,255,255,.06) !important; }

        /* ── Forms ── */
        body.dark-mode .form-control { background-color: #1a1a1e !important; color: #E7E7EA !important; border-color: #3A3A40 !important; }
        body.dark-mode .form-control::placeholder { color: #8A8A93 !important; }
        body.dark-mode .form-select { background-color: #1a1a1e !important; color: #E7E7EA !important; border-color: #3A3A40 !important; }
        body.dark-mode .form-check-input { background-color: #1a1a1e !important; border-color: #3A3A40 !important; }
        body.dark-mode .form-check-input:checked { background-color: #E8611D !important; border-color: #E8611D !important; }
        body.dark-mode .input-group-text { background-color: #222228 !important; color: #E7E7EA !important; border-color: #3A3A40 !important; }
        body.dark-mode .form-label { color: #E7E7EA !important; }
        body.dark-mode .form-text { color: #8A8A93 !important; }

        /* ── Modals ── */
        body.dark-mode .modal-content { background-color: #1a1a1e !important; color: #E7E7EA !important; border-color: #3A3A40 !important; }
        body.dark-mode .modal-header { border-bottom-color: #3A3A40 !important; }
        body.dark-mode .modal-footer { border-top-color: #3A3A40 !important; }
        body.dark-mode .modal-backdrop { background-color: #000 !important; }
        body.dark-mode .btn-close { filter: invert(1) grayscale(100%) brightness(200%); }

        /* ── Offcanvas ── */
        body.dark-mode .offcanvas { background-color: #1a1a1e !important; color: #E7E7EA !important; }
        body.dark-mode .offcanvas-header { border-bottom-color: #3A3A40 !important; }

        /* ── Dropdowns ── */
        body.dark-mode .dropdown-menu { background-color: #1a1a1e !important; border-color: #3A3A40 !important; }
        body.dark-mode .dropdown-item { color: #E7E7EA !important; }
        body.dark-mode .dropdown-item:hover, body.dark-mode .dropdown-item:focus { background-color: #222228 !important; color: #fff !important; }
        body.dark-mode .dropdown-divider { border-color: #3A3A40 !important; }

    <!-- Dark mode script -->
    <script>
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            var isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('darkMode', isDark);
            updateDarkModeIcons(isDark);
        }

        function updateDarkModeIcons(isDark) {
            document.querySelectorAll('#darkModeToggleNav').forEach(function(btn) {
                var icon = btn.querySelector('i');
                if (isDark) {
                    icon.classList.remove('bi-moon-fill');
                    icon.classList.add('bi-sun-fill');
                } else {
                    icon.classList.remove('bi-sun-fill');
                    icon.classList.add('bi-moon-fill');
                }
            });
        }

        // Apply saved preference on load
        (function() {
            if (localStorage.getItem('darkMode') === 'true') {
                document.body.classList.add('dark-mode');
                document.addEventListener('DOMContentLoaded', function() {
                    updateDarkModeIcons(true);
                });
            }
        })();
    </script>

    <!-- loader -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script th:inline="javascript">
        var siteLogo = /*[[@{'/uploads/logo/' + ${siteSettings.siteLogo}}]]*/ '/store/logo/logo.jpeg';
        document.addEventListener('DOMContentLoaded', function() {
            document.querySelectorAll('.view-details-btn').forEach(button => {
                button.addEventListener('click', function(e) {
                    e.preventDefault();
                    const url = this.getAttribute('href');

                    // Show the page loader overlay for navigation
                    var loader = document.getElementById('pageLoader');
                    if (loader) {
                        var bar = document.getElementById('pageLoaderBar');
                        loader.style.display = 'flex';
                        loader.style.opacity = '1';
                        bar.style.transition = 'none';
                        bar.style.width = '0%';
                        bar.offsetHeight;
                        bar.style.animation = 'loaderBarGrow 1.8s ease-in-out forwards, loaderBarShimmer 1s linear infinite';
                    }

                    setTimeout(() => {
                        window.location.href = url;
                    }, 400);
                });
            });
        });
    </script>


<!-- Active nav highlight -->
<script>
    document.addEventListener('DOMContentLoaded', function() {
        var path = window.location.pathname;

        // Top navbar links
        document.querySelectorAll('#mainNavbar .nav-link').forEach(function(link) {
            var href = link.getAttribute('href');
            if (!href) return;
            if (href === '/' && path === '/') {
                link.classList.add('active-page');
            } else if (href !== '/' && path.startsWith(href)) {
                link.classList.add('active-page');
            }
        });

        // Bottom mobile nav buttons
        document.querySelectorAll('.bottom-button2 .btn').forEach(function(btn) {
            var href = btn.getAttribute('href');
            if (!href) return;
            if (href === '/' && path === '/') {
                btn.classList.add('active-page');
            } else if (href !== '/' && path.startsWith(href)) {
                btn.classList.add('active-page');
            }
        });
    });
</script>
