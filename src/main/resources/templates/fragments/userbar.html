<!-- userbar.html - Seller/User -->
<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"></head>
<body>

<!-- Desktop Sidebar -->
<aside th:fragment="desktopSidebar(user)" class="d-none d-lg-flex flex-column" style="width:250px; flex-shrink:0; height:100vh; position:sticky; top:0; overflow-y:auto; background:linear-gradient(180deg, #0E0E11, #1a1a1e);">

    <style>
        .user-sidebar {
            background: linear-gradient(180deg, #0E0E11, #1a1a1e);
            min-height: 100vh; color: #fff; padding: 0;
        }
        .user-sidebar .sidebar-header {
            padding: 24px 20px; text-align: center;
            border-bottom: 1px solid rgba(255,255,255,.08);
        }
        .user-sidebar .sidebar-header img {
            width: 60px; height: 60px; border-radius: 14px; object-fit: cover;
            border: 2px solid rgba(255,255,255,.2); margin-bottom: 10px;
        }
        .user-sidebar .sidebar-header h6 { color: #fff; margin-bottom: 2px; font-size: 0.95rem; }
        .user-sidebar .sidebar-header small { color: rgba(255,255,255,.5); font-size: 0.75rem; }
        .user-sidebar .nav-section { padding: 16px 14px 8px; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1.5px; color: rgba(255,255,255,.35) !important; }
        .user-sidebar .nav-link {
            color: rgba(255,255,255,.7) !important; font-weight: 500; font-size: 0.88rem;
            padding: 10px 16px; border-radius: 10px; margin: 2px 10px;
            transition: all 0.2s; display: flex; align-items: center; gap: 10px;
        }
        .user-sidebar .nav-link i { font-size: 1.1rem; width: 22px; text-align: center; color: rgba(255,255,255,.7) !important; }
        .user-sidebar .nav-link:hover { background: rgba(255,255,255,.1); color: #fff !important; }
        .user-sidebar .nav-link:hover i { color: #fff !important; }
        .user-sidebar .nav-link.active { background: rgba(232,97,29,.3); color: #fff !important; }
        .user-sidebar .nav-link.active i { color: #fff !important; }
        .user-sidebar .sidebar-header h6 { color: #fff !important; }
        .user-sidebar .sidebar-header small, .user-sidebar .sidebar-header small * { color: rgba(255,255,255,.5) !important; }
        .user-sidebar .sidebar-footer {
            padding: 16px 20px; margin-top: auto;
            border-top: 1px solid rgba(255,255,255,.08); text-align: center;
        }
        .user-sidebar .sidebar-footer a {
            color: rgba(255,255,255,.5) !important; font-size: 0.8rem; text-decoration: none;
            transition: color 0.2s;
        }
        .user-sidebar .sidebar-footer a i { color: rgba(255,255,255,.5) !important; }
        .user-sidebar .sidebar-footer a:hover, .user-sidebar .sidebar-footer a:hover i { color: #E8611D !important; }
    </style>

    <div class="user-sidebar d-flex flex-column">
        <!-- Header -->
        <div class="sidebar-header">
            <img src="/store/logo/logo.jpeg" alt="Logo">
            <h6 th:text="${user.firstName + ' ' + user.lastName}">User</h6>
            <small><i class="bi bi-person-badge me-1"></i><span th:text="${user.role}">SELLER</span></small>
        </div>

        <!-- Main Nav -->
        <div class="nav-section">Main</div>
        <ul class="nav flex-column">
            <li class="nav-item">
                <a class="nav-link" href="/"><i class="bi bi-house-door"></i> Home</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="/account/dashboard"><i class="bi bi-grid-1x2"></i> Dashboard</a>
            </li>
        </ul>

        <!-- Store -->
        <div class="nav-section">Store</div>
        <ul class="nav flex-column">
            <li class="nav-item" th:if="${user.status == '1'}">
                <a class="nav-link" href="/account/products"><i class="bi bi-box-seam"></i> My Products</a>
            </li>
        </ul>

        <!-- Billing -->
        <div class="nav-section">Billing</div>
        <ul class="nav flex-column">
            <li class="nav-item">
                <a class="nav-link" href="/account/subscription"><i class="bi bi-credit-card-2-front"></i> Subscription</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="/account/payments"><i class="bi bi-wallet2"></i> Payment History</a>
            </li>
        </ul>

        <!-- Footer -->
        <div class="sidebar-footer">
            <a href="/logout"><i class="bi bi-box-arrow-left me-1"></i> Sign Out</a>
        </div>
    </div>
</aside>

<!-- Mobile Sidebar -->
<div th:fragment="mobileSidebar" class="offcanvas offcanvas-start" id="mobileSidebar" style="width:260px; background:linear-gradient(180deg, #0E0E11, #1a1a1e); color:#fff;">

    <div class="offcanvas-header" style="border-bottom:1px solid rgba(255,255,255,.08);">
        <div class="d-flex align-items-center">
            <img src="/store/logo/logo.jpeg" style="width:40px; height:40px; border-radius:10px; object-fit:cover; margin-right:10px;">
            <div>
                <h6 class="mb-0 text-white" style="font-size:0.9rem;" th:text="${user.firstName}">User</h6>
                <small style="color:rgba(255,255,255,.5); font-size:0.7rem;" th:text="${user.role}">SELLER</small>
            </div>
        </div>
        <button class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
    </div>

    <div class="offcanvas-body d-flex flex-column p-0">
        <div style="padding:12px 10px 6px; font-size:0.7rem; text-transform:uppercase; letter-spacing:1.5px; color:rgba(255,255,255,.35);">Main</div>
        <ul class="nav flex-column">
            <li class="nav-item"><a class="nav-link" href="/" style="color:rgba(255,255,255,.7); padding:9px 16px; margin:1px 10px; border-radius:8px; font-size:0.88rem;"><i class="bi bi-house-door me-2"></i>Home</a></li>
            <li class="nav-item"><a class="nav-link" href="/account/dashboard" style="color:rgba(255,255,255,.7); padding:9px 16px; margin:1px 10px; border-radius:8px; font-size:0.88rem;"><i class="bi bi-grid-1x2 me-2"></i>Dashboard</a></li>
        </ul>

        <div style="padding:12px 10px 6px; font-size:0.7rem; text-transform:uppercase; letter-spacing:1.5px; color:rgba(255,255,255,.35);">Store</div>
        <ul class="nav flex-column">
            <li class="nav-item"><a class="nav-link" href="/account/products" style="color:rgba(255,255,255,.7); padding:9px 16px; margin:1px 10px; border-radius:8px; font-size:0.88rem;"><i class="bi bi-box-seam me-2"></i>My Products</a></li>
        </ul>

        <div style="padding:12px 10px 6px; font-size:0.7rem; text-transform:uppercase; letter-spacing:1.5px; color:rgba(255,255,255,.35);">Billing</div>
        <ul class="nav flex-column">
            <li class="nav-item"><a class="nav-link" href="/account/subscription" style="color:rgba(255,255,255,.7); padding:9px 16px; margin:1px 10px; border-radius:8px; font-size:0.88rem;"><i class="bi bi-credit-card-2-front me-2"></i>Subscription</a></li>
            <li class="nav-item"><a class="nav-link" href="/account/payments" style="color:rgba(255,255,255,.7); padding:9px 16px; margin:1px 10px; border-radius:8px; font-size:0.88rem;"><i class="bi bi-wallet2 me-2"></i>Payment History</a></li>
        </ul>

        <div class="mt-auto text-center p-3" style="border-top:1px solid rgba(255,255,255,.08);">
            <a href="/logout" style="color:rgba(255,255,255,.5); font-size:0.8rem; text-decoration:none;"><i class="bi bi-box-arrow-left me-1"></i>Sign Out</a>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        var path = window.location.pathname;
        var bestMatch = null;
        var bestLen = 0;
        var allLinks = document.querySelectorAll('.user-sidebar .nav-link, .offcanvas .nav-link');

        allLinks.forEach(function(link) {
            var href = link.getAttribute('href');
            if (href && path === href) {
                if (href.length > bestLen) { bestLen = href.length; bestMatch = href; }
            } else if (href && href !== '/' && path.startsWith(href + '/')) {
                if (href.length > bestLen) { bestLen = href.length; bestMatch = href; }
            }
        });

        allLinks.forEach(function(link) {
            var href = link.getAttribute('href');
            if (href === bestMatch) {
                link.classList.add('active');
                link.style.color = '#fff';
                link.style.background = 'rgba(232,97,29,.3)';
            }
        });
    });
</script>
</body>
</html>
